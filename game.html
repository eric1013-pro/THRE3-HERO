<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRE3 HERO - Grand Battle</title>
    <!-- 고급 폰트 로드: 영문은 Cinzel (클래식), 한글은 Noto Serif KR (명조체) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <!-- Three.js & Tween.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #030405; font-family: 'Noto Serif KR', serif; user-select: none; color: #eaeaea; }
        
        /* --- 글래스 모피즘 공통 클래스 --- */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* 쫀득한 텐션 애니메이션 공통 클래스 */
        .chewy { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .chewy:hover { transform: translateY(-8px) scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: rgba(255,215,0,0.5); }

        /* UI 레이어 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }
        
        /* 상단 헤더 (타이틀, 스코어, 타이머) */
        #header { display: flex; justify-content: space-between; align-items: flex-start; padding: 30px; pointer-events: auto; }
        
        .title-box { text-align: left; }
        .title-box h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; margin: 0; color: #d4af37; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); letter-spacing: 3px; }
        .title-box p { margin: 5px 0 0 0; font-size: 1rem; color: #aaa; letter-spacing: 2px; }

        .score-board { display: flex; gap: 20px; padding: 15px 30px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; }
        .score-item { display: flex; flex-direction: column; align-items: center; }
        .score-num { font-family: 'Cinzel', serif; font-size: 2rem; color: #fff; }
        .score-p1 { color: #66fcf1; } .score-p2 { color: #ff4d4d; }

        .timer-box { text-align: center; padding: 15px 30px; border-radius: 20px; }
        #timer-text { font-family: 'Cinzel', serif; font-size: 3rem; margin: 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* 하단 로스터 (영웅 선택) */
        #bottom-container { display: flex; justify-content: space-between; align-items: flex-end; padding: 30px; pointer-events: auto; }
        #roster { display: flex; gap: 15px; overflow-x: auto; padding: 10px; max-width: 70%; border-radius: 20px; }
        
        .roster-card { width: 85px; height: 110px; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .roster-color { width: 35px; height: 35px; border-radius: 50%; margin-bottom: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .roster-card span { font-size: 0.85rem; font-weight: bold; text-align: center; }
        
        /* 이모티콘 트레이 (좌측 하단) */
        .emoji-tray { display: flex; gap: 10px; padding: 15px; border-radius: 20px; flex-wrap: wrap; width: 120px; justify-content: center; }
        .emoji-btn { font-size: 1.8rem; background: transparent; border: none; cursor: pointer; filter: grayscale(20%); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .emoji-btn:hover { transform: scale(1.4); filter: grayscale(0%); }

        /* 플로팅 이모티콘 애니메이션 */
        .floating-emoji { position: absolute; font-size: 3rem; pointer-events: none; z-index: 50; animation: floatUp 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px) scale(0.5); } 20% { opacity: 1; transform: translateY(-20px) scale(1.2); } 100% { opacity: 0; transform: translateY(-100px) scale(1); } }

        /* 정보 팝업 모달 */
        #info-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); border-radius: 20px; padding: 40px; text-align: center; width: 320px; display: none; pointer-events: auto; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; border: 1px solid rgba(212, 175, 55, 0.4); }
        #info-panel h2 { font-family: 'Cinzel', serif; color: #d4af37; margin-top: 0; font-size: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        #info-panel p { font-size: 1.1rem; line-height: 1.6; color: #ddd; }
        
        .btn-gold { margin-top: 20px; padding: 12px 30px; background: linear-gradient(135deg, #d4af37, #aa801d); color: #000; border: none; border-radius: 30px; font-weight: bold; font-family: 'Noto Serif KR', serif; cursor: pointer; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        
        /* 라운드 종료 / 결과 화면 */
        #result-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 200; pointer-events: auto; }
        .result-box { padding: 50px 80px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.2); transform: scale(0.8); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #result-title { font-family: 'Cinzel', serif; font-size: 4rem; margin: 0 0 20px 0; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        #result-desc { font-size: 1.5rem; color: #ccc; margin-bottom: 40px; }
    </style>
</head>
<body>

    <!-- 3D 캔버스 -->
    <div id="canvas-container" style="position: absolute; top:0; left:0; width: 100%; height: 100%;"></div>

    <!-- UI 오버레이 -->
    <div id="ui-layer">
        <!-- 상단 헤더 -->
        <div id="header">
            <div class="title-box">
                <h1>THRE3 HERO</h1>
                <p>Tactical Auto Chess</p>
            </div>
            
            <div class="score-board glass chewy">
                <div class="score-item score-p1">
                    <span>YOU</span>
                    <span class="score-num" id="score-you">0</span>
                </div>
                <div style="display:flex; align-items:center; font-family:'Cinzel';">VS</div>
                <div class="score-item score-p2">
                    <span>ENEMY</span>
                    <span class="score-num" id="score-enemy">0</span>
                </div>
            </div>

            <div class="timer-box glass chewy">
                <span style="font-size:0.9rem; color:#aaa;">배치 시간</span><br>
                <span id="timer-text">10.0</span>
            </div>
        </div>

        <!-- 영웅 정보 모달 -->
        <div id="info-panel" class="glass">
            <h2 id="info-name">Hero Name</h2>
            <p id="info-stats" style="font-family: 'Cinzel', serif; font-size: 1.3rem;">HP 100 &nbsp;|&nbsp; ATK 10</p>
            <p id="info-skill" style="color:#d4af37; background: rgba(212,175,55,0.1); padding: 10px; border-radius: 10px;">고유 스킬: 스킬 이름</p>
            <button class="btn-gold chewy" onclick="closeInfo()">확인</button>
        </div>

        <!-- 하단 컨트롤 영역 -->
        <div id="bottom-container">
            <!-- 이모티콘 트레이 -->
            <div class="emoji-tray glass">
                <button class="emoji-btn" onclick="sendEmoji('👍')">👍</button>
                <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
                <button class="emoji-btn" onclick="sendEmoji('😎')">😎</button>
                <button class="emoji-btn" onclick="sendEmoji('🤔')">🤔</button>
                <button class="emoji-btn" onclick="sendEmoji('😭')">😭</button>
                <button class="emoji-btn" onclick="sendEmoji('😡')">😡</button>
            </div>

            <!-- 로스터 -->
            <div id="roster" class="glass"></div>
        </div>
    </div>

    <!-- 라운드 결과 화면 -->
    <div id="result-screen">
        <div id="result-box" class="glass result-box">
            <h1 id="result-title">VICTORY</h1>
            <p id="result-desc">적을 섬멸하고 전장을 지배했습니다.</p>
            <button class="btn-gold chewy" style="font-size: 1.5rem; padding: 15px 50px;" onclick="startNextRound()">다음 전투 준비</button>
        </div>
    </div>

<script>
    // --- 1. 영웅 데이터 (고급스러운 색감 적용) ---
    const HERO_DB = [
        { id: 'aegis', name: '아이기스 (방패병)', hp: 350, atk: 12, skill: '절대 방벽', color: 0x95a5a6, shape: 'box' },
        { id: 'sniper', name: '호크아이 (저격수)', hp: 110, atk: 50, skill: '관통 사격', color: 0xe74c3c, shape: 'cone' },
        { id: 'medic', name: '루멘 (치유사)', hp: 140, atk: 8, skill: '여신의 축복', color: 0x2ecc71, shape: 'sphere' },
        { id: 'phantom', name: '팬텀 (암살자)', hp: 160, atk: 30, skill: '그림자 일격', color: 0x9b59b6, shape: 'cylinder' },
        { id: 'titan', name: '타이탄 (투사)', hp: 280, atk: 18, skill: '대지 분쇄', color: 0xe67e22, shape: 'box' },
        { id: 'solar', name: '솔라 (태양술사)', hp: 130, atk: 35, skill: '태양풍', color: 0xf1c40f, shape: 'sphere' }
    ];

    // 게임 상태 변수
    let playerWins = 0;
    let enemyWins = 0;
    let gamePhase = 'PLACEMENT'; // PLACEMENT, BATTLE, RESULT
    let timeLeft = 10.0;
    let battleInterval = null;

    // --- 2. 3D 씬(Scene) 세팅 (고급스러움 강조) ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030405, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 22);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // 시네마틱 색감
    container.appendChild(renderer.domElement);

    // 은은하고 고급스러운 조명
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(15, 30, 15);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // 글래스 느낌을 살리기 위한 장식용 플로팅 조명들
    const blueLight = new THREE.PointLight(0x00d2ff, 1, 50); blueLight.position.set(-10, 5, 10); scene.add(blueLight);
    const redLight = new THREE.PointLight(0xff0055, 1, 50); redLight.position.set(10, 5, -10); scene.add(redLight);

    // --- 3. 대리석/유리 느낌의 체스판 생성 ---
    const boardTiles = [];
    const tileGeo = new THREE.BoxGeometry(2.8, 0.3, 2.8);
    const playerMat = new THREE.MeshPhysicalMaterial({ color: 0x1a2b3c, metalness: 0.9, roughness: 0.1, clearcoat: 1 });
    const enemyMat = new THREE.MeshPhysicalMaterial({ color: 0x3c1a1a, metalness: 0.9, roughness: 0.1, clearcoat: 1 });

    function createBoard() {
        // 기존 타일 삭제 (초기화용)
        boardTiles.forEach(t => scene.remove(t));
        boardTiles.length = 0;

        for(let row=0; row<3; row++) {
            for(let col=0; col<3; col++) {
                let pTile = new THREE.Mesh(tileGeo, playerMat);
                pTile.position.set(col * 3 - 3, 0, row * 3 + 1.5);
                pTile.receiveShadow = true;
                pTile.userData = { isPlayer: true, occupied: false };
                scene.add(pTile);
                boardTiles.push(pTile);

                let eTile = new THREE.Mesh(tileGeo, enemyMat);
                eTile.position.set(col * 3 - 3, 0, -(row * 3 + 1.5));
                eTile.receiveShadow = true;
                eTile.userData = { isPlayer: false, occupied: false };
                scene.add(eTile);
                boardTiles.push(eTile);
            }
        }
    }
    createBoard();

    // --- 4. 영웅 생성 및 UI 연동 ---
    let playerUnits = [];
    let enemyUnits = [];

    function getGeometry(shape) {
        if(shape === 'box') return new THREE.BoxGeometry(1.5, 2.2, 1.5);
        if(shape === 'sphere') return new THREE.SphereGeometry(1.1, 32, 32);
        if(shape === 'cylinder') return new THREE.CylinderGeometry(0.9, 0.9, 2.2, 32);
        if(shape === 'cone') return new THREE.ConeGeometry(1.2, 2.5, 16);
    }

    function spawnHero(heroData, isPlayer, position) {
        const mat = new THREE.MeshPhysicalMaterial({ 
            color: heroData.color, metalness: 0.7, roughness: 0.2, 
            clearcoat: 1.0, emissive: heroData.color, emissiveIntensity: 0.3 
        });
        const mesh = new THREE.Mesh(getGeometry(heroData.shape), mat);
        mesh.position.copy(position);
        mesh.position.y = 5; // 낙하 시작점
        mesh.castShadow = true; mesh.receiveShadow = true;
        
        // 고급스러운 체력바 (살짝 띄워서 표시)
        const hpGeo = new THREE.PlaneGeometry(1.8, 0.15);
        const hpMat = new THREE.MeshBasicMaterial({ color: 0x2ecc71, side: THREE.DoubleSide });
        const hpBar = new THREE.Mesh(hpGeo, hpMat);
        hpBar.position.set(0, 2.5, 0);
        mesh.add(hpBar);
        
        mesh.userData = { ...heroData, maxHp: heroData.hp, isPlayer: isPlayer, hpMesh: hpBar };
        scene.add(mesh);
        isPlayer ? playerUnits.push(mesh) : enemyUnits.push(mesh);

        // 쫀득한 등장 애니메이션 (Elastic 텐션)
        new TWEEN.Tween(mesh.position).to({ y: 1.3 }, 800).easing(TWEEN.Easing.Elastic.Out).start();
        return mesh;
    }

    // 하단 로스터 세팅
    const rosterDiv = document.getElementById('roster');
    HERO_DB.forEach(hero => {
        let card = document.createElement('div');
        card.className = 'roster-card chewy';
        card.innerHTML = `
            <div class="roster-color" style="background-color:#${hero.color.toString(16)}"></div>
            <span>${hero.name.split(' ')[0]}</span>
        `;
        card.onclick = () => {
            if(gamePhase !== 'PLACEMENT') return;
            if(playerUnits.length >= 3) return showEmojiText("최대 3명입니다!", card);
            
            let emptyTile = boardTiles.find(t => t.userData.isPlayer && !t.userData.occupied);
            if(emptyTile) {
                let unit = spawnHero(hero, true, emptyTile.position);
                emptyTile.userData.occupied = true;
                unit.userData.currentTile = emptyTile;
            }
        };
        rosterDiv.appendChild(card);
    });

    // --- 5. 마우스/터치 드래그 로직 (쫀득한 피드백) ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let draggedObj = null;
    let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1.3);
    let startPos = { x: 0, y: 0 };
    let selectLight = new THREE.PointLight(0xd4af37, 0, 8); // 황금빛 발광
    scene.add(selectLight);

    window.addEventListener('pointerdown', (e) => {
        if(gamePhase !== 'PLACEMENT') return;
        startPos = { x: e.clientX, y: e.clientY };
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(playerUnits);
        if(intersects.length > 0) {
            draggedObj = intersects[0].object;
            // 꾸욱 누를 때 텐션 애니메이션
            new TWEEN.Tween(draggedObj.scale).to({ x: 1.2, y: 1.2, z: 1.2 }, 300).easing(TWEEN.Easing.Back.Out).start();
            draggedObj.material.emissiveIntensity = 0.8;
            selectLight.intensity = 2;
            selectLight.position.copy(draggedObj.position);
        }
    });

    window.addEventListener('pointermove', (e) => {
        if(draggedObj && gamePhase === 'PLACEMENT') {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            let intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersectPoint);
            
            draggedObj.position.lerp(new THREE.Vector3(intersectPoint.x, 2.5, intersectPoint.z), 0.3);
            selectLight.position.copy(draggedObj.position);
        }
    });

    window.addEventListener('pointerup', (e) => {
        if(!draggedObj) return;
        let dist = Math.hypot(e.clientX - startPos.x, e.clientY - startPos.y);
        
        if(dist < 5) { // 단순 탭 (정보창)
            showInfo(draggedObj.userData);
        } else { // 드롭
            let closest = null, minDist = Infinity;
            boardTiles.filter(t => t.userData.isPlayer).forEach(t => {
                let d = draggedObj.position.distanceTo(t.position);
                if(d < minDist) { minDist = d; closest = t; }
            });

            if(closest && !closest.userData.occupied) {
                if(draggedObj.userData.currentTile) draggedObj.userData.currentTile.userData.occupied = false;
                closest.userData.occupied = true;
                draggedObj.userData.currentTile = closest;
                // 자석처럼 쫀득하게 달라붙음
                new TWEEN.Tween(draggedObj.position).to({ x: closest.position.x, y: 1.3, z: closest.position.z }, 400).easing(TWEEN.Easing.Elastic.Out).start();
            } else {
                let old = draggedObj.userData.currentTile;
                if(old) new TWEEN.Tween(draggedObj.position).to({ x: old.position.x, y: 1.3, z: old.position.z }, 400).easing(TWEEN.Easing.Elastic.Out).start();
            }
        }
        
        new TWEEN.Tween(draggedObj.scale).to({ x: 1, y: 1, z: 1 }, 300).easing(TWEEN.Easing.Back.Out).start();
        draggedObj.material.emissiveIntensity = 0.3;
        selectLight.intensity = 0;
        draggedObj = null;
    });

    // --- 6. 정보창 및 이모티콘 로직 ---
    function showInfo(data) {
        document.getElementById('info-name').innerText = data.name;
        document.getElementById('info-stats').innerHTML = `HP <span style="color:#2ecc71">${data.hp}</span> &nbsp;|&nbsp; ATK <span style="color:#e74c3c">${data.atk}</span>`;
        document.getElementById('info-skill').innerText = `✨ 고유 스킬: ${data.skill}`;
        const panel = document.getElementById('info-panel');
        panel.style.display = 'block';
        setTimeout(() => { panel.style.opacity = '1'; panel.style.transform = 'translate(-50%, -50%) scale(1)'; }, 10);
    }
    function closeInfo() {
        const panel = document.getElementById('info-panel');
        panel.style.opacity = '0'; panel.style.transform = 'translate(-50%, -50%) scale(0.8)';
        setTimeout(() => panel.style.display = 'none', 300);
    }

    function sendEmoji(emojiChar) {
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = emojiChar;
        // 좌측 하단에서 위로 날아가도록 위치 설정
        el.style.left = (50 + Math.random() * 100) + 'px';
        el.style.bottom = '150px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }

    // 간단한 텍스트 팝업 이펙트
    function showEmojiText(text, parentElement) {
        const rect = parentElement.getBoundingClientRect();
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.style.fontSize = '1rem';
        el.style.color = '#ff4d4d';
        el.innerText = text;
        el.style.left = rect.left + 'px';
        el.style.top = rect.top + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }

    // --- 7. 게임 루프 (타이머 & 오토 배틀) ---
    setInterval(() => {
        if(gamePhase === 'PLACEMENT') {
            timeLeft -= 0.1;
            document.getElementById('timer-text').innerText = Math.max(0, timeLeft).toFixed(1);
            if(timeLeft <= 3) document.getElementById('timer-text').style.color = '#ff4d4d';
            
            if(timeLeft <= 0) {
                gamePhase = 'BATTLE';
                document.getElementById('timer-text').innerText = "BATTLE!";
                document.getElementById('timer-text').style.color = '#d4af37';
                document.getElementById('roster').style.opacity = '0.3';
                document.getElementById('roster').style.pointerEvents = 'none';
                
                // 적 생성 애니메이션
                let available = boardTiles.filter(t => !t.userData.isPlayer);
                for(let i=0; i<3; i++) {
                    let hero = HERO_DB[Math.floor(Math.random() * HERO_DB.length)];
                    let tile = available.splice(Math.floor(Math.random()*available.length), 1)[0];
                    let e = spawnHero(hero, false, tile.position);
                    tile.userData.occupied = true;
                    e.userData.currentTile = tile;
                }
                setTimeout(() => battleInterval = setInterval(battleTick, 1200), 1000);
            }
        }
    }, 100);

    function battleTick() {
        let pAlive = playerUnits.filter(u => u.userData.hp > 0);
        let eAlive = enemyUnits.filter(u => u.userData.hp > 0);

        if(pAlive.length === 0 || eAlive.length === 0) {
            clearInterval(battleInterval);
            handleRoundEnd(pAlive.length > 0);
            return;
        }

        // 아군 선공
        pAlive.forEach(attacker => {
            let target = eAlive[Math.floor(Math.random() * eAlive.length)];
            playAttack(attacker, target);
        });

        // 적군 후공
        setTimeout(() => {
            eAlive.forEach(attacker => {
                let targets = playerUnits.filter(u => u.userData.hp > 0);
                if(targets.length === 0) return;
                playAttack(attacker, targets[Math.floor(Math.random() * targets.length)]);
            });
        }, 600);
    }

    function playAttack(attacker, target) {
        // 공격 모션 (부드러운 점프)
        new TWEEN.Tween(attacker.position).to({ y: 2.5 }, 250).yoyo(true).repeat(1).easing(TWEEN.Easing.Quadratic.Out).start();
        
        // 투사체 발사
        const proj = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: attacker.userData.color }));
        proj.position.copy(attacker.position); proj.position.y = 1.8;
        scene.add(proj);

        new TWEEN.Tween(proj.position).to({ x: target.position.x, y: 1.8, z: target.position.z }, 400).onComplete(() => {
            scene.remove(proj);
            target.userData.hp -= attacker.userData.atk;
            let ratio = Math.max(0, target.userData.hp / target.userData.maxHp);
            target.userData.hpMesh.scale.x = ratio;
            target.userData.hpMesh.material.color.setHex(ratio > 0.5 ? 0x2ecc71 : 0xe74c3c);

            // 피격 이펙트
            let origin = target.material.emissive.getHex();
            target.material.emissive.setHex(0xffffff);
            setTimeout(() => { if(target.userData.hp > 0) target.material.emissive.setHex(origin); }, 150);

            if(target.userData.hp <= 0) {
                new TWEEN.Tween(target.rotation).to({ x: Math.PI/2 }, 400).easing(TWEEN.Easing.Bounce.Out).start();
                target.material.opacity = 0.3; target.material.transparent = true;
                target.userData.hpMesh.visible = false;
                if(target.userData.currentTile) target.userData.currentTile.userData.occupied = false;
            }
        }).start();
    }

    // --- 8. 승패 결과창 및 라운드 재시작 ---
    function handleRoundEnd(isPlayerWin) {
        gamePhase = 'RESULT';
        const screen = document.getElementById('result-screen');
        const box = document.getElementById('result-box');
        const title = document.getElementById('result-title');
        const desc = document.getElementById('result-desc');

        if(isPlayerWin) {
            playerWins++;
            title.innerText = "VICTORY";
            title.style.color = "#d4af37";
            desc.innerText = "적의 전열을 무너뜨리고 전장을 지배했습니다.";
            sendEmoji('😎'); sendEmoji('👍');
        } else {
            enemyWins++;
            title.innerText = "DEFEAT";
            title.style.color = "#ff4d4d";
            desc.innerText = "아군이 섬멸당했습니다. 전술을 재고하십시오.";
            sendEmoji('😭');
        }

        document.getElementById('score-you').innerText = playerWins;
        document.getElementById('score-enemy').innerText = enemyWins;

        screen.style.display = 'flex';
        setTimeout(() => { box.style.opacity = '1'; box.style.transform = 'scale(1)'; }, 10);
    }

    function startNextRound() {
        const screen = document.getElementById('result-screen');
        const box = document.getElementById('result-box');
        box.style.opacity = '0'; box.style.transform = 'scale(0.8)';
        setTimeout(() => { screen.style.display = 'none'; }, 500);

        // 보드 및 유닛 클리어
        playerUnits.forEach(u => scene.remove(u)); playerUnits = [];
        enemyUnits.forEach(u => scene.remove(u)); enemyUnits = [];
        boardTiles.forEach(t => t.userData.occupied = false);

        // UI 타이머 리셋
        timeLeft = 10.0;
        document.getElementById('timer-text').style.color = '#fff';
        document.getElementById('roster').style.opacity = '1';
        document.getElementById('roster').style.pointerEvents = 'auto';
        
        gamePhase = 'PLACEMENT';
    }

    // 렌더링 애니메이션 루프
    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);
        // 빌보드 (체력바가 카메라 바라보기)
        [...playerUnits, ...enemyUnits].forEach(u => {
            if(u.userData.hpMesh.visible) u.userData.hpMesh.lookAt(camera.position);
        });
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
