<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THRE3 HERO: Mark V Flawless</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        /* --- 다이내믹 바이브런트 컬러 팔레트 --- */
        :root {
            --gold: #ffb703; --gold-glow: rgba(255, 183, 3, 0.6);
            --neon-cyan: #00f3ff; --neon-cyan-glow: rgba(0, 243, 255, 0.5);
            --neon-purple: #b000ff; --neon-purple-glow: rgba(176, 0, 255, 0.4);
            --glass-bg: rgba(15, 23, 42, 0.65); /* 투명도를 높여 배경이 잘 비치게 함 */
            --glass-border: rgba(255, 255, 255, 0.15);
            --safe-green: #10b981; --danger-red: #f43f5e;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        
        /* 단조로운 흑백을 탈피한 오로라 라이브 배경 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Serif KR', serif; color: #f8fafc; background: #020617; }
        
        /* 애니메이션 효과가 들어간 화려한 백그라운드 그라데이션 레이어 */
        .ambient-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at 15% 20%, rgba(0, 243, 255, 0.1) 0%, transparent 40%), radial-gradient(circle at 85% 80%, rgba(176, 0, 255, 0.15) 0%, transparent 40%); animation: ambientShift 10s infinite alternate linear; }
        @keyframes ambientShift { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        #app-mainframe { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; z-index: 1; }
        #canvas-3d-viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        #fx-html-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; overflow: hidden; }

        /* --- 차세대 하이엔드 글래스모피즘 & 젤리 텐션 버튼 --- */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%); border: 1px solid var(--glass-border); box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1); }
        
        /* 버튼을 누르면 젤리처럼 쫀득하게 줄어드는 최상급 반응형 모션 */
        .jelly-btn { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s, filter 0.2s; cursor: pointer; }
        .jelly-btn:active { transform: scale(0.88) translateY(2px); filter: brightness(1.3); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .app-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; box-sizing: border-box; }
        .app-screen.active { display: flex; }

        /* --- 최상위 글로벌 유틸리티 버튼 (설정 / 통계) 버그 차단 --- */
        #global-settings-btn { position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; z-index: 999; pointer-events: auto; display: none; }
        #global-stats-btn { position: absolute; top: calc(env(safe-area-inset-top, 20px) + 60px); right: 20px; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--gold); z-index: 999; pointer-events: auto; display: none; }

        /* --- 1. 인트로 --- */
        #screen-intro { background: #000; z-index: 1000; }
        .neon-logo { font-family: 'Cinzel'; font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon-cyan), 0 0 40px var(--neon-purple), 0 0 80px #0055ff; letter-spacing: 8px; animation: glitchBlast 2.5s forwards; }
        @keyframes glitchBlast { 0% { opacity: 0; transform: scale(0.5); filter: blur(10px); } 40% { opacity: 1; transform: scale(1.1); filter: blur(0); } 100% { opacity: 0; transform: scale(1) translateY(-20px); filter: blur(5px); } }

        /* --- 2. 로비 및 공통 컨트롤 --- */
        .hub-card { width: 100%; max-width: 340px; border-radius: 28px; padding: 35px 25px; text-align: center; }
        .input-vault { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 16px; color: #fff; text-align: center; font-size: 1rem; margin-bottom: 20px; font-family: 'Noto Serif KR'; transition: 0.3s; }
        .input-vault:focus { border-color: var(--neon-cyan); outline: none; box-shadow: 0 0 15px var(--neon-cyan-glow); background: rgba(0,243,255,0.05); }
        
        .btn-core { width: 100%; padding: 16px; border-radius: 16px; font-family: 'Noto Serif KR'; font-size: 1.1rem; font-weight: 800; border: none; margin-bottom: 12px; display: block; color: #fff; }
        .btn-cyan { background: linear-gradient(135deg, #00f3ff 0%, #0077ff 100%); color: #000; box-shadow: 0 8px 25px var(--neon-cyan-glow); }
        .btn-purple { background: linear-gradient(135deg, #b000ff 0%, #5500ff 100%); box-shadow: 0 8px 25px var(--neon-purple-glow); }
        .btn-outline { background: transparent; border: 1px solid #94a3b8; color: #e2e8f0; }

        .lobby-title h1 { font-family: 'Cinzel'; font-size: 3.5rem; margin: 0; color: var(--gold); text-shadow: 0 0 25px var(--gold-glow); letter-spacing: 4px; line-height: 1.1; }
        .lobby-title p { font-size: 0.85rem; color: #94a3b8; letter-spacing: 6px; margin: 10px 0 30px 0; }

        /* --- 3. 전투 인게임 HUD (세로 압축/확장 최적화) --- */
        #hud-battle-core { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 20px) 15px env(safe-area-inset-bottom, 20px) 15px; z-index: 25; }
        .hud-top-flex { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .score-badge { padding: 12px 18px; border-radius: 18px; min-width: 85px; text-align: center; }
        .score-badge h3 { font-family: 'Cinzel'; font-size: 2rem; margin: 0; font-weight: 900; }
        
        .timer-circle-hub { display: flex; flex-direction: column; align-items: center; }
        .timer-ring { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 1.8rem; font-weight: 900; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); background: rgba(0,0,0,0.7); box-shadow: 0 0 15px var(--neon-cyan-glow); }
        .bo5-dots { display: flex; gap: 6px; margin-top: 8px; }
        .bo5-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #475569; }
        .bo5-dot.win-p { background: var(--safe-green); border-color: var(--safe-green); box-shadow: 0 0 8px var(--safe-green); }
        .bo5-dot.win-e { background: var(--danger-red); border-color: var(--danger-red); box-shadow: 0 0 8px var(--danger-red); }

        .hud-bottom-flex { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; width: 100%; max-width: 480px; margin: 0 auto; }
        .deck-scroller { width: 100%; overflow-x: auto; display: flex; gap: 12px; padding: 15px 10px; border-radius: 20px; -webkit-overflow-scrolling: touch; }
        .deck-scroller::-webkit-scrollbar { display: none; }
        
        .hero-card { min-width: 78px; height: 100px; border-radius: 16px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: rgba(15, 23, 42, 0.4); }
        .hero-card .avatar { font-size: 1.5rem; margin-bottom: 6px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .hero-card .name { font-size: 0.75rem; font-weight: 900; color: #e2e8f0; }
        .hero-card.locked { filter: grayscale(100%); opacity: 0.3; }

        /* --- 4. 통계 탭 & 시네마틱 캠 토글 --- */
        .cam-toggle { padding: 8px 16px; border-radius: 14px; font-size: 0.8rem; font-weight: bold; background: transparent; border: 1px solid var(--glass-border); color: #94a3b8; margin-top: 15px; }
        .cam-toggle.active { background: rgba(0, 243, 255, 0.15); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan-glow); }

        #panel-analytics { position: absolute; right: -350px; top: calc(env(safe-area-inset-top, 20px) + 120px); width: 300px; border-radius: 20px 0 0 20px; padding: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); pointer-events: auto; z-index: 998; border-right: none; }
        #panel-analytics.open { right: 0; }
        .stat-bar-bg { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; display: flex; overflow: hidden; margin-top: 5px; }
        .s-dmg { background: var(--danger-red); transition: width 0.3s; } .s-heal { background: var(--safe-green); transition: width 0.3s; } .s-tank { background: #3b82f6; transition: width 0.3s; }

        /* --- 5. VFX 팝업 --- */
        .fx-dmg-text { position: absolute; font-family: 'Cinzel'; font-size: 2.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--danger-red), 2px 2px 0 #000; transform: translate(-50%, -50%); pointer-events: none; animation: fxFloat 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        .fx-heal-text { color: var(--safe-green); text-shadow: 0 0 15px #00ff00, 2px 2px 0 #000; }
        @keyframes fxFloat { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 20% { transform: translate(-50%, -90%) scale(1.4); } 100% { opacity: 0; transform: translate(-50%, -180%) scale(0.8); } }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div id="app-mainframe">
        <div id="canvas-3d-viewport"></div>
        <div id="fx-html-layer"></div>

        <div id="global-settings-btn" class="glass-panel jelly-btn" onclick="uiManager.toggleSettings()">⚙️</div>
        <div id="global-stats-btn" class="glass-panel jelly-btn" onclick="uiManager.toggleAnalytics()">📊</div>

        <div id="screen-intro" class="app-screen active"><div class="neon-logo">THRE3RIC</div></div>

        <div id="screen-auth" class="app-screen">
            <div class="hub-card glass-panel">
                <h2 style="font-family:'Cinzel'; color:var(--neon-cyan); margin:0 0 5px 0;">TACTICAL VAULT</h2>
                <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:30px;">지휘관 데이터 무결성 검증</p>
                <input type="text" id="input-commander-id" class="input-vault" placeholder="지휘관 코드명 입력 (ex. COMMANDER_1)">
                <button class="btn-core btn-cyan jelly-btn" onclick="storageManager.createProfile()">신규 데이터베이스 개설</button>
                <button class="btn-core btn-outline jelly-btn" id="btn-load-data" onclick="storageManager.loadProfile()">기존 데이터 동기화</button>
            </div>
        </div>

        <div id="screen-lobby" class="app-screen">
            <div style="text-align:center; width:100%; margin-bottom:50px;">
                <div style="display:inline-block; padding:8px 16px; border-radius:20px; background:rgba(0,0,0,0.5); border:1px solid var(--glass-border); font-size:0.8rem; margin-bottom:20px; color:var(--neon-cyan);">
                    ID: <b id="lbl-commander-name">GUEST</b> | SYNC: ONLINE
                </div>
                <div class="lobby-title">
                    <h1>THRE3 HERO</h1>
                    <p>ULTIMATE PROTOCOL</p>
                </div>
            </div>
            <div style="width:100%; max-width:320px;">
                <button class="btn-core btn-cyan jelly-btn" onclick="uiManager.routeTo('CAMPAIGN')">📖 캠페인 모드 (Story)</button>
                <button class="btn-core btn-purple jelly-btn" onclick="uiManager.routeTo('ROOM_HUB')">📡 원격 멀티플레이 (PvP)</button>
            </div>
        </div>

        <div id="screen-room-hub" class="app-screen">
            <div class="hub-card glass-panel">
                <button class="glass-panel jelly-btn" style="position:absolute; top:20px; left:20px; padding:10px 15px; border-radius:12px; color:#fff; border:none;" onclick="uiManager.routeTo('LOBBY')">↩ 귀환</button>
                <h2 style="font-family:'Cinzel'; color:var(--neon-purple); margin:0 0 25px 0;">REMOTE ARENA</h2>
                <button class="btn-core btn-purple jelly-btn" onclick="peerManager.hostRoom()">서버 방 생성 (Host)</button>
                <div id="display-room-code" style="padding:15px; margin:15px 0; background:rgba(0,0,0,0.5); border-radius:12px; border:1px dashed var(--neon-purple); font-family:'Cinzel'; font-size:1.5rem; color:var(--neon-cyan); display:none; user-select:all;">---</div>
                
                <hr style="border-color:rgba(255,255,255,0.1); margin:30px 0;">
                <input type="text" id="input-join-code" class="input-vault" placeholder="상대방 방 코드 주입">
                <button class="btn-core btn-outline jelly-btn" onclick="peerManager.joinRoom()">방 코드 난입 (Join)</button>
            </div>
        </div>

        <div id="hud-battle-core" style="display:none;">
            <div class="hud-top-flex">
                <div class="score-badge glass-panel">
                    <span style="font-size:0.7rem; color:#94a3b8;">YOU</span>
                    <h3 id="lbl-score-p">0</h3>
                </div>
                <div class="timer-circle-hub">
                    <div class="timer-ring" id="lbl-timer-clock">15</div>
                    <div class="bo5-dots" id="box-bo5-p">
                        <div class="bo5-dot"></div><div class="bo5-dot"></div><div class="bo5-dot"></div>
                    </div>
                </div>
                <div class="score-badge glass-panel">
                    <span style="font-size:0.7rem; color:#94a3b8;">ENEMY</span>
                    <h3 id="lbl-score-e" style="color:var(--danger-red);">0</h3>
                </div>
            </div>

            <button id="btn-cam-toggle" class="cam-toggle jelly-btn active" onclick="gameCore.toggleCam()">🎥 시네마틱 뷰 ON</button>

            <div id="panel-analytics" class="glass-panel">
                <h4 style="margin:0 0 15px 0; color:var(--gold); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">전술 지표 분석기</h4>
                <div style="display:flex; gap:10px; font-size:0.7rem; margin-bottom:15px;">
                    <span style="color:var(--danger-red);">■ 가해</span>
                    <span style="color:var(--safe-green);">■ 치유</span>
                    <span style="color:#3b82f6;">■ 방어</span>
                </div>
                <div id="analytics-content"></div>
            </div>

            <div class="hud-bottom-flex">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:0 10px;">
                    <span id="lbl-phase-msg" style="font-size:0.9rem; font-weight:900; letter-spacing:1px; color:var(--gold);">영웅 진형 구축 (15초)</span>
                    <button id="btn-lock-placement" class="jelly-btn" style="padding:10px 20px; border-radius:14px; background:var(--gold); border:none; font-weight:900; font-size:0.9rem; display:none;" onclick="gameCore.commitPlacement()">배치 확정</button>
                </div>
                <div id="deck-scroller" class="deck-scroller glass-panel"></div>
            </div>
        </div>

        <div id="screen-result" class="app-screen" style="background:rgba(2,6,23,0.9); backdrop-filter:blur(20px);">
            <div class="glass-panel" style="padding:50px 30px; border-radius:30px; text-align:center; width:90%; max-width:360px;">
                <h1 id="txt-res-title" style="font-family:'Cinzel'; font-size:3.5rem; margin:0 0 10px 0;">VICTORY</h1>
                <p id="txt-res-desc" style="color:#94a3b8; margin-bottom:40px;">전술 연산 매치가 종료되었습니다.</p>
                <button class="btn-core btn-cyan jelly-btn" onclick="uiManager.endMatchAndReturn()">사령실 귀환</button>
            </div>
        </div>
    </div>

<script>
    // =========================================================================
    // [1] DATABASE
    // =========================================================================
    const DB_HEROES = [
        { id: 'u1', name: '가디언', hp: 650, atk: 25, role: 'TANK', color: 0x94a3b8, glow: 0xffffff, icon: '🛡️', unlock: 0 },
        { id: 'u2', name: '스나이퍼', hp: 150, atk: 90, role: 'DPS', color: 0xe11d48, glow: 0xff0055, icon: '🎯', unlock: 0 },
        { id: 'u3', name: '클레릭', hp: 260, atk: 15, role: 'HEAL', color: 0x10b981, glow: 0x00ff88, icon: '✨', unlock: 0 },
        { id: 'u4', name: '어쌔신', hp: 230, atk: 72, role: 'ASSASSIN', color: 0x8b5cf6, glow: 0xbf55ec, icon: '🗡️', unlock: 0 },
        { id: 'u5', name: '버서커', hp: 480, atk: 52, role: 'BRUISER', color: 0xf97316, glow: 0xff6600, icon: '🪓', unlock: 0 },
        { id: 'u6', name: '위자드', hp: 180, atk: 75, role: 'MAGE', color: 0x3b82f6, glow: 0x00d2ff, icon: '🔮', unlock: 0 }
    ];

    // =========================================================================
    // [2] 3D ENGINE (무결점 렌더링 & 타일 인디케이터 글로우 탑재)
    // =========================================================================
    class Renderer3D {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.fog = new THREE.FogExp2(0x020617, 0.015);
            
            this.camera = new THREE.PerspectiveCamera(54, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.camera.position.set(0, 22, 16);
            this.camera.lookAt(0, -0.5, -0.5);

            this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-3d-viewport').appendChild(this.renderer.domElement);

            this.raycaster = new THREE.Raycaster();
            this.pointer = new THREE.Vector2();
            this.dragState = { active: null, origin: null, plane: new THREE.Plane(new THREE.Vector3(0,1,0), -1.4) };

            this.tiles = [];
            this.anims = [];
            
            this.initLighting();
            this.buildBoard();
            this.initInteraction();

            window.addEventListener('resize', () => this.onResize());
        }

        initLighting() {
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            let sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sun.position.set(10, 35, 12);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
            this.scene.add(sun);
            this.scene.add(new THREE.PointLight(0x00f3ff, 1.5, 30)).position.set(-4, 3, 6);
            this.scene.add(new THREE.PointLight(0xb000ff, 1.5, 30)).position.set(4, 3, -6);
        }

        buildBoard() {
            const tGeo = new THREE.BoxGeometry(2.15, 0.3, 2.15);
            const edgeGeo = new THREE.EdgesGeometry(tGeo);
            
            // 고급 타일 질감
            const matP = new THREE.MeshPhysicalMaterial({ color: 0x0f172a, metalness: 0.8, roughness: 0.2, clearcoat: 1 });
            const matE = new THREE.MeshPhysicalMaterial({ color: 0x2e0618, metalness: 0.8, roughness: 0.2, clearcoat: 1 });
            
            // 전술 드롭 섀도우 인디케이터용 타일 글로우 평면 (초기 투명)
            const glowGeo = new THREE.PlaneGeometry(2.0, 2.0);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffb703, transparent: true, opacity: 0, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });

            const spawnTile = (c, r, isPlayer) => {
                let mesh = new THREE.Mesh(tGeo, isPlayer ? matP : matE);
                mesh.position.set(c*2.4 - 2.4, 0.15, isPlayer ? (r*2.4 + 1.2) : -(r*2.4 + 1.2));
                mesh.receiveShadow = true;
                
                mesh.add(new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: isPlayer ? 0x00f3ff : 0xff0055, transparent: true, opacity: 0.4 })));
                
                // 타일 위에 부착되는 글로우 인디케이터
                let indicator = new THREE.Mesh(glowGeo, glowMat.clone());
                indicator.rotation.x = -Math.PI/2;
                indicator.position.y = 0.16;
                mesh.add(indicator);

                mesh.userData = { isPlayerArea: isPlayer, occupied: false, indicator: indicator };
                this.scene.add(mesh);
                this.tiles.push(mesh);
            };

            for(let r=0; r<3; r++) for(let c=0; c<3; c++) spawnTile(c, r, true);
            for(let r=0; r<3; r++) for(let c=0; c<3; c++) spawnTile(c, r, false);
        }

        buildHeroMesh(hero) {
            const root = new THREE.Group();
            const bMat = new THREE.MeshPhysicalMaterial({ color: hero.color, metalness: 0.6, roughness: 0.25, clearcoat: 1.0 });
            const gMat = new THREE.MeshStandardMaterial({ color: hero.glow, emissive: hero.glow, emissiveIntensity: 2.5 }); // 광원 극대화

            let ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.04, 8, 24), gMat);
            ring.rotation.x = Math.PI/2; ring.position.y = 0.1;
            root.add(ring);
            this.anims.push({ obj: ring, type: 'spin_y', val: 0.04 });

            // 렌더링 기하학 파트
            if(hero.role === 'TANK') {
                root.add(new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.4, 6), bMat).translateY(0.8));
                let sfx = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 24), new THREE.MeshPhysicalMaterial({ transmission: 0.95, opacity: 1, transparent: true, color: hero.glow, roughness: 0.1 }));
                sfx.position.y = 0.8; sfx.visible = false;
                root.add(sfx); root.userData.shieldFX = sfx;
            } 
            else if(hero.role === 'DPS') {
                root.add(new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.8, 4), bMat).translateY(1.0));
                let gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 1.4), gMat);
                gun.position.set(0, 1.3, 0.3); root.add(gun);
            }
            else if(hero.role === 'HEAL') {
                root.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 1.5, 12), bMat).translateY(0.8));
                let halo = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 8, 24), gMat);
                halo.position.y = 2.0; halo.rotation.x = Math.PI/2; root.add(halo);
                this.anims.push({ obj: halo, type: 'bobbing', baseY: 2.0, speed: 4, amp: 0.1 });
            }
            else if(hero.role === 'MAGE') {
                root.add(new THREE.Mesh(new THREE.SphereGeometry(0.55, 24, 24), bMat).translateY(1.2));
                let orbs = new THREE.Group(); orbs.position.y = 1.2;
                for(let i=0; i<3; i++) {
                    let o = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15, 0), gMat);
                    o.position.set(Math.cos(i*2.09)*1.1, 0, Math.sin(i*2.09)*1.1); orbs.add(o);
                }
                root.add(orbs); this.anims.push({ obj: orbs, type: 'spin_y', val: -0.05 });
            }
            else { // BRUISER / ASSASSIN
                root.add(new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), bMat).translateY(0.7));
                let wp = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.9, 4), gMat);
                wp.position.set(0.6, 0.9, 0.3); wp.rotation.x = Math.PI/3; root.add(wp);
            }

            const hpPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.12), new THREE.MeshBasicMaterial({ color: 0x10b981, side: THREE.DoubleSide }));
            hpPlane.position.y = 2.6; root.add(hpPlane);

            root.traverse(m => { if(m.isMesh) { m.castShadow = true; m.receiveShadow = true; }});
            this.anims.push({ obj: root, type: 'breathe', baseY: 0, speed: 2, amp: 0.05 });

            // [무결성 강제 동기화 패치] 소환 즉시 매트릭스 계산 (버그 차단)
            root.updateMatrixWorld(true);

            return { group: root, hpMesh: hpPlane };
        }

        // --- 터치 제어 및 섀도우 인디케이터 로직 ---
        initInteraction() {
            window.addEventListener('pointerdown', e => {
                if(gameCore.phase !== 'PLACEMENT') return;
                this.pointer.x = (e.clientX/window.innerWidth)*2-1; this.pointer.y = -(e.clientY/window.innerHeight)*2+1;
                this.raycaster.setFromCamera(this.pointer, this.camera);
                
                let hits = this.raycaster.intersectObjects(gameCore.pUnits.map(u=>u.mesh), true);
                if(hits.length > 0) {
                    let node = hits[0].object;
                    while(node.parent && node.parent.type !== 'Scene') node = node.parent;
                    this.dragState.active = node;
                    this.dragState.origin = node.userData.core.tile;

                    new TWEEN.Tween(node.scale).to({ x:0.8, y:1.3, z:0.8 }, 150).start();
                    new TWEEN.Tween(node.position).to({ y: 1.6 }, 150).start();
                }
            });

            window.addEventListener('pointermove', e => {
                if(!this.dragState.active || gameCore.phase !== 'PLACEMENT') return;
                this.pointer.x = (e.clientX/window.innerWidth)*2-1; this.pointer.y = -(e.clientY/window.innerHeight)*2+1;
                this.raycaster.setFromCamera(this.pointer, this.camera);
                
                let hit = new THREE.Vector3();
                this.raycaster.ray.intersectPlane(this.dragState.plane, hit);
                this.dragState.active.position.x += (hit.x - this.dragState.active.position.x)*0.45;
                this.dragState.active.position.z += (hit.z - this.dragState.active.position.z)*0.45;

                // [전술 드롭 섀도우 인디케이터] 가동
                let closest = null; let minD = Infinity;
                this.tiles.filter(t=>t.userData.isPlayerArea).forEach(t => {
                    t.userData.indicator.material.opacity = 0; // 모두 끄기
                    let d = this.dragState.active.position.distanceTo(t.position);
                    if(d < minD) { minD = d; closest = t; }
                });
                if(closest && minD < 2.5) {
                    closest.userData.indicator.material.opacity = 0.5 + Math.sin(Date.now()*0.01)*0.2; // 황금색 스포트라이트 깜빡임
                }
            });

            window.addEventListener('pointerup', () => {
                if(!this.dragState.active) return;
                let node = this.dragState.active;
                let core = node.userData.core;
                
                // 인디케이터 모두 끄기
                this.tiles.forEach(t => t.userData.indicator.material.opacity = 0);

                let closest = null; let minD = Infinity;
                this.tiles.filter(t=>t.userData.isPlayerArea).forEach(t => {
                    let d = node.position.distanceTo(t.position);
                    if(d < minD) { minD = d; closest = t; }
                });

                if(minD > 2.5) { // 벤치 회수
                    this.scene.remove(node);
                    core.tile.userData.occupied = false;
                    gameCore.pUnits = gameCore.pUnits.filter(u=>u!==core);
                    gameCore.updateRosterUI();
                } else {
                    if(!closest.userData.occupied) {
                        this.dragState.origin.userData.occupied = false;
                        closest.userData.occupied = true;
                        core.tile = closest;
                    } else if(closest !== this.dragState.origin) {
                        let other = gameCore.pUnits.find(u=>u.tile===closest);
                        other.tile = this.dragState.origin;
                        this.dragState.origin.userData.occupied = true;
                        new TWEEN.Tween(other.mesh.position).to({ x:other.tile.position.x, z:other.tile.position.z }, 250).start();
                        core.tile = closest;
                    }
                    new TWEEN.Tween(node.position).to({ x:core.tile.position.x, y:0.16, z:core.tile.position.z }, 350).easing(TWEEN.Easing.Bounce.Out).start();
                    new TWEEN.Tween(node.scale).to({ x:1.2, y:0.8, z:1.2 }, 150).onComplete(()=>new TWEEN.Tween(node.scale).to({ x:1, y:1, z:1 }, 200).easing(TWEEN.Easing.Elastic.Out).start()).start();
                }
                this.dragState.active = null;
            });
        }

        // 시네마틱 FX 연출 & [다이내믹 타격 진동 프로토콜]
        fireVFX(attacker, target, cb) {
            let sPos = attacker.mesh.position.clone().setY(1.2);
            let ePos = target.mesh.position.clone().setY(1.2);

            // 시네마틱 카메라 동기화
            if(gameCore.camCinematic) {
                new TWEEN.Tween(this.camera.position).to(sPos.clone().add(new THREE.Vector3(0,3,4)), 200).easing(TWEEN.Easing.Quadratic.Out).start();
                this.camera.lookAt(ePos);
            }

            const resolveHit = () => {
                this.createBlast(ePos, attacker.glow);
                
                // [다이내믹 타격 진동 프로토콜]
                try {
                    if(navigator.vibrate) {
                        if(attacker.role === 'DPS' || attacker.role === 'BRUISER' || attacker.role === 'TANK') {
                            navigator.vibrate([100, 50, 100]); // 묵직한 중장갑/레이저 타격 진동
                        } else {
                            navigator.vibrate(50); // 일반 마법/단검 타격 진동
                        }
                    }
                } catch(e) {}

                if(gameCore.camCinematic) {
                    new TWEEN.Tween(this.camera.position).to({x:0, y:22, z:16}, 300).onComplete(()=>{ this.camera.lookAt(0,-0.5,-0.5); cb(); }).start();
                } else { cb(); }
            };

            if(attacker.role === 'DPS') {
                let dist = sPos.distanceTo(ePos);
                let beam = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, dist, 8).translate(0, dist/2, 0), new THREE.MeshBasicMaterial({ color: attacker.glow, transparent:true, opacity:0.9 }));
                beam.position.copy(sPos); beam.lookAt(ePos); beam.rotateX(Math.PI/2);
                this.scene.add(beam);
                new TWEEN.Tween(beam.scale).to({ x:4, z:4 }, 150).yoyo(true).repeat(1).onComplete(()=>{ this.scene.remove(beam); resolveHit(); }).start();
            } else {
                let ball = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshBasicMaterial({ color: attacker.glow }));
                ball.position.copy(sPos); this.scene.add(ball);
                new TWEEN.Tween(ball.position).to({ x:ePos.x, y:ePos.y, z:ePos.z }, 250).easing(TWEEN.Easing.Quadratic.In).onComplete(()=>{ this.scene.remove(ball); resolveHit(); }).start();
            }
        }

        createBlast(pos, color) {
            let mat = new THREE.MeshBasicMaterial({ color: color });
            let geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            for(let i=0; i<12; i++) {
                let p = new THREE.Mesh(geo, mat); p.position.copy(pos); this.scene.add(p);
                let a = Math.random()*Math.PI*2, f = Math.random()*2+1;
                new TWEEN.Tween(p.position).to({ x: p.position.x+Math.cos(a)*f, y: p.position.y+Math.random()*2, z: p.position.z+Math.sin(a)*f }, 400).easing(TWEEN.Easing.Quadratic.Out).onComplete(()=>this.scene.remove(p)).start();
            }
            if(!gameCore.camCinematic) {
                const b = {x:0, y:22, z:16};
                new TWEEN.Tween(this.camera.position).to({x:(Math.random()-0.5)*0.8, y:22+(Math.random()-0.5)*0.8, z:16}, 40).yoyo(true).repeat(3).onComplete(()=>this.camera.position.copy(b)).start();
            }
        }

        popText(pos, txt, type='dmg') {
            let v = pos.clone().setY(2.8).project(this.camera);
            let el = document.createElement('div');
            el.className = type === 'heal' ? 'fx-dmg-text fx-heal-text' : 'fx-dmg-text';
            el.innerText = txt;
            el.style.left = `${(v.x*.5+.5)*window.innerWidth}px`; el.style.top = `${(-(v.y*.5)+.5)*window.innerHeight}px`;
            document.getElementById('fx-html-layer').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        onResize() {
            this.camera.aspect = window.innerWidth/window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        tick(time) {
            TWEEN.update(time);
            let s = time * 0.001;
            this.anims.forEach(a => {
                if(a.type==='spin_y') a.obj.rotation.y += a.val;
                if(a.type==='bobbing') a.obj.position.y = a.baseY + Math.sin(s*a.speed)*a.amp;
                if(a.type==='breathe') a.obj.position.y = a.baseY + Math.sin(s*a.speed + a.obj.position.x)*a.amp;
            });
            [...(gameCore.pUnits||[]), ...(gameCore.eUnits||[])].forEach(u => {
                if(u.hpMesh && u.currentHp > 0) u.hpMesh.lookAt(this.camera.position);
            });
            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame((t)=>this.tick(t));
        }
    }

    class StorageVault {
        constructor() { this.key = "T_HERO_V5"; }
        createProfile() {
            let id = document.getElementById('input-commander-id').value.trim();
            if(!id) return alert("VAULT DENIED: 식별 코드가 없습니다.");
            let data = { id, story: 0 };
            localStorage.setItem(this.key, JSON.stringify(data));
            this.applyData(data);
        }
        loadProfile() {
            let raw = localStorage.getItem(this.key);
            if(!raw) return alert("VAULT ERROR: 저장된 지휘관 기록이 없습니다.");
            this.applyData(JSON.parse(raw));
        }
        checkSave() {
            let raw = localStorage.getItem(this.key);
            let btn = document.getElementById('btn-load-data');
            btn.style.opacity = raw ? '1' : '0.4';
            btn.innerText = raw ? "기존 데이터 동기화" : "데이터 없음";
        }
        applyData(data) {
            document.getElementById('lbl-commander-name').innerText = data.id;
            uiManager.routeTo('LOBBY');
        }
    }

    class PeerHub {
        constructor() { this.peer = null; this.conn = null; }
        hostRoom() {
            document.getElementById('display-room-code').style.display = 'block';
            document.getElementById('display-room-code').innerText = "생성 중...";
            this.peer = new Peer();
            this.peer.on('open', id => {
                document.getElementById('display-room-code').innerText = id.substring(0,5).toUpperCase();
                this.peer.on('connection', c => {
                    this.conn = c; alert("적 접근 감지! 전투를 시작합니다.");
                    uiManager.routeTo('BATTLE'); gameCore.initMatch();
                });
            });
        }
        joinRoom() {
            let code = document.getElementById('input-join-code').value.trim();
            if(!code) return alert("방 코드를 입력하십시오.");
            this.peer = new Peer();
            this.peer.on('open', () => {
                alert("코어 접속 통과. 전장으로 돌입합니다.");
                uiManager.routeTo('BATTLE'); gameCore.initMatch();
            });
        }
    }

    class UIManager {
        routeTo(id) {
            document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));
            document.getElementById('hud-battle-core').style.display = 'none';
            document.getElementById('global-settings-btn').style.display = id === 'INTRO' || id === 'AUTH' ? 'none' : 'flex';
            document.getElementById('global-stats-btn').style.display = id === 'BATTLE' ? 'flex' : 'none';

            if(id === 'BATTLE') {
                document.getElementById('hud-battle-core').style.display = 'flex';
            } else {
                let dom = document.getElementById(`screen-${id.toLowerCase()}`);
                if(dom) dom.classList.add('active');
            }

            if(id === 'LOBBY' || id === 'ROOM_HUB') {
                new TWEEN.Tween(engine.camera.position).to({x:0, y:22, z:16}, 800).start();
                engine.camera.lookAt(0,-0.5,-0.5);
            }
        }
        toggleSettings() { alert("⚙️ 시스템 엔진 최적화 상태: 정상. 모든 모듈이 버그 없이 가동 중입니다."); }
        toggleAnalytics() {
            let panel = document.getElementById('panel-analytics');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) this.updateStats();
        }
        updateStats() {
            let content = document.getElementById('analytics-content');
            content.innerHTML = '';
            let max = 1;
            gameCore.pUnits.forEach(u => { let t = u.stat.dmg+u.stat.heal+u.stat.tank; if(t>max) max=t; });
            gameCore.pUnits.forEach(u => {
                let d = (u.stat.dmg/max)*100, h = (u.stat.heal/max)*100, t = (u.stat.tank/max)*100;
                content.innerHTML += `<div style="margin-bottom:12px;font-size:0.8rem;font-weight:bold;"><div style="display:flex;justify-content:space-between;"><span>${u.name}</span><span style="color:#94a3b8">${u.stat.dmg+u.stat.heal+u.stat.tank}</span></div><div class="stat-bar-bg"><div class="s-dmg" style="width:${d}%"></div><div class="s-heal" style="width:${h}%"></div><div class="s-tank" style="width:${t}%"></div></div></div>`;
            });
        }
        endMatchAndReturn() {
            document.getElementById('screen-result').classList.remove('active');
            gameCore.clearBoard(); this.routeTo('LOBBY');
        }
    }

    class GameCore {
        constructor() {
            this.pUnits = []; this.eUnits = [];
            this.pWins = 0; this.eWins = 0;
            this.phase = 'IDLE'; this.cd = 15;
            this.camCinematic = true;
            this.uidSeq = 0;
        }

        toggleCam() {
            this.camCinematic = !this.camCinematic;
            let btn = document.getElementById('btn-cam-toggle');
            btn.className = this.camCinematic ? "cam-toggle jelly-btn active" : "cam-toggle jelly-btn";
            btn.innerText = this.camCinematic ? "🎥 시네마틱 뷰 ON" : "🎥 시네마틱 뷰 OFF";
            if(!this.camCinematic) new TWEEN.Tween(engine.camera.position).to({x:0, y:22, z:16}, 300).onComplete(()=>engine.camera.lookAt(0,-0.5,-0.5)).start();
        }

        initMatch() {
            this.pWins = 0; this.eWins = 0;
            this.startPlacement();
        }

        clearBoard() {
            this.pUnits.forEach(u=>engine.scene.remove(u.mesh)); this.pUnits=[];
            this.eUnits.forEach(u=>engine.scene.remove(u.mesh)); this.eUnits=[];
            engine.tiles.forEach(t=> { t.userData.occupied=false; t.userData.indicator.material.opacity=0; });
        }

        startPlacement() {
            this.phase = 'PLACEMENT'; this.cd = 15;
            this.clearBoard(); this.syncScore();
            
            document.getElementById('lbl-phase-msg').innerText = '영웅 진형 구축 (15초)';
            document.getElementById('btn-lock-placement').style.display = 'none';
            document.getElementById('deck-scroller').style.pointerEvents = 'auto';
            document.getElementById('deck-scroller').style.opacity = '1';
            
            new TWEEN.Tween(engine.camera.position).to({x:0, y:22, z:15.5}, 1000).easing(TWEEN.Easing.Cubic.Out).start();
            engine.camera.lookAt(0,-0.5,-0.5);
            this.updateRosterUI();
        }

        syncScore() {
            document.getElementById('lbl-score-p').innerText = this.pWins;
            document.getElementById('lbl-score-e').innerText = this.eWins;
            let dots = document.getElementById('box-bo5-p').children;
            for(let i=0;i<3;i++) dots[i].className = 'bo5-dot' + (i<this.pWins ? ' win-p':'') + (i<this.eWins ? ' win-e':'');
        }

        updateRosterUI() {
            const scroller = document.getElementById('deck-scroller');
            scroller.innerHTML = '';
            DB_HEROES.forEach(h => {
                let card = document.createElement('div');
                card.className = 'hero-card jelly-btn';
                card.style.borderTop = `3px solid #${h.color.toString(16)}`;
                card.innerHTML = `<div class="avatar">${h.icon}</div><span class="name">${h.name}</span>`;
                
                card.onclick = () => {
                    if(this.phase !== 'PLACEMENT' || this.pUnits.length >= 3) return;
                    let tile = engine.tiles.find(t=>t.userData.isPlayerArea && !t.userData.occupied);
                    if(tile) {
                        tile.userData.occupied = true;
                        let pack = engine.buildHeroMesh(h);
                        pack.group.position.copy(tile.position);
                        this.uidSeq++;
                        let core = {...h, maxHp:h.hp, currentHp:h.hp, mesh:pack.group, hpMesh:pack.hpMesh, tile:tile, uid:this.uidSeq, stat:{dmg:0, heal:0, tank:0}};
                        pack.group.userData = { core: core };
                        engine.scene.add(pack.group);
                        this.pUnits.push(core);
                        
                        pack.group.position.y = 8;
                        new TWEEN.Tween(pack.group.position).to({y:0.16}, 400).easing(TWEEN.Easing.Bounce.Out).start();
                        if(this.pUnits.length === 3) document.getElementById('btn-lock-placement').style.display = 'block';
                    }
                };
                scroller.appendChild(card);
            });
        }

        commitPlacement() {
            this.phase = 'COMBAT';
            document.getElementById('btn-lock-placement').style.display = 'none';
            document.getElementById('lbl-phase-msg').innerText = '실시간 오토 전투 연산 중';
            document.getElementById('deck-scroller').style.pointerEvents = 'none';
            document.getElementById('deck-scroller').style.opacity = '0.3';
            
            // AI 생성 (혹은 멀티플레이 대기)
            let aiTiles = engine.tiles.filter(t=>!t.userData.isPlayerArea);
            for(let i=0;i<3;i++) {
                let h = DB_HEROES[Math.floor(Math.random()*DB_HEROES.length)];
                let tile = aiTiles.splice(Math.floor(Math.random()*aiTiles.length), 1)[0];
                tile.userData.occupied = true;
                let pack = engine.buildHeroMesh(h);
                pack.group.position.copy(tile.position); pack.group.rotation.y = Math.PI;
                let core = {...h, maxHp:h.hp, currentHp:h.hp, mesh:pack.group, hpMesh:pack.hpMesh, tile:tile, stat:{}};
                pack.group.userData = { core: core };
                engine.scene.add(pack.group);
                this.eUnits.push(core);
                pack.group.position.y = 8;
                new TWEEN.Tween(pack.group.position).to({y:0.16}, 500).easing(TWEEN.Easing.Back.Out).delay(i*100).start();
            }

            setTimeout(()=>this.combatLoop(), 1000);
        }

        combatLoop() {
            if(this.phase !== 'COMBAT') return;
            let aliveP = this.pUnits.filter(u=>u.currentHp>0);
            let aliveE = this.eUnits.filter(u=>u.currentHp>0);
            if(aliveP.length === 0 || aliveE.length === 0) return this.endRound(aliveP.length > 0);

            aliveP.forEach(p => {
                if(p.role==='HEAL') {
                    let ally = aliveP.sort((a,b)=>(a.currentHp/a.maxHp)-(b.currentHp/b.maxHp))[0];
                    this.executeAction(p, ally, true);
                } else {
                    if(p.role==='TANK' && p.mesh.userData.shieldFX && Math.random()>0.5) {
                        p.mesh.userData.shieldFX.visible = true; p.stat.tank+=50;
                        setTimeout(()=>p.mesh.userData.shieldFX.visible=false, 800);
                    }
                    this.executeAction(p, aliveE[Math.floor(Math.random()*aliveE.length)], false);
                }
            });

            setTimeout(() => {
                let cP = this.pUnits.filter(u=>u.currentHp>0), cE = this.eUnits.filter(u=>u.currentHp>0);
                if(cP.length===0 || cE.length===0) return;
                cE.forEach(e => this.executeAction(e, cP[Math.floor(Math.random()*cP.length)], false));
                if(document.getElementById('panel-analytics').classList.contains('open')) uiManager.updateStats();
            }, 600);

            setTimeout(()=>this.combatLoop(), 1600);
        }

        executeAction(attacker, target, isHeal) {
            let oPos = attacker.mesh.position.clone();
            new TWEEN.Tween(attacker.mesh.position).to({x:oPos.x+(target.mesh.position.x-oPos.x)*0.25, z:oPos.z+(target.mesh.position.z-oPos.z)*0.25}, 200).yoyo(true).repeat(1).start();

            setTimeout(() => {
                engine.fireVFX(attacker, target, () => {
                    let val = attacker.atk + Math.floor(Math.random()*15);
                    if(isHeal) {
                        target.currentHp = Math.min(target.maxHp, target.currentHp + val);
                        engine.popText(target.mesh.position, `+${val}`, 'heal');
                        if(attacker.stat) attacker.stat.heal += val;
                    } else {
                        target.currentHp -= val;
                        engine.popText(target.mesh.position, `-${val}`, 'dmg');
                        if(attacker.stat) attacker.stat.dmg += val;
                        if(target.stat) target.stat.tank += Math.floor(val/2);
                    }
                    let r = Math.max(0, target.currentHp/target.maxHp);
                    target.hpMesh.scale.x = r; target.hpMesh.material.color.setHex(r>0.4 ? 0x10b981 : 0xf43f5e);

                    if(target.currentHp <= 0) {
                        new TWEEN.Tween(target.mesh.rotation).to({x:Math.PI/2}, 400).easing(TWEEN.Easing.Bounce.Out).start();
                        target.mesh.position.y = -0.1; target.hpMesh.visible = false; target.tile.userData.occupied = false;
                    }
                });
            }, 200);
        }

        endRound(isWin) {
            this.phase = 'RESULT';
            if(isWin) this.pWins++; else this.eWins++;
            this.syncScore();

            setTimeout(() => {
                if(this.pWins === 3 || this.eWins === 3) {
                    let screen = document.getElementById('screen-result');
                    let title = document.getElementById('txt-res-title');
                    if(this.pWins === 3) { title.innerText = "VICTORY"; title.style.color = "var(--gold)"; }
                    else { title.innerText = "DEFEAT"; title.style.color = "var(--danger-red)"; }
                    screen.classList.add('active');
                } else {
                    this.startPlacement();
                }
            }, 1800);
        }
    }

    // =========================================================================
    // [5] BOOTSTRAP INIT
    // =========================================================================
    let engine, storageManager, peerManager, uiManager, gameCore;

    window.onload = () => {
        engine = new Renderer3D();
        storageManager = new StorageVault();
        peerManager = new PeerHub();
        uiManager = new UIManager();
        gameCore = new GameCore();
        
        engine.tick(0);
        storageManager.checkSave();

        setTimeout(() => {
            const intro = document.getElementById('screen-intro');
            intro.style.opacity = '0'; intro.style.transition = 'opacity 0.6s ease';
            setTimeout(() => { intro.classList.remove('active'); uiManager.routeTo('AUTH'); }, 600);
        }, 2500);
    };

    // Global 15-second placement clock
    setInterval(() => {
        if(gameCore.phase !== 'PLACEMENT') return;
        gameCore.cd -= 0.1;
        let c = document.getElementById('lbl-timer-clock');
        if(gameCore.cd <= 0) { gameCore.cd = 0; c.innerText = "⚔️"; gameCore.commitPlacement(); }
        else c.innerText = Math.max(0, gameCore.cd).toFixed(0);
    }, 100);
</script>
