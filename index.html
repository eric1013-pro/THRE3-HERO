<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THRE3 HERO: Flawless AI Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <style>
        :root {
            --gold: #ffb703; --gold-glow: rgba(255, 183, 3, 0.5);
            --neon-cyan: #00f3ff; --neon-cyan-glow: rgba(0, 243, 255, 0.4);
            --neon-purple: #b000ff; --neon-purple-glow: rgba(176, 0, 255, 0.3);
            --bg-deep: #020408; --glass-card: rgba(8, 14, 24, 0.75);
            --glass-border: rgba(0, 243, 255, 0.25);
            --danger: #ff2a5f; --safe: #00ff88;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-deep); font-family: 'Noto Serif KR', serif; color: #f0f4f8; }
        
        #viewport-wrapper { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        #canvas-3d-context { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }
        #fx-html-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; overflow: hidden; }

        .live-aurora-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at 15% 20%, rgba(0, 243, 255, 0.12) 0%, transparent 50%), radial-gradient(circle at 85% 85%, rgba(176, 0, 255, 0.18) 0%, transparent 50%); animation: auroraPulse 8s infinite alternate linear; }
        @keyframes auroraPulse { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        .glass-panel { background: var(--glass-card); backdrop-filter: blur(30px) saturate(160%); -webkit-backdrop-filter: blur(30px) saturate(160%); border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.08); }
        .jelly-bounce { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s, filter 0.2s; cursor: pointer; }
        .jelly-bounce:active { transform: scale(0.88) translateY(2px); filter: brightness(1.3); }

        .game-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 25px env(safe-area-inset-right, 20px) 25px env(safe-area-inset-left, 20px); box-sizing: border-box; background: rgba(3, 7, 18, 0.3); }
        .game-screen.active { display: flex; }

        #tactical-briefing-toast { position: absolute; top: -120px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 360px; border-radius: 18px; padding: 15px 20px; text-align: center; font-weight: 700; font-size: 0.9rem; border-left: 4px solid var(--neon-cyan); box-shadow: 0 12px 35px rgba(0,0,0,0.6); z-index: 2000; pointer-events: none; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; opacity: 0; }
        #tactical-briefing-toast.show { top: calc(env(safe-area-inset-top, 20px) + 15px); opacity: 1; }

        #screen-lobby { justify-content: space-between; padding: calc(env(safe-area-inset-top, 20px) + 30px) 25px env(safe-area-inset-bottom, 30px) 25px; }
        .lobby-title-core h1 { font-family: 'Cinzel'; font-size: 3.5rem; margin: 0; color: var(--gold); text-shadow: 0 0 25px var(--gold-glow); text-align: center; line-height: 1.1; }
        .lobby-title-core p { font-size: 0.85rem; color: #38bdf8; letter-spacing: 5px; text-transform: uppercase; text-align: center; margin: 8px 0 0 0; font-weight: 700; }
        
        .btn-action-block { width: 100%; padding: 18px; border-radius: 16px; font-family: 'Noto Serif KR'; font-size: 1.2rem; font-weight: 900; border: none; cursor: pointer; display: block; text-align: center; color: white; }
        .btn-cyan { background: linear-gradient(135deg, #00f3ff 0%, #0055ff 100%); color: #000; box-shadow: 0 6px 20px var(--neon-cyan-glow); }

        #screen-story-map { display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 30px) 15px env(safe-area-inset-bottom, 20px) 15px; }
        .top-navigation-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; pointer-events: auto; }
        .btn-circle-back { background: none; border: 1px solid var(--glass-border); color: #fff; padding: 10px 20px; border-radius: 14px; font-weight: bold; }
        
        .split-map-viewport { width: 100%; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; overflow: hidden; margin-top: 15px; }
        .scroller-node-area { width: 100%; height: 50%; overflow-y: auto; display: flex; flex-direction: column-reverse; align-items: center; gap: 45px; padding: 20px 0; -webkit-overflow-scrolling: touch; }
        .scroller-node-area::-webkit-scrollbar { display: none; }
        
        .map-node-sphere { width: 74px; height: 74px; border-radius: 50%; background: #070b12; border: 3px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; }
        .map-node-sphere.cleared { border-color: var(--safe); background: rgba(0, 255, 136, 0.08); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .map-node-sphere.target { border-color: var(--gold); background: rgba(212, 175, 55, 0.15); box-shadow: 0 0 25px var(--gold); transform: scale(1.1); animation: nodePulse 1.8s infinite; }
        .map-node-sphere.locked { opacity: 0.3; filter: grayscale(100%); }
        .pipeline-vector { position: absolute; width: 4px; height: 50px; background: #334155; z-index: 1; top: -48px; }
        .pipeline-vector.cleared { background: var(--safe); }
        @keyframes nodePulse { 0%, 100% { box-shadow: 0 0 10px var(--gold-glow); } 50% { box-shadow: 0 0 25px var(--gold); } }

        .reward-preview-panel { width: 100%; height: 48%; border-radius: 24px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative; pointer-events: auto; }
        .sub-3d-stage-zone { width: 100%; height: 110px; border-radius: 14px; background: rgba(15,23,42,0.5); border: 1px solid var(--glass-border); margin: 5px 0; }

        #hud-battle-core { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 20px) 15px env(safe-area-inset-bottom, 20px) 15px; z-index: 25; box-sizing: border-box; }
        .hud-top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; pointer-events: auto; }
        .badge-hud-score { padding: 10px 18px; border-radius: 16px; min-width: 80px; text-align: center; }
        .badge-hud-score h3 { font-family: 'Cinzel'; font-size: 1.8rem; margin: 0; font-weight: 900; }
        .center-clock-hub { display: flex; flex-direction: column; align-items: center; }
        .clock-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 1.6rem; font-weight: 900; color: var(--gold); border: 2px solid var(--gold); background: rgba(0,0,0,0.6); box-shadow: 0 0 15px var(--gold-glow); }
        .bo5-row { display: flex; gap: 5px; margin-top: 6px; }
        .bo5-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #4a5568; }
        .bo5-dot.p-win { background: var(--safe); border-color: var(--safe); box-shadow: 0 0 8px var(--safe); }
        .bo5-dot.e-win { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 8px var(--danger); }

        .utility-floating-container { position: absolute; left: 15px; top: 110px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn-side-toggle { padding: 8px 14px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; color: white; border: 1px solid var(--glass-border); background: var(--glass-card); }
        .btn-side-toggle.active { background: rgba(0, 243, 255, 0.2); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan-glow); }

        #panel-analytics-drawer { position: absolute; right: -350px; top: 110px; width: 280px; border-radius: 20px 0 0 20px; padding: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); pointer-events: auto; z-index: 998; border-right: none; }
        #panel-analytics-drawer.open { right: 0; }
        .stat-bar-track { width: 100%; height: 6px; background: #1a202c; border-radius: 3px; display: flex; overflow: hidden; margin-top: 5px; }
        .bar-dmg { background: var(--danger); transition: width 0.3s; } .bar-heal { background: var(--safe); transition: width 0.3s; } .bar-tank { background: #3182ce; transition: width 0.3s; }

        #panel-spec-details { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 290px; border-radius: 24px; padding: 30px 20px; text-align: center; display: none; opacity: 0; z-index: 100; pointer-events: auto; border: 1px solid var(--gold-border); }

        .battle-footer-ctrl { display: flex; flex-direction: column; gap: 10px; width: 100%; pointer-events: auto; max-width: 480px; margin: 0 auto; }
        .ticker-bar-node { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-radius: 16px; }
        #scroller-deck-field { width: 100%; overflow-x: auto; display: flex; gap: 10px; padding: 12px 6px; border-radius: 18px; -webkit-overflow-scrolling: touch; }
        #scroller-deck-field::-webkit-scrollbar { display: none; }
        .deck-card-node { min-width: 75px; height: 92px; border-radius: 15px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: rgba(15,23,42,0.6); }
        .deck-card-node .emoji { font-size: 1.3rem; margin-bottom: 4px; }
        .deck-card-node .name { font-size: 0.7rem; font-weight: 900; }
        .deck-card-node.locked-card { filter: grayscale(100%); opacity: 0.25; }
        .deck-card-node.locked-card::after { content: '🔒'; position: absolute; font-size: 1.1rem; }

        #screen-match-end { background: rgba(2,3,6,0.92); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 300; }
        .result-box-node { width: 86%; max-width: 345px; padding: 45px 25px; border-radius: 28px; text-align: center; border: 1px solid var(--glass-border); }

        .dmg-popup-txt { position: absolute; font-family: 'Cinzel'; font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--danger), 2px 2px 0 #000; transform: translate(-50%, -50%); pointer-events: none; animation: popupFloat 0.8s ease-out forwards; }
        @keyframes popupFloat { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.4); } 25% { transform: translate(-50%, -90%) scale(1.3); } 100% { opacity: 0; transform: translate(-50%, -170%) scale(0.8); } }
    </style>
</head>
<body>

    <div class="live-aurora-bg"></div>
    <div id="viewport-wrapper">
        <div id="canvas-3d-context"></div>
        <div id="fx-html-overlay"></div>

        <div id="tactical-briefing-toast" class="glass-panel">BRIEFING SYSTEM ONLINE</div>

        <div id="screen-intro" class="game-screen active">
            <div class="neon-brand-logo" id="brand-logo-node" style="font-family:'Cinzel'; font-size:3rem; font-weight:900; color:var(--neon-cyan); text-shadow:0 0 15px var(--neon-cyan); letter-spacing:6px;">THRE3RIC STUDIO</div>
        </div>

        <div id="screen-lobby" class="game-screen">
            <div class="lobby-top-bar">
                <div class="commander-tag">🎖️ SYSTEM: FLAWLESS RUN</div>
                <div class="glass-panel" style="padding:6px 14px; border-radius:10px; font-family:'Cinzel'; font-size:0.75rem; color:var(--neon-cyan); border-color:var(--glass-border);">LOCAL LEAGUE</div>
            </div>
            <div class="lobby-title-core">
                <h1>THRE3 HERO</h1>
                <p>Strategic Control Center</p>
            </div>
            <div style="width:100%; max-width:320px;">
                <button class="btn-action-block btn-cyan jelly-bounce" onclick="viewController.renderStoryCampaignMap()">📖 스토리 캠페인 모드 진입</button>
            </div>
        </div>

        <div id="screen-story-map" class="game-screen">
            <div class="top-navigation-bar">
                <button class="btn-circle-back glass-panel jelly-bounce" onclick="viewController.changeScreen('LOBBY')">↩ 로비 복귀</button>
                <span style="font-family:'Cinzel'; font-weight:900; color:var(--gold);">CAMPAIGN SECTORS</span>
            </div>
            <div class="split-map-viewport">
                <div class="scroller-node-area" id="box-nodes-container"></div>
                <div class="reward-preview-panel glass-panel">
                    <div>
                        <div style="font-size:0.7rem; color:var(--gold); font-weight:900; letter-spacing:1px;">SECTOR COMPLETION REWARD</div>
                        <h2 id="lbl-reward-name" style="margin:2px 0 0 0; font-size:1.2rem; color:white; text-decoration: underline;">영웅 사양서 데이터</h2>
                    </div>
                    <div class="sub-3d-stage-zone" id="sub-3d-preview-stage"></div>
                    <p id="lbl-reward-desc" style="font-size:0.75rem; color:#cbd5e0; margin:0; line-height:1.4; text-align:left; background:rgba(15,23,42,0.6); padding:8px; border-radius:8px; border:1px solid var(--glass-border);"></p>
                </div>
            </div>
        </div>

        <div id="hud-battle-core" style="display:none;">
            <div class="hud-top-row">
                <div class="badge-hud-score glass-panel">
                    <span>YOU</span>
                    <h2 id="txt-score-p">0</h2>
                </div>
                <div class="center-clock-hub">
                    <div class="clock-circle" id="txt-timer-clock">15</div>
                    <div class="bo5-row" id="box-bo5-dots">
                        <div class="bo5-dot"></div><div class="bo5-dot"></div><div class="bo5-dot"></div>
                    </div>
                </div>
                <div class="badge-hud-score glass-panel">
                    <span>AI OMEGA</span>
                    <h2 id="txt-score-e" style="color:var(--danger);">0</h2>
                </div>
            </div>

            <div class="utility-floating-container">
                <button id="btn-camera-switch" class="btn-side-toggle jelly-bounce active" onclick="gameCore.toggleCamMode()">🎥 시네마틱 ON</button>
                <button class="btn-side-toggle jelly-bounce" style="color:var(--gold);" onclick="viewController.toggleAnalyticsDrawer()">📊 실시간 통계</button>
            </div>

            <div id="panel-analytics-drawer" class="glass-panel">
                <h4 style="margin:0 0 15px 0; color:var(--gold); border-bottom:1px solid rgba(0,243,255,0.15); padding-bottom:10px;">📊 실시간 전투 분석</h4>
                <div style="display:flex; gap:10px; font-size:0.7rem; margin-bottom:15px;">
                    <span style="color:var(--danger);">■ 가해</span> <span style="color:var(--safe);">■ 치유</span> <span style="color:#3182ce;">■ 방어</span>
                </div>
                <div id="analytics-content-field"></div>
            </div>

            <div id="panel-spec-details" class="glass-panel">
                <h3 id="lbl-spec-title">UNIT SPEC</h3>
                <p id="lbl-spec-role" style="font-family:'Cinzel'; font-size:0.75rem; color:#38bdf8; margin:5px 0; font-weight:bold;"></p>
                <p id="lbl-spec-hp-atk" style="font-size:0.85rem; color:#e2e8f0; font-weight:bold;"></p>
                <p id="lbl-spec-desc" style="font-size:0.8rem; color:#cbd5e0; border-top:1px solid var(--glass-border); padding-top:10px; line-height:1.4; text-align:left;"></p>
                <button class="btn-action-block btn-cyan jelly-bounce" style="margin-top:15px; padding:10px; font-size:0.9rem; border-radius:10px;" onclick="viewController.closeSpecPanel()">확인 완료</button>
            </div>

            <div class="battle-footer-ctrl">
                <div class="ticker-bar-node glass-panel">
                    <span id="lbl-phase-ticker" style="font-size:0.85rem; font-weight:bold; color:var(--neon-cyan);">영웅 배치 단계</span>
                    <button id="btn-placement-confirm" class="jelly-bounce" style="padding:8px 18px; border-radius:10px; background:var(--gold); border:none; font-weight:900; font-size:0.8rem; display:none;" onclick="gameCore.lockPlacementPhase()">배치 완료</button>
                </div>
                <div id="scroller-deck-field" class="glass-panel"></div>
            </div>
        </div>

        <div id="screen-match-end" class="game-screen">
            <div class="result-box-node glass-panel">
                <h1 id="txt-match-title" style="font-family:'Cinzel'; font-size:3.5rem; margin:0 0 10px 0;">VICTORY</h1>
                <p id="txt-match-desc" style="color:#94a3b8; font-size:0.9rem; margin-bottom:35px;">전술 시뮬레이션 매치가 종료되었습니다.</p>
                <button class="btn-action-block btn-cyan jelly-bounce" style="margin:0; width:100%;" onclick="viewController.routeBackFromBattle()">사령실 귀환</button>
            </div>
        </div>
    </div>

<script>
    // =========================================================================
    // 전역 컨트롤러 스코프 완전 노출 (ReferenceError 원천 방지)
    // =========================================================================
    var engine3D, viewController, uiManager, gameCore;

    const UNIT_DICTIONARY = [
        { id: 'u1', name: '가디언', hp: 640, atk: 22, role: 'TANK', color: 0x94a3b8, glow: 0xffffff, icon: '🛡️', unlockLv: 0, skill: '[절대성벽 방벽전개] 매  턴 개시 연산 시 50%의 난수 확률로 홀로그램 구체 방어 장막을 생성하여 피격 대미지를 완전히 흡수 차단합니다.' },
        { id: 'u2', name: '스나이퍼', hp: 140, atk: 88, role: 'DPS', color: 0xe11d48, glow: 0xff0055, icon: '🎯', unlockLv: 0, skill: '[입자 가속 집속레이저] 타격 시 탄환이 아닌 고출력 빔 라인을 대칭 동기화하여 상대의 원거리 후열 조합에 파괴적인 즉시 치명타를 투사합니다.' },
        { id: 'u3', name: '클레릭', hp: 250, atk: 15, role: 'HEAL', color: 0x10b981, glow: 0x00ff88, icon: '✨', unlockLv: 0, skill: '[여신의 오라 광역치유] 일반 타격 명령을 생략하고, 전장에 생존한 아군 유닛 중 피해율이 가장 높은 대상을 추적해 생명 복구를 수행합니다.' },
        { id: 'u4', name: '어쌔신', hp: 220, atk: 72, role: 'ASSASSIN', color: 0x8b5cf6, glow: 0xbf55ec, icon: '🗡️', unlockLv: 0, skill: '[그림자 역천 기습] 전술 가속 매트릭스가 발동하여 아군 최전방의 저지선을 우회하고, 적의 약점인 최후방 딜러나 힐러 라인을 암살 기습합니다.' },
        { id: 'u5', name: '버서커', hp: 480, atk: 48, role: 'BRUISER', color: 0xf97316, glow: 0xff6600, icon: '🪓', unlockLv: 0, skill: '[혈기 폭주 연쇄분쇄] 코어 자체 생명력 손실 비례량이 누적될수록 가해 연산 수치를 한계점 이상(최대 1.6배)으로 폭발 스케일링합니다.' },
        { id: 'u6', name: '위자드', hp: 180, atk: 75, role: 'MAGE', color: 0x3b82f6, glow: 0x00d2ff, icon: '🔮', unlockLv: 0, skill: '[차원 붕괴 유성우] 주위를 자전하는 3개의 마법 증폭 코어를 강제 가속하여, 상대 전열 전체 영역에 도트 광역 폭격을 동시 배포합니다.' },

    // =========================================================================
    // [2] 3D GRAPHICS PIPELINE ENGINE
    // =========================================================================
    class FlawlessGraphicsEngine {
        constructor() {
            this.container = document.getElementById('canvas-3d-context');
            this.scene = new THREE.Scene();
            this.scene.fog = new THREE.FogExp2(0x020408, 0.016);

            this.camera = new THREE.PerspectiveCamera(54, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.camera.position.set(0, 22, 16);
            this.camera.lookAt(0, -0.5, -0.5);

            this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
            this.renderer.toneMappingExposure = 1.35;
            this.container.appendChild(this.renderer.domElement);

            this.raycaster = new THREE.Raycaster();
            this.pointer = new THREE.Vector2();
            this.dragState = { activeGroup: null, previousTile: null, targetPlane: new THREE.Plane(new THREE.Vector3(0,1,0), -0.16) };

            this.boardTiles3D = [];
            this.tweenAnimQueue = [];
            this.cosmicStars = [];

            this.initIllumination();
            this.generateCosmicDust();
            this.buildHighVisibilityBoard();
            this.bindInputInteractions();

            window.addEventListener('resize', () => this.handleViewportResize());
        }

        initIllumination() {
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            this.sun = new THREE.DirectionalLight(0xfff5e6, 1.5);
            this.sun.position.set(10, 32, 12);
            this.sun.castShadow = true;
            this.scene.add(this.sun);

            this.spotP = new THREE.PointLight(0x00f3ff, 1.5, 35); this.spotP.position.set(-4, 4, 6); this.scene.add(this.spotP);
            this.spotE = new THREE.PointLight(0xff0055, 1.5, 35); this.spotE.position.set(4, 4, -6); this.scene.add(this.spotE);
        }

        generateCosmicDust() {
            const starGeo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            const starMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.5 });
            for(let i=0; i<60; i++) {
                let d = new THREE.Mesh(starGeo, starMat);
                d.position.set((Math.random()-0.5)*26, Math.random()*16, (Math.random()-0.5)*26);
                d.userData = { speed: Math.random()*0.03 + 0.015 };
                this.scene.add(d);
                this.cosmicStars.push(d);
            }
        }

        buildHighVisibilityBoard() {
            const tileGeo = new THREE.BoxGeometry(2.15, 0.32, 2.15);
            const frameworkGeo = new THREE.EdgesGeometry(tileGeo);
            
            const matBlue = new THREE.MeshPhysicalMaterial({ color: 0x0c1928, metalness: 0.8, roughness: 0.15, clearcoat: 1.0 });
            const matRed = new THREE.MeshPhysicalMaterial({ color: 0x280c14, metalness: 0.8, roughness: 0.15, clearcoat: 1.0 });
            const edgeBlue = new THREE.LineBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.6 });
            const edgeRed = new THREE.LineBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.6 });

            const glowGeo = new THREE.PlaneGeometry(2.0, 2.0);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffb703, transparent: true, opacity: 0, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });

            const spawnTileNode = (c, r, isPlayer) => {
                let mesh = new THREE.Mesh(tileGeo, isPlayer ? matBlue : matRed);
                mesh.position.set(c * 2.4 - 2.4, 0.16, isPlayer ? (r * 2.4 + 1.2) : -(r * 2.4 + 1.2));
                mesh.receiveShadow = true;
                mesh.add(new THREE.LineSegments(frameworkGeo, isPlayer ? edgeBlue : edgeRed));

                let indicator = new THREE.Mesh(glowGeo, glowMat.clone());
                indicator.rotation.x = -Math.PI/2;
                indicator.position.y = 0.17;
                mesh.add(indicator);

                mesh.userData = { isTile: true, isPlayerArea: isPlayer, occupied: false, indicator: indicator };
                this.scene.add(mesh);
                this.boardTiles3D.push(mesh);
            };

            for(let r=0; r<3; r++) for(let c=0; c<3; c++) spawnTileNode(c, r, true);
            for(let r=0; r<3; r++) for(let c=0; c<3; c++) spawnTileNode(c, r, false);
        }

        assemblePremiumFigure(hero) {
            const group = new THREE.Group();
            const bMat = new THREE.MeshPhysicalMaterial({ color: hero.color, metalness: 0.65, roughness: 0.25, clearcoat: 1.0 });
            const gMat = new THREE.MeshStandardMaterial({ color: hero.glow, emissive: hero.glow, emissiveIntensity: 2.2 });

            const baseRing = new THREE.Mesh(new THREE.TorusGeometry(0.74, 0.04, 6, 24), gMat);
            baseRing.rotation.x = Math.PI/2; baseRing.position.y = 0.12;
            group.add(baseRing);
            this.tweenAnimQueue.push({ mesh: baseRing, act: 'rotate_y', val: 0.04 });

            if(hero.role === 'TANK') {
                group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.75, 1.4, 6), bMat).translateY(0.8));
                let domeShield = new THREE.Mesh(new THREE.SphereGeometry(1.45, 24, 24), new THREE.MeshPhysicalMaterial({ transmission: 0.95, opacity: 1, transparent: true, color: hero.glow, roughness: 0.1 }));
                domeShield.position.y = 0.8; domeShield.visible = false;
                group.add(domeShield); group.userData.shieldFX = domeShield;
            } 
            else if(hero.role === 'DPS') {
                group.add(new THREE.Mesh(new THREE.ConeGeometry(0.46, 1.8, 4), bMat).translateY(1.1));
                let gun = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 1.3), gMat);
                gun.position.set(0, 1.3, 0.3); group.add(gun);
            }
            else if(hero.role === 'HEAL') {
                group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.64, 1.5, 12), bMat).translateY(0.8));
                let halo = new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.04, 6, 24), gMat);
                halo.position.y = 2.1; halo.rotation.x = Math.PI/2; group.add(halo);
                this.tweenAnimQueue.push({ mesh: halo, act: 'bobbing', baseY: 2.1, speed: 4, amp: 0.08 });
            }
            else if(hero.role === 'MAGE') {
                group.add(new THREE.Mesh(new THREE.SphereGeometry(0.52, 24, 24), bMat).translateY(1.2));
                let orbitGroup = new THREE.Group(); orbitGroup.position.y = 1.2;
                for(let i=0; i<3; i++) {
                    let frag = new THREE.Mesh(new THREE.IcosahedronGeometry(0.16, 0), gMat);
                    frag.position.set(Math.cos(i * 2.094)*1.1, 0, Math.sin(i * 2.094)*1.1); orbitGroup.add(frag);
                }
                group.add(orbitGroup); this.tweenAnimQueue.push({ mesh: orbitGroup, act: 'rotate_y', val: -0.055 });
            }
            else {
                group.add(new THREE.Mesh(new THREE.BoxGeometry(0.76, 1.2, 0.76), bMat).translateY(0.7));
                let spike = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.8, 4), gMat);
                spike.position.set(0.5, 1.0, 0.3); spike.rotation.x = Math.PI/3; group.add(spike);
            }

            const hpPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.12), new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide }));
            hpPlane.position.y = 2.5; group.add(hpPlane);

            group.traverse(m => { if(m.isMesh) { m.castShadow = true; m.receiveShadow = true; }});
            this.tweenAnimQueue.push({ mesh: group, act: 'breathing', baseY: 0.16, speed: 2.5, amp: 0.06 });

            group.updateMatrixWorld(true);
            return { group: group, hpMesh: hpPlane };
        }

        bindInputInteractions() {
            window.addEventListener('pointerdown', (e) => this.onPointerDown(e));
            window.addEventListener('pointermove', (e) => this.onPointerMove(e));
            window.addEventListener('pointerup', (e) => this.onPointerUp(e));
        }

        syncPointer(e) {
            this.pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            this.pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        onPointerDown(e) {
            if(gameCore.phase !== 'PLACEMENT') return;
            this.syncPointer(e);
            this.raycaster.setFromCamera(this.pointer, this.camera);

            let clickables = gameCore.pUnits.map(u => u.mesh);
            let intersects = this.raycaster.intersectObjects(clickables, true);

            if(intersects.length > 0) {
                let node = intersects[0].object;
                while(node.parent && node.parent.type !== 'Scene') { node = node.parent; }
                
                this.dragState.activeGroup = node;
                this.dragState.previousTile = node.userData.core.tile;

                new TWEEN.Tween(node.scale).to({ x:0.8, y:1.3, z:0.8 }, 160).easing(TWEEN.Easing.Quadratic.Out).start();
                new TWEEN.Tween(node.position).to({ y: 1.5 }, 160).start();
            }
        }

        onPointerMove(e) {
            if(!this.dragState.activeGroup || gameCore.phase !== 'PLACEMENT') return;
            this.syncPointer(e);
            this.raycaster.setFromCamera(this.pointer, this.camera);

            let hit = new THREE.Vector3();
            this.raycaster.ray.intersectPlane(this.dragState.targetPlane, hit);
            this.dragState.activeGroup.position.x += (hit.x - this.dragState.activeGroup.position.x) * 0.45;
            this.dragState.activeGroup.position.z += (hit.z - this.dragState.activeGroup.position.z) * 0.45;

            let closest = null; let minD = Infinity;
            this.boardTiles3D.filter(t => t.userData.isPlayerArea).forEach(t => {
                t.userData.indicator.material.opacity = 0;
                let d = this.dragState.activeGroup.position.distanceTo(t.position);
                if(d < minD) { minD = d; closest = t; }
            });

            if(closest && minD < 2.5) {
                closest.userData.indicator.material.opacity = 0.5 + Math.sin(Date.now() * 0.015) * 0.2;
            }
        }

        onPointerUp(e) {
            if(!this.dragState.activeGroup) return;

            let node = this.dragState.activeGroup;
            let core = node.userData.core;

            this.boardTiles3D.forEach(t => t.userData.indicator.material.opacity = 0);

            let closest = null; let minD = Infinity;
            this.boardTiles3D.filter(t => t.userData.isPlayerArea).forEach(t => {
                let d = node.position.distanceTo(t.position);
                if(d < minD) { minD = d; closest = t; }
            });

            if(minD > 2.6) {
                // 회수 시 명시적 GPU 메모리 자원 반환
                this.garbageCollectionForObject(node);
                core.tile.userData.occupied = false;
                gameCore.pUnits = gameCore.pUnits.filter(u => u !== core);
                gameCore.refreshRosterDeckUI();
            } else {
                if(!closest.userData.occupied || closest === this.dragState.previousTile) {
                    this.dragState.previousTile.userData.occupied = false;
                    closest.userData.occupied = true;
                    core.tile = closest;
                } else {
                    let proxy = gameCore.pUnits.find(u => u.tile === closest);
                    if(proxy) {
                        proxy.tile = this.dragState.previousTile;
                        this.dragState.previousTile.userData.occupied = true;
                        new TWEEN.Tween(proxy.mesh.position).to({ x: proxy.tile.position.x, z: proxy.tile.position.z }, 250).easing(TWEEN.Easing.Back.Out).start();
                    }
                    core.tile = closest;
                }
                new TWEEN.Tween(node.position).to({ x: core.tile.position.x, y: 0.16, z: core.tile.position.z }, 350).easing(TWEEN.Easing.Bounce.Out).start();
                new TWEEN.Tween(node.scale).to({ x:1.2, y:0.8, z:1.2 }, 120).onComplete(() => {
                    new TWEEN.Tween(node.scale).to({ x:1, y:1, z:1 }, 200).easing(TWEEN.Easing.Elastic.Out).start();
                }).start();
            }

            this.dragState.activeGroup = null;
            gameCore.evaluateReadyStateBtn();
        }

        // [최적화 픽스]: 씬에서 오브젝트를 파괴할 때 하위 모든 지오메트리와 마테리얼을 메모리 해제 처리
        garbageCollectionForObject(obj) {
            this.scene.remove(obj);
            obj.traverse(child => {
                if (child.isMesh) {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                        else child.material.dispose();
                    }
                }
            });
            this.tweenAnimQueue = this.tweenAnimQueue.filter(n => n.mesh !== obj && !obj.getObjectById(n.mesh.id));
        }

        executeVisualStrikeFX(attacker, target, onCompleteCallback) {
            let start = attacker.mesh.position.clone().setY(1.2);
            let end = target.mesh.position.clone().setY(1.2);

            if(gameCore.cinemaCamEnabled) {
                let trackingCamPos = start.clone().add(new THREE.Vector3(0, 3.5, 3.5));
                new TWEEN.Tween(this.camera.position).to(trackingCamPos, 180).easing(TWEEN.Easing.Quadratic.Out).start();
                this.camera.lookAt(end);
            }

            const resolveImpact = () => {
                this.createImpactExplosion(end, attacker.glow);
                if(gameCore.cinemaCamEnabled) {
                    new TWEEN.Tween(this.camera.position).to({ x:0, y:22, z:16 }, 250).onComplete(() => {
                        this.camera.lookAt(0, -0.5, -0.5);
                        onCompleteCallback();
                    }).start();
                } else {
                    onCompleteCallback();
                }
            };

            if(attacker.role === 'DPS' || attacker.id === 'u12') {
                let dist = start.distanceTo(end);
                let beamMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, dist, 8).translate(0, dist/2, 0), new THREE.MeshBasicMaterial({ color: attacker.glow, transparent: true, opacity: 0.85 }));
                beamMesh.position.copy(start); beamMesh.lookAt(end); beamMesh.rotateX(Math.PI/2);
                this.scene.add(beamMesh);

                new TWEEN.Tween(beamMesh.scale).to({ x:4, z:4 }, 120).yoyo(true).repeat(1).onComplete(() => {
                    this.scene.remove(beamMesh);
                    beamMesh.geometry.dispose(); beamMesh.material.dispose();
                    resolveImpact();
                }).start();
            } else {
                let bolt = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshBasicMaterial({ color: attacker.glow }));
                bolt.position.copy(start); this.scene.add(bolt);
                new TWEEN.Tween(bolt.position).to({ x: end.x, y: end.y, z: end.z }, 250).easing(TWEEN.Easing.Quadratic.In).onComplete(() => {
                    this.scene.remove(bolt);
                    bolt.geometry.dispose(); bolt.material.dispose();
                    resolveImpact();
                }).start();
            }
        }

        createImpactExplosion(pos, color) {
            let mat = new THREE.MeshBasicMaterial({ color: color });
            let geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            for(let i=0; i<10; i++) {
                let p = new THREE.Mesh(geo, mat); p.position.copy(pos); this.scene.add(p);
                let theta = Math.random()*Math.PI*2, force = Math.random()*1.8 + 0.6;
                new TWEEN.Tween(p.position).to({ x: p.position.x + Math.cos(theta)*force, y: p.position.y + Math.random()*1.8, z: p.position.z + Math.sin(theta)*force }, 380).easing(TWEEN.Easing.Quadratic.Out).onComplete(() => {
                    this.scene.remove(p); geo.dispose(); mat.dispose();
                }).start();
            }
            if(!gameCore.cinemaCamEnabled) {
                const b = { x: 0, y: 22, z: 16 };
                new TWEEN.Tween(this.camera.position).to({ x: (Math.random()-0.5)*0.6, y: 22+(Math.random()-0.5)*0.6, z: 16 }, 40).yoyo(true).repeat(3).onComplete(() => this.camera.position.copy(b)).start();
            }
        }

        projectFloatingText2D(pos3D, val, type='dmg') {
            let v = pos3D.clone().setY(2.6).project(this.camera);
            let el = document.createElement('div');
            el.className = type === 'heal' ? 'dmg-popup-txt txt-heal' : 'dmg-popup-txt';
            if(type === 'heal') el.style.textShadow = '0 0 10px #00ff88, 2px 2px 0 #000';
            el.innerText = type === 'heal' ? `+${val}` : `-${val}`;
            el.style.left = `${(v.x * .5 + .5) * window.innerWidth}px`; el.style.top = `${(-(v.y * .5) + .5) * window.innerHeight}px`;
            document.getElementById('fx-html-overlay').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        handleViewportResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        forceSynchronizeCameraAngle(state) {
            const posNode = { x: 0, y: 22, z: 16 };
            if(state === 'LOBBY' || state === 'STORY_MAP') {
                new TWEEN.Tween(this.camera.position).to(posNode, 600).easing(TWEEN.Easing.Cubic.Out).start();
                this.camera.lookAt(0, -0.5, -0.5);
            }
        }

        tickUpdate(time) {
            TWEEN.update(time);
            this.cosmicStars.forEach(s => {
                s.position.y -= s.userData.speed;
                if(s.position.y < -4) s.position.y = 15;
            });
            let sec = time * 0.001;
            this.tweenAnimQueue.forEach(n => {
                if(n.mesh && n.mesh.position) {
                    if(n.act === 'rotate_y') n.mesh.rotation.y += n.val;
                    if(n.act === 'bobbing') n.mesh.position.y = n.baseY + Math.sin(sec * n.speed) * n.amp;
                    if(n.act === 'breathing') n.mesh.position.y = n.baseY + Math.sin(sec * n.speed + n.mesh.position.x) * n.amp;
                }
            });
            [...(gameCore.pUnits||[]), ...(gameCore.eUnits||[])].forEach(u => {
                if(u.hpMesh && u.currentHp > 0) u.hpMesh.lookAt(this.camera.position);
            });
            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame((t) => this.tickUpdate(t));
        }
    }

    // [3] INTERFACE VIEW CONTROLLER

    class InterfaceViewController {
        constructor() { this.subScene = null; this.subCam = null; this.subRender = null; this.subMesh = null; }

        changeScreen(id) {
            document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
            document.getElementById('hud-battle-core').style.display = 'none';
            document.getElementById('panel-analytics-drawer').classList.remove('open');
            
            engine3D.forceSynchronizeCameraAngle(id);

            if(id === 'PLACEMENT') {
                document.getElementById('hud-battle-core').style.display = 'flex';
                gameCore.initMatchSessionBo5(1);
            } else {
                let node = document.getElementById(`screen-${id.toLowerCase()}`);
                if(node) node.classList.add('active');
            }
        }

        renderStoryCampaignMap() {
            this.changeScreen('STORY_MAP');
            this.initSub3DRewardPipeline();
            
            const field = document.getElementById('box-nodes-container');
            field.innerHTML = '';

            CAMPAIGN_SECTOR_DATA.slice().reverse().forEach((stage, idx) => {
                let isCleared = stage.lv <= gameCore.storyProgress;
                let isCurrent = stage.lv === gameCore.storyProgress + 1;
                let isLocked = stage.lv > gameCore.storyProgress + 1;

                let node = document.createElement('div');
                node.className = `map-node-sphere jelly-bounce ${isCleared?'cleared':''} ${isCurrent?'target':''} ${isLocked?'locked':''}`;
                node.innerHTML = `<span style="font-family:'Cinzel'; font-size:1.4rem; font-weight:900;">${stage.lv}</span>`;

                if(idx < CAMPAIGN_SECTOR_DATA.length - 1) {
                    let pipe = document.createElement('div');
                    pipe.className = `pipeline-vector ${isCleared?'cleared':''}`;
                    node.appendChild(pipe);
                }

                node.onclick = () => {
                    if(!isLocked) this.syncSub3DPreviewNode(stage);
                };
                field.appendChild(node);
                if(isCurrent) this.syncSub3DPreviewNode(stage);
            });
        }

        initSub3DRewardPipeline() {
            const zone = document.getElementById('sub-3d-preview-stage');
            if(this.subRender) return;
            this.subScene = new THREE.Scene();
            this.subCam = new THREE.PerspectiveCamera(45, zone.clientWidth/zone.clientHeight, 0.1, 100);
            this.subCam.position.set(0, 2.8, 4.5); this.subCam.lookAt(0, 0.8, 0);

            this.subRender = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            this.subRender.setSize(zone.clientWidth, zone.clientHeight);
            zone.appendChild(this.subRender.domElement);
            this.subScene.add(new THREE.AmbientLight(0xffffff, 0.7));

            const loop = () => { requestAnimationFrame(loop); if(this.subMesh) this.subMesh.rotation.y += 0.02; this.subRender.render(this.subScene, this.subCam); };
            loop();
        }

        syncSub3DPreviewNode(stage) {
            let hero = UNIT_DICTIONARY.find(u => u.id === stage.rewardId);
            document.getElementById('lbl-reward-name').innerText = `🏆 출격 등급: 섹터 ${stage.lv} [진입하기]`;
            document.getElementById('lbl-reward-desc').innerText = `클리어 보상 해금 영웅 [${hero.name}] \n 능력 스펙: ${hero.skill}`;
            
            if(this.subMesh) this.subScene.remove(this.subMesh);
            let pack = engine3D.assemblePremiumFigure(hero);
            pack.hpMesh.visible = false;
            this.subMesh = pack.group; this.subMesh.position.set(0,0,0); this.subMesh.scale.set(0.9, 0.9, 0.9);
            this.subScene.add(this.subMesh);

            uiManager.notify(`🎯 전술 섹터 [${stage.name}] 분석 완료`, 'safe');
            
            // 상단 밑줄 쳐진 해금 타이틀을 터치하면 매치가 활성화되도록 유연 배치
            document.getElementById('lbl-reward-name').onclick = () => {
                this.changeScreen('HUD_BATTLE_CORE');
                document.getElementById('hud-battle-core').style.display = 'flex';
                gameCore.initMatchSessionBo5(stage.lv);
            };
        }

        triggerSpecPanel(hero) {
            document.getElementById('lbl-spec-title').innerText = hero.name;
            document.getElementById('lbl-spec-role').innerText = `CLASS : ${hero.role}`;
            document.getElementById('lbl-spec-hp-atk').innerHTML = `내구강도: <span style="color:var(--safe)">${hero.hp}</span> &nbsp;|&nbsp; 파괴화력: <span style="color:var(--danger)">${hero.atk}</span>`;
            document.getElementById('lbl-spec-desc').innerText = hero.skill;

            const modal = document.getElementById('panel-spec-details');
            modal.style.display = 'block';
            setTimeout(() => { modal.style.opacity = '1'; modal.style.transform = 'translate(-50%, -50%) scale(1)'; }, 10);
        }

        closeSpecPanel() {
            const modal = document.getElementById('panel-spec-details');
            modal.style.opacity = '0'; modal.style.transform = 'translate(-50%, -50%) scale(0.8)';
            setTimeout(() => modal.style.display = 'none', 250);
        }

        toggleAnalyticsDrawer() {
            let drawer = document.getElementById('panel-analytics-drawer');
            drawer.classList.toggle('open');
            if(drawer.classList.contains('open')) this.refreshStatsField();
        }

        refreshStatsField() {
            let field = document.getElementById('analytics-content-field');
            field.innerHTML = '';
            let max = 1;
            gameCore.pUnits.forEach(u => { let t = u.stat.dmg+u.stat.heal+u.stat.tank; if(t > max) max = t; });
            gameCore.pUnits.forEach(u => {
                let d = (u.stat.dmg/max)*100, h = (u.stat.heal/max)*100, t = (u.stat.tank/max)*100;
                field.innerHTML += `
                    <div style="margin-bottom:12px; font-size:0.8rem; font-weight:bold;">
                        <div style="display:flex; justify-content:space-between;"><span>${u.name}</span><span style="color:#aaa;">${u.stat.dmg+u.stat.heal+u.stat.tank}</span></div>
                        <div class="stat-bar-track"><div class="bar-dmg" style="width:${d}%"></div><div class="bar-heal" style="width:${h}%"></div><div class="bar-tank" style="width:${t}%"></div></div>
                    </div>
                `;
            });
        }

        routeBackFromBattle() {
            document.getElementById('screen-match-end').classList.remove('active');
            gameCore.clearActiveArenaBoard();
            this.renderStoryCampaignMap();
        }
    }

    class UINotificationManager {
        notify(msg, type='cyan') {
            const banner = document.getElementById('tactical-briefing-toast');
            banner.innerText = `📡 [브리핑] : ${msg}`;
            banner.style.borderLeftColor = type === 'danger' ? 'var(--danger)' : type === 'safe' ? 'var(--safe)' : 'var(--neon-cyan)';
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 2400);
        }
    }

    // =========================================================================
    // [4] MASTER GAME PROCESS CORE
    // =========================================================================
    class MasterGameProcessCore {
        constructor() {
            this.storyProgress = 0; this.phase = 'IDLE';
            this.pUnits = []; this.eUnits = [];
            this.pWins = 0; this.eWins = 0; this.round = 1;
            this.countdown = 15.0; this.seq = 0;
            this.cinemaCamEnabled = true;
            this.activeStageLv = 1;
        }

        toggleCamMode() {
            this.cinemaCamEnabled = !this.cinemaCamEnabled;
            let btn = document.getElementById('btn-camera-switch');
            btn.className = this.cinemaCamEnabled ? "btn-side-toggle jelly-bounce active" : "btn-side-toggle jelly-bounce";
            btn.innerText = this.cinemaCamEnabled ? "🎥 시네마틱 ON" : "🎥 시네마틱 OFF";
            if(!this.cinemaCamEnabled) {
                new TWEEN.Tween(engine3D.camera.position).to({ x:0, y:22, z:16 }, 300).onComplete(() => engine3D.camera.lookAt(0, -0.5, -0.5)).start();
            }
        }

        initMatchSessionBo5(level) {
            this.activeStageLv = level;
            this.pWins = 0; this.eWins = 0; this.round = 1;
            this.startPlacementPipeline();
        }

        clearActiveArenaBoard() {
            // 보드 클리어 시 가비지 컬렉션 함수 적용하여 VRAM 회수
            this.pUnits.forEach(u => engine3D.garbageCollectionForObject(u.mesh)); this.pUnits = [];
            this.eUnits.forEach(u => engine3D.garbageCollectionForObject(u.mesh)); this.eUnits = [];
            engine3D.boardTiles3D.forEach(t => t.userData.occupied = false);
        }

        startPlacementPipeline() {
            this.phase = 'PLACEMENT'; this.countdown = 15.0;
            this.clearActiveArenaBoard();
            this.syncHUDScoreBoard();

            document.getElementById('lbl-phase-ticker').innerText = `진형 구축 단계 (ROUND ${this.round})`;
            document.getElementById('btn-placement-confirm').style.display = 'none';

            new TWEEN.Tween(engine3D.camera.position).to({ x:0, y:22, z:15.5 }, 800).easing(TWEEN.Easing.Cubic.Out).start();
            engine3D.camera.lookAt(0, -0.5, -0.5);

            this.renderTacticalDeckUI();
        }

        syncHUDScoreBoard() {
            document.getElementById('txt-score-p').innerText = this.pWins;
            document.getElementById('txt-score-e').innerText = this.eWins;
            let dots = document.getElementById('box-bo5-dots').children;
            for(let i=0; i<3; i++) {
                dots[i].className = 'bo5-dot' + (i < this.pWins ? ' p-win' : '') + (i < this.eWins ? ' e-win' : '');
            }
        }

        renderTacticalDeckUI() {
            const scroller = document.getElementById('scroller-deck-field');
            scroller.innerHTML = ''; scroller.style.pointerEvents = 'auto'; scroller.style.opacity = '1';

            UNIT_DICTIONARY.forEach(h => {
                let isLocked = h.unlockLv > this.storyProgress;
                let card = document.createElement('div');
                card.className = `deck-card-node jelly-bounce ${isLocked ? 'locked-card' : ''}`;
                card.style.borderTop = `3px solid #${h.color.toString(16)}`;
                card.innerHTML = `<div class="emoji">${h.icon}</div><span class="name">${h.name}</span>`;

                if(!isLocked) {
                    card.onclick = () => {
                        if(this.phase !== 'PLACEMENT') return;
                        if(this.pUnits.length < 3) {
                            let freeTile = engine3D.boardTiles3D.find(t => t.userData.isPlayerArea && !t.userData.occupied);
                            if(freeTile) {
                                freeTile.userData.occupied = true;
                                let visualPack = engine3D.assemblePremiumFigure(h);
                                visualPack.group.position.copy(freeTile.position);
                                
                                this.seq++;
                                let core = { ...h, maxHp: h.hp, currentHp: h.hp, mesh: visualPack.group, hpMesh: visualPack.hpMesh, tile: freeTile, uid: this.seq, stat:{dmg:0, heal:0, tank:0} };
                                visualPack.group.userData = { core: core };

                                engine3D.scene.add(visualPack.group);
                                this.pUnits.push(core);

                                visualPack.group.position.y = 8;
                                new TWEEN.Tween(visualPack.group.position).to({ y: 0.16 }, 500).easing(TWEEN.Easing.Bounce.Out).start();
                                this.evaluateReadyStateBtn();
                            }
                        } else {
                            viewController.triggerSpecPanel(h);
                        }
                    };
                }
                scroller.appendChild(card);
            });
            this.evaluateReadyStateBtn();
        }

        evaluateReadyStateBtn() {
            let btn = document.getElementById('btn-placement-confirm');
            btn.style.display = this.pUnits.length === 3 ? 'block' : 'none';
        }

        lockPlacementPhase() {
            if(this.pUnits.length < 3) return;
            this.phase = 'COMBAT';
            document.getElementById('btn-placement-confirm').style.display = 'none';
            document.getElementById('lbl-phase-ticker').innerText = '실시간 오토 전투 연산 중';
            document.getElementById('scroller-deck-field').style.pointerEvents = 'none';
            document.getElementById('scroller-deck-field').style.opacity = '0.2';

            this.spawnEnemyAiTactics();
            // [레거시 버그 원천 차단 패치]: 비동기 락 찌꺼기가 남지 않도록 표준 함수로 완벽 동기화 지연 실행
            setTimeout(() => this.executeBattleTickLoop(), 1000);
        }

        spawnEnemyAiTactics() {
            let aiTiles = engine3D.boardTiles3D.filter(t => !t.userData.isPlayerArea);
            let pool = CAMPAIGN_SECTOR_DATA.find(s=>s.lv===this.activeStageLv).botDeck;

            for(let i=0; i<3; i++) {
                let hId = pool[Math.floor(Math.random() * pool.length)];
                let data = UNIT_DICTIONARY.find(u => u.id === hId);
                let tile = aiTiles.splice(Math.floor(Math.random()*aiTiles.length), 1)[0];
                
                tile.userData.occupied = true;
                let pack = engine3D.assemblePremiumFigure(data);
                pack.group.position.copy(tile.position); pack.group.rotation.y = Math.PI;

                let core = { ...data, maxHp: data.hp, currentHp: data.hp, mesh: pack.group, hpMesh: pack.hpMesh, tile: tile, stat:{} };
                pack.group.userData = { core: core };
                engine3D.scene.add(pack.group);
                this.eUnits.push(core);

                pack.group.position.y = 8;
                new TWEEN.Tween(pack.group.position).to({ y: 0.16 }, 500).easing(TWEEN.Easing.Back.Out).delay(i*100).start();
            }
        }

        executeBattleTickLoop() {
            if(this.phase !== 'COMBAT') return;

            let aliveP = this.pUnits.filter(u => u.currentHp > 0);
            let aliveE = this.eUnits.filter(u => u.currentHp > 0);

            if(aliveP.length === 0 || aliveE.length === 0) {
                this.terminateRoundBo5(aliveP.length > 0);
                return;
            }

            aliveP.forEach(p => {
                if(p.role === 'HEAL') {
                    let ally = aliveP.sort((a,b) => (a.currentHp/a.maxHp) - (b.currentHp/b.maxHp))[0];
                    this.strikeUnitAction(p, ally, true);
                } else {
                    if(p.role === 'TANK' && p.mesh.userData.shieldFX && Math.random() > 0.5) {
                        p.mesh.userData.shieldFX.visible = true; p.stat.tank += 40;
                        setTimeout(() => p.mesh.userData.shieldFX.visible = false, 800);
                    }
                    let target = aliveE[Math.floor(Math.random() * aliveE.length)];
                    this.strikeUnitAction(p, target, false);
                }
            });

            setTimeout(() => {
                let cP = this.pUnits.filter(u => u.currentHp > 0);
                let cE = this.eUnits.filter(u => u.currentHp > 0);
                if(cP.length === 0 || cE.length === 0) return;

                cE.forEach(e => {
                    let target = cP[Math.floor(Math.random() * cP.length)];
                    this.strikeUnitAction(e, target, false);
                });
                
                if(document.getElementById('panel-analytics-drawer').classList.contains('open')) viewController.refreshStatsField();
            }, 600);

            setTimeout(() => this.executeBattleTickLoop(), 1600);
        }

        strikeUnitAction(attacker, target, isHeal) {
            let oPos = attacker.mesh.position.clone();
            new TWEEN.Tween(attacker.mesh.position).to({ x: oPos.x + (target.mesh.position.x - oPos.x)*0.25, z: oPos.z + (target.mesh.position.z - oPos.z)*0.25 }, 180).yoyo(true).repeat(1).start();

            setTimeout(() => {
                engine3D.executeVisualStrikeFX(attacker, target, () => {
                    let val = attacker.atk + Math.floor(Math.random()*15);
                    if(isHeal) {
                        target.currentHp = Math.min(target.maxHp, target.currentHp + val);
                        engine3D.projectFloatingText2D(target.mesh.position, val, 'heal');
                        if(attacker.stat) attacker.stat.heal += val;
                    } else {
                        target.currentHp -= val;
                        engine3D.projectFloatingText2D(target.mesh.position, val, 'dmg');
                        if(attacker.stat) attacker.stat.dmg += val;
                        if(target.stat) target.stat.tank += Math.floor(val/2);
                    }

                    let r = Math.max(0, target.currentHp / target.maxHp);
                    target.hpMesh.scale.x = r; target.hpMesh.material.color.setHex(r > 0.4 ? 0x00ff88 : 0xff2a5f);

                    if(target.currentHp <= 0) {
                        new TWEEN.Tween(target.mesh.rotation).to({ x: Math.PI/2 }, 400).easing(TWEEN.Easing.Bounce.Out).start();
                        target.mesh.position.y = -0.12; target.hpMesh.visible = false;
                        target.tile.userData.occupied = false;
                    }
                });
            }, 180);
        }

        terminateRoundBo5(isPlayerWin) {
            this.phase = 'RESULT';
            if(isPlayerWin) this.pWins++; else this.eWins++;
            this.syncHUDScoreBoard();

            setTimeout(() => {
                if(this.pWins === 3 || this.eWins === 3) {
                    let screen = document.getElementById('screen-match-end');
                    let title = document.getElementById('txt-match-title');
                    let desc = document.getElementById('txt-match-desc');

                    if(this.pWins === 3) {
                        title.innerText = "VICTORY"; title.style.color = "var(--gold)";
                        if(this.activeStageLv > this.storyProgress) {
                            this.storyProgress = this.activeStageLv;
                        }
                        desc.innerText = "아레나 매치에서 최종 승리하여 기지 지휘권을 완벽히 수호했습니다.";
                    } else {
                        title.innerText = "DEFEAT"; title.style.color = "var(--danger)";
                        desc.innerText = "AI 세력에 의해 사령실 네트워크 연산이 전멸했습니다.";
                    }
                    screen.classList.add('active');
                } else {
                    this.round++;
                    this.startPlacementPipeline();
                }
            }, 1600);
        }
    }

    // =========================================================================
    // [5] APPLICATION CORE INITIALIZATION
    // =========================================================================
    window.onload = () => {
        engine3D = new FlawlessGraphicsEngine();
        viewController = new InterfaceViewController();
        uiManager = new UINotificationManager();
        gameCore = new MasterGameProcessCore();

        engine3D.tickUpdate(0);

        setTimeout(() => {
            const intro = document.getElementById('screen-intro');
            intro.style.opacity = '0'; intro.style.transition = 'opacity 0.6s ease';
            setTimeout(() => { 
                intro.classList.remove('active'); 
                viewController.changeScreen('LOBBY'); 
            }, 600);
        }, 2500);
    };

    setInterval(() => {
        if(!gameCore || gameCore.phase !== 'PLACEMENT') return;
        gameCore.countdown -= 0.1;
        let node = document.getElementById('txt-timer-clock');
        if(gameCore.countdown <= 0) {
            gameCore.countdown = 0; node.innerText = "⚔️";
            gameCore.lockPlacementPhase();
        } else {
            node.innerText = Math.max(0, gameCore.countdown).toFixed(0);
        }
    }, 100);
</script>
