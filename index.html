<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THRE3 HERO: Ultimate Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <style>
        :root {
            --gold: #d4af37; --gold-glow: rgba(212, 175, 55, 0.5);
            --neon-blue: #00f3ff; --neon-pink: #ff007f;
            --bg-deep: #020408; --glass-bg: rgba(8, 12, 20, 0.85);
            --safe: #00ff88; --danger: #ff3366;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-deep); font-family: 'Noto Serif KR', serif; color: #fff; user-select: none; -webkit-user-select: none; }
        
        #app-core { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #vfx-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }

        /* UI Base */
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .btn-interact { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .btn-interact:active { transform: scale(0.92); filter: brightness(1.3); }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
        .screen.active { display: flex; }

        /* 1. Main Menu */
        #screen-menu { background: radial-gradient(circle at center, #0a1128 0%, var(--bg-deep) 100%); }
        .brand-title { font-family: 'Cinzel'; font-size: 4rem; color: var(--gold); text-shadow: 0 0 30px var(--gold-glow); margin: 0 0 10px 0; text-align: center; line-height: 1.1; }
        .brand-sub { font-size: 1rem; color: #8892b0; letter-spacing: 6px; margin-bottom: 50px; text-align: center; font-weight: bold; }
        .menu-btn-stack { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 320px; }
        .btn-mode { padding: 20px; border-radius: 16px; border: none; font-family: 'Noto Serif KR'; font-size: 1.2rem; font-weight: 900; color: #fff; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .btn-mode.highlight { background: linear-gradient(135deg, #d4af37, #a67c00); color: #000; border: none; box-shadow: 0 5px 20px var(--gold-glow); }

        /* 2. Story Mode Map */
        #screen-story { justify-content: flex-start; padding-top: 50px; background: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="%23020408"/><circle cx="50%" cy="50%" r="40%" stroke="%23333" stroke-width="1" fill="none"/></svg>') center/cover; }
        .story-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .map-container { position: relative; width: 100%; max-width: 400px; flex-grow: 1; display: flex; flex-direction: column-reverse; align-items: center; gap: 40px; padding-bottom: 50px; overflow-y: auto; }
        .map-container::-webkit-scrollbar { display: none; }
        .story-node { width: 80px; height: 80px; border-radius: 50%; background: #111; border: 3px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; transition: 0.3s; }
        .story-node.cleared { border-color: var(--safe); background: rgba(0, 255, 136, 0.1); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .story-node.current { border-color: var(--gold); background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 30px var(--gold-glow); transform: scale(1.15); animation: pulseNode 2s infinite; }
        .story-node.locked { filter: grayscale(100%); opacity: 0.5; }
        .node-line { position: absolute; width: 4px; height: 50px; background: #333; z-index: 1; top: -45px; }
        .node-line.cleared { background: var(--safe); }
        @keyframes pulseNode { 0% { box-shadow: 0 0 10px var(--gold-glow); } 50% { box-shadow: 0 0 30px var(--gold); } 100% { box-shadow: 0 0 10px var(--gold-glow); } }

        /* 3. Matchmaking */
        #screen-match { background: var(--bg-deep); }
        .radar { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--neon-blue); position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); }
        .radar-sweep { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: bottom left; background: linear-gradient(45deg, rgba(0,243,255,0.8), transparent); animation: sweep 2s linear infinite; }
        @keyframes sweep { to { transform: rotate(360deg); } }

        /* 4. Battle HUD */
        #hud-battle { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 20px) 15px env(safe-area-inset-bottom, 20px) 15px; pointer-events: none; z-index: 10; }
        .hud-top { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .score-box { padding: 10px 20px; border-radius: 16px; text-align: center; min-width: 85px; }
        .score-box h2 { font-family: 'Cinzel'; font-size: 2rem; margin: 0; font-weight: 900; }
        .timer-circ { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 2rem; font-weight: 900; color: var(--gold); border: 2px solid var(--gold); background: rgba(0,0,0,0.5); }
        
        .hud-bottom { display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .roster-deck { display: flex; gap: 12px; overflow-x: auto; padding: 15px; border-radius: 20px; -webkit-overflow-scrolling: touch; }
        .roster-deck::-webkit-scrollbar { display: none; }
        .card { min-width: 75px; height: 95px; border-radius: 16px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .card-icon { font-size: 1.5rem; margin-bottom: 5px; }
        .card.locked { filter: grayscale(100%); opacity: 0.3; }
        .card.locked::after { content: '🔒'; position: absolute; font-size: 1.5rem; }

        /* 5. Analytics Data Panel (통계 분석소) */
        #btn-stats { position: absolute; right: 15px; top: 120px; padding: 12px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--gold); font-size: 1.2rem; pointer-events: auto; z-index: 11; }
        #panel-analytics { position: absolute; right: -350px; top: 100px; width: 300px; background: rgba(5, 8, 12, 0.95); border: 1px solid var(--glass-border); border-radius: 20px 0 0 20px; padding: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); pointer-events: auto; z-index: 12; backdrop-filter: blur(20px); }
        #panel-analytics.open { right: 0; }
        .stat-row { margin-bottom: 15px; }
        .stat-name { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .stat-bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; display: flex; }
        .s-dmg { height: 100%; background: var(--danger); transition: 0.3s; }
        .s-heal { height: 100%; background: var(--safe); transition: 0.3s; }
        .s-tank { height: 100%; background: #3498db; transition: 0.3s; }

        /* VFX Text */
        .txt-dmg { position: absolute; font-family: 'Cinzel'; font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #ff0055, 2px 2px 0 #000; transform: translate(-50%, -50%); animation: floatUp 0.8s forwards; }
        .txt-heal { color: #00ff88; text-shadow: 0 0 10px #00aa55, 2px 2px 0 #000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 20% { transform: translate(-50%, -80%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(1); } }
    </style>
</head>
<body>

<div id="app-core">
    <div id="webgl-canvas"></div>
    <div id="vfx-overlay"></div>

    <div id="screen-menu" class="screen active">
        <h1 class="brand-title">THRE3<br>HERO</h1>
        <div class="brand-sub">ULTIMATE PROTOCOL</div>
        <div class="menu-btn-stack">
            <button class="btn-mode highlight btn-interact" onclick="uiManager.openStoryMap()">📖 캠페인 스토리 모드</button>
            <button class="btn-mode btn-interact" onclick="uiManager.startMatchmaking()">⚔️ 멀티플레이 (PvP 매칭)</button>
        </div>
    </div>

    <div id="screen-story" class="screen">
        <div class="story-header">
            <button class="btn-interact glass" style="padding:10px 20px; border-radius:12px; color:white; border:none;" onclick="uiManager.showScreen('screen-menu')">↩ 귀환</button>
            <h2 style="font-family:'Cinzel'; color:var(--gold); margin:0;">SECTOR MAP</h2>
        </div>
        <div class="map-container" id="story-map-nodes">
            </div>
    </div>

    <div id="screen-match" class="screen">
        <div class="radar"><div class="radar-sweep"></div><div style="font-size:2rem;">📡</div></div>
        <h2 style="font-family:'Cinzel'; color:var(--neon-blue);">SEARCHING...</h2>
        <p id="match-status" style="color:#aaa;">네트워크 위성 연결 중...</p>
    </div>

    <div id="hud-battle" style="display:none;">
        <div class="hud-top">
            <div class="score-box glass">
                <span style="font-size:0.7rem; color:#aaa;">YOU</span>
                <h2 id="score-p">0</h2>
            </div>
            <div class="timer-circ glass" id="timer-ui">15</div>
            <div class="score-box glass">
                <span style="font-size:0.7rem; color:#aaa;">ENEMY</span>
                <h2 id="score-e" style="color:var(--danger);">0</h2>
            </div>
        </div>

        <button id="btn-stats" class="btn-interact" onclick="uiManager.toggleAnalytics()">📊</button>
        
        <div id="panel-analytics" class="glass">
            <h3 style="margin:0 0 15px 0; color:var(--gold); border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:10px;">📊 실시간 전투 분석</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px; font-size:0.75rem;">
                <span style="color:var(--danger);">■ 가해량</span>
                <span style="color:var(--safe);">■ 치유량</span>
                <span style="color:#3498db;">■ 방어량</span>
            </div>
            <div id="analytics-content"></div>
        </div>

        <div class="hud-bottom">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:0 10px;">
                <span id="phase-text" style="color:var(--gold); font-weight:bold;">배치 대기 중 (15초)</span>
                <button id="btn-ready" class="btn-interact" style="padding:10px 20px; border-radius:12px; background:var(--gold); font-weight:bold; border:none; display:none;" onclick="gameLogic.lockPlacement()">배치 확정</button>
            </div>
            <div id="roster-deck" class="roster-deck glass"></div>
        </div>
    </div>

    <div id="screen-result" class="screen" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);">
        <div class="glass" style="padding:40px; border-radius:24px; text-align:center; width:90%; max-width:400px;">
            <h1 id="res-title" style="font-family:'Cinzel'; font-size:4rem; margin:0 0 10px 0;">VICTORY</h1>
            <p id="res-desc" style="color:#aaa; margin-bottom:30px;">섹터 클리어 및 신규 영웅 데이터 확보</p>
            <button class="btn-mode highlight btn-interact" style="width:100%;" onclick="uiManager.endGameSession()">사령실 귀환</button>
        </div>
    </div>
</div>

<script>
    // =====================================================================
    // [1] DATABASE: 13종 영웅 및 스토리 모드 설계
    // =====================================================================
    const HERO_DB = [
        // 기본 제공 6종
        { id: 'h1', name: '팔라딘', hp: 600, atk: 20, role: 'TANK', color: 0x9ca3af, glow: 0xffffff, icon: '🛡️', unlockLevel: 0 },
        { id: 'h2', name: '스나이퍼', hp: 150, atk: 85, role: 'DPS', color: 0xe11d48, glow: 0xff0055, icon: '🎯', unlockLevel: 0 },
        { id: 'h3', name: '클레릭', hp: 250, atk: 15, role: 'HEAL', color: 0x10b981, glow: 0x00ff88, icon: '✨', unlockLevel: 0 },
        { id: 'h4', name: '어쌔신', hp: 220, atk: 65, role: 'ASSASSIN', color: 0x8b5cf6, glow: 0xb200ff, icon: '🗡️', unlockLevel: 0 },
        { id: 'h5', name: '버서커', hp: 450, atk: 45, role: 'BRUISER', color: 0xf97316, glow: 0xff7700, icon: '🪓', unlockLevel: 0 },
        { id: 'h6', name: '위자드', hp: 180, atk: 70, role: 'MAGE', color: 0x3b82f6, glow: 0x00d2ff, icon: '🔮', unlockLevel: 0 },
        // 스토리 해금 7종
        { id: 'h7', name: '크로노스', hp: 170, atk: 75, role: 'MAGE', color: 0xfcd34d, glow: 0xffdd00, icon: '⏳', unlockLevel: 1 },
        { id: 'h8', name: '드래곤', hp: 400, atk: 55, role: 'BRUISER', color: 0x991b1b, glow: 0xff2222, icon: '🐉', unlockLevel: 2 },
        { id: 'h9', name: '프로스트', hp: 160, atk: 60, role: 'MAGE', color: 0x67e8f9, glow: 0x00ffff, icon: '❄️', unlockLevel: 3 },
        { id: 'h10', name: '뱀파이어', hp: 200, atk: 70, role: 'ASSASSIN', color: 0x4c1d95, glow: 0x8800ff, icon: '🦇', unlockLevel: 4 },
        { id: 'h11', name: '타이탄', hp: 700, atk: 30, role: 'TANK', color: 0x334155, glow: 0x888888, icon: '🤖', unlockLevel: 5 },
        { id: 'h12', name: '솔라', hp: 200, atk: 80, role: 'HEAL', color: 0xfef08a, glow: 0xffaa00, icon: '☀️', unlockLevel: 6 },
        { id: 'h13', name: '이지스 코어',hp: 800, atk: 10, role: 'TANK', color: 0x0f766e, glow: 0x00ffcc, icon: '💠', unlockLevel: 7 }
    ];

    const STORY_LEVELS = [
        { level: 1, name: "섹터 알파: 시작의 대지", enemyPool: ['h1','h2','h3'] },
        { level: 2, name: "섹터 베타: 기계 무덤", enemyPool: ['h4','h5','h1'] },
        { level: 3, name: "섹터 감마: 얼어붙은 호수", enemyPool: ['h6','h2','h7'] },
        { level: 4, name: "섹터 델타: 용의 둥지", enemyPool: ['h8','h3','h5'] },
        { level: 5, name: "섹터 엡실론: 심연의 탑", enemyPool: ['h10','h9','h4'] },
        { level: 6, name: "섹터 제타: 태양의 제단", enemyPool: ['h11','h1','h12'] },
        { level: 7, name: "오메가 코어: 최종 결전", enemyPool: ['h13','h12','h11','h8'] }
    ];

    // =====================================================================
    // [2] 3D ENGINE & VFX: 시인성/그래픽 극대화 모듈
    // =====================================================================
    class VisualEngine {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.fog = new THREE.FogExp2(0x020408, 0.015);
            
            // 세로형 모바일 비율 최적화 카메라
            this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
            
            document.getElementById('webgl-canvas').appendChild(this.renderer.domElement);
            
            this.raycaster = new THREE.Raycaster();
            this.pointer = new THREE.Vector2();
            
            this.boardTiles = [];
            this.runtimeAnims = [];
            
            this.initLights();
            this.initMapEnvironment();
            this.buildBoard();

            window.addEventListener('resize', () => this.onResize());
        }

        initLights() {
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            
            const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
            sun.position.set(15, 30, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
            this.scene.add(sun);

            // 진영 네온 라이트
            this.scene.add(new THREE.PointLight(0x00f3ff, 1.5, 30)).position.set(-5, 3, 6);
            this.scene.add(new THREE.PointLight(0xff007f, 1.5, 30)).position.set(5, 3, -6);
        }

        initMapEnvironment() {
            // 사이버 플로팅 파티클
            const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.5 });
            this.particles = [];
            for(let i=0; i<80; i++) {
                let p = new THREE.Mesh(geo, mat);
                p.position.set((Math.random()-0.5)*30, Math.random()*20-5, (Math.random()-0.5)*30);
                p.userData = { speed: Math.random()*0.05 + 0.02, rot: Math.random()*0.1 };
                this.scene.add(p);
                this.particles.push(p);
            }
        }

        buildBoard() {
            const tGeo = new THREE.BoxGeometry(2.2, 0.3, 2.2);
            const eGeo = new THREE.EdgesGeometry(tGeo);
            const matP = new THREE.MeshPhysicalMaterial({ color: 0x0a1526, roughness: 0.2, metalness: 0.8 });
            const matE = new THREE.MeshPhysicalMaterial({ color: 0x260a15, roughness: 0.2, metalness: 0.8 });
            const lineP = new THREE.LineBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.5 });
            const lineE = new THREE.LineBasicMaterial({ color: 0xff007f, transparent: true, opacity: 0.5 });

            const createTile = (c, r, isPlayer) => {
                let mesh = new THREE.Mesh(tGeo, isPlayer ? matP : matE);
                mesh.position.set(c*2.4 - 2.4, 0, isPlayer ? (r*2.4 + 1.2) : -(r*2.4 + 1.2));
                mesh.receiveShadow = true;
                mesh.add(new THREE.LineSegments(eGeo, isPlayer ? lineP : lineE));
                mesh.userData = { isPlayerArea: isPlayer, occupied: false };
                this.scene.add(mesh);
                this.boardTiles.push(mesh);
            };

            for(let r=0; r<3; r++) for(let c=0; c<3; c++) createTile(c, r, true);
            for(let r=0; r<3; r++) for(let c=0; c<3; c++) createTile(c, r, false);
        }

        // 절차적 13종 영웅 팩토리 (메모리 및 코드 최적화 패턴)
        createUnitMesh(hero) {
            const root = new THREE.Group();
            const bMat = new THREE.MeshPhysicalMaterial({ color: hero.color, metalness: 0.6, roughness: 0.3 });
            const gMat = new THREE.MeshStandardMaterial({ color: hero.glow, emissive: hero.glow, emissiveIntensity: 2 });
            
            // 공통 베이스 링
            let ring = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.05, 8, 32), gMat);
            ring.rotation.x = Math.PI/2; ring.position.y = 0.1;
            root.add(ring);
            this.runtimeAnims.push({ obj: ring, type: 'spin_y', speed: 0.03 });

            // 역할/아이디별 외형 매핑 (단순화된 형태적 특징 강조)
            if(hero.role === 'TANK') {
                let body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.9, 1.4, 6), bMat);
                body.position.y = 0.8; root.add(body);
                // 방어막(Shield) 가시화 객체 미리 생성 (숨김 처리)
                let shieldFX = new THREE.Mesh(new THREE.SphereGeometry(1.6, 32, 32), new THREE.MeshPhysicalMaterial({ transmission: 0.9, opacity: 1, transparent: true, color: hero.glow, roughness: 0.1 }));
                shieldFX.position.y = 0.8; shieldFX.visible = false;
                root.add(shieldFX);
                root.userData.shieldFX = shieldFX;
            } 
            else if(hero.role === 'DPS') {
                let body = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.8, 4), bMat);
                body.position.y = 1.0; root.add(body);
                let gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 1.5), gMat);
                gun.position.set(0, 1.2, 0.5); root.add(gun);
            }
            else if(hero.role === 'HEAL') {
                let body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 1.5, 16), bMat);
                body.position.y = 0.8; root.add(body);
                let halo = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 8, 32), gMat);
                halo.position.y = 2.0; halo.rotation.x = Math.PI/2; root.add(halo);
                this.runtimeAnims.push({ obj: halo, type: 'float', baseY: 2.0, speed: 3, amp: 0.1 });
            }
            else if(hero.role === 'MAGE') {
                let body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), bMat);
                body.position.y = 1.2; root.add(body);
                let orbs = new THREE.Group(); orbs.position.y = 1.2;
                for(let i=0; i<3; i++) {
                    let o = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15, 0), gMat);
                    o.position.set(Math.cos(i*2.09)*1.2, 0, Math.sin(i*2.09)*1.2);
                    orbs.add(o);
                }
                root.add(orbs);
                this.runtimeAnims.push({ obj: orbs, type: 'spin_y', speed: -0.05 });
            }
            else { // ASSASSIN, BRUISER
                let body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), bMat);
                body.position.y = 0.7; root.add(body);
                let wp = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.0, 4), gMat);
                wp.position.set(0.6, 1.0, 0.3); wp.rotation.x = Math.PI/3; root.add(wp);
            }

            // 체력바 (HP Bar)
            const hpPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.15), new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide }));
            hpPlane.position.y = 2.5; root.add(hpPlane);

            root.traverse(c => { if(c.isMesh) { c.castShadow=true; c.receiveShadow=true; }});
            this.runtimeAnims.push({ obj: root, type: 'breathe', baseY: 0, speed: 2, amp: 0.05 });

            return { mesh: root, hpMesh: hpPlane };
        }

        // 압도적 퀄리티의 무기 이펙트 팩토리 (레이저, 폭발 등)
        fireAttackVFX(attacker, target, callback) {
            let start = attacker.mesh.position.clone().setY(1.2);
            let end = target.mesh.position.clone().setY(1.2);

            if(attacker.role === 'DPS' || attacker.id === 'h12') { // 스나이퍼, 솔라: 강력한 빔(Laser) 연출
                let dist = start.distanceTo(end);
                let geo = new THREE.CylinderGeometry(0.1, 0.1, dist, 8);
                geo.translate(0, dist/2, 0); // Pivot at base
                let beam = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: attacker.glow, transparent:true, opacity: 0.8 }));
                beam.position.copy(start);
                beam.lookAt(end);
                beam.rotateX(Math.PI/2);
                this.scene.add(beam);

                // 레이저 두꺼워졌다가 사라짐
                new TWEEN.Tween(beam.scale).to({ x:3, z:3 }, 150).yoyo(true).repeat(1).onComplete(()=>{
                    this.scene.add(beam); // fixed glitch
                    this.scene.remove(beam);
                    this.createHitExplosion(end, attacker.glow);
                    callback();
                }).start();
            } 
            else { // 일반 구체/투사체 발사
                let proj = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8,8), new THREE.MeshBasicMaterial({ color: attacker.glow }));
                proj.position.copy(start);
                this.scene.add(proj);

                new TWEEN.Tween(proj.position).to({ x:end.x, y:end.y, z:end.z }, 300).easing(TWEEN.Easing.Quadratic.In).onComplete(()=>{
                    this.scene.remove(proj);
                    this.createHitExplosion(end, attacker.glow);
                    callback();
                }).start();
            }
        }

        createHitExplosion(pos, color) {
            const mat = new THREE.MeshBasicMaterial({ color: color });
            for(let i=0; i<12; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.15), mat);
                p.position.copy(pos);
                this.scene.add(p);
                let ang = Math.random()*Math.PI*2, force = Math.random()*2+1;
                new TWEEN.Tween(p.position).to({ x: p.position.x+Math.cos(ang)*force, y: p.position.y+Math.random()*2, z: p.position.z+Math.sin(ang)*force }, 400).easing(TWEEN.Easing.Quadratic.Out).onComplete(()=>this.scene.remove(p)).start();
            }
            // 카메라 흔들림 (Screen Shake)
            const basePos = { x: 0, y: 22, z: 16 };
            new TWEEN.Tween(this.camera.position).to({ x: (Math.random()-0.5)*0.8, y: 22+(Math.random()-0.5)*0.8, z: 16 }, 40).yoyo(true).repeat(3).onComplete(()=>this.camera.position.copy(basePos)).start();
        }

        showFloatingText(pos3D, text, type='dmg') {
            let v = pos3D.clone().setY(2.8).project(this.camera);
            let x = (v.x * .5 + .5) * window.innerWidth;
            let y = (-(v.y * .5) + .5) * window.innerHeight;

            let el = document.createElement('div');
            el.className = type === 'heal' ? 'txt-dmg txt-heal' : 'txt-dmg';
            el.innerText = text;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            document.getElementById('vfx-overlay').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        onResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        renderLoop(time) {
            TWEEN.update(time);
            let sec = time * 0.001;
            
            // 파티클
            this.particles.forEach(p => {
                p.position.y -= p.userData.speed;
                p.rotation.x += p.userData.rot; p.rotation.y += p.userData.rot;
                if(p.position.y < -5) p.position.y = 15;
            });

            // 큐 애니메이션
            this.runtimeAnims.forEach(a => {
                if(a.type === 'spin_y') a.obj.rotation.y += a.speed;
                if(a.type === 'float') a.obj.position.y = a.baseY + Math.sin(sec*a.speed)*a.amp;
                if(a.type === 'breathe') a.obj.position.y = a.baseY + Math.sin(sec*a.speed + a.obj.position.x)*a.amp;
            });

            // 빌보드 체력바 (양 진영 모두 탐색)
            [...(gameLogic.pUnits||[]), ...(gameLogic.eUnits||[])].forEach(u => {
                if(u.hpMesh && u.currentHp > 0) u.hpMesh.lookAt(this.camera.position);
            });

            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame((t) => this.renderLoop(t));
        }
    }

    // =====================================================================
    // [3] UI & LOGIC MANAGEMENT
    // =====================================================================
    class UIManager {
        constructor() {
            this.currentScreen = 'screen-menu';
        }

        showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('hud-battle').style.display = 'none';
            document.getElementById(id).classList.add('active');
            this.currentScreen = id;
            
            // 로비 카메라 세팅
            if(id === 'screen-menu' || id === 'screen-story') {
                new TWEEN.Tween(vfx.camera.position).to({ x:0, y:18, z:25 }, 1000).start();
            }
        }

        openStoryMap() {
            this.showScreen('screen-story');
            const container = document.getElementById('story-map-nodes');
            container.innerHTML = '';
            
            // 7단계 노드 렌더링
            STORY_LEVELS.slice().reverse().forEach((stage, idx) => {
                let isCleared = stage.level <= gameLogic.storyProgress;
                let isCurrent = stage.level === gameLogic.storyProgress + 1;
                let isLocked = stage.level > gameLogic.storyProgress + 1;

                let node = document.createElement('div');
                node.className = `story-node btn-interact ${isCleared?'cleared':''} ${isCurrent?'current':''} ${isLocked?'locked':''}`;
                node.innerHTML = `<span style="font-family:'Cinzel';font-size:1.5rem;font-weight:900;">${stage.level}</span><span style="font-size:0.6rem;text-align:center;">${stage.name.split(':')[0]}</span>`;
                
                if(idx < STORY_LEVELS.length - 1) {
                    let line = document.createElement('div');
                    line.className = `node-line ${isCleared?'cleared':''}`;
                    node.appendChild(line);
                }

                if(!isLocked) {
                    node.onclick = () => {
                        gameLogic.initMatch(stage.level, 'STORY');
                    };
                }
                container.appendChild(node);
            });
        }

        startMatchmaking() {
            this.showScreen('screen-match');
            let status = document.getElementById('match-status');
            status.innerText = "상대 위성 탐색 중...";
            
            setTimeout(() => status.innerText = "레이턴시 최적화 동기화 중...", 1500);
            setTimeout(() => status.innerText = "상대방 발견! 전장으로 이동합니다.", 3000);
            setTimeout(() => gameLogic.initMatch(0, 'PVP'), 4000);
        }

        toggleAnalytics() {
            const panel = document.getElementById('panel-analytics');
            panel.classList.toggle('open');
            this.updateAnalyticsUI();
        }

        updateAnalyticsUI() {
            const content = document.getElementById('analytics-content');
            content.innerHTML = '';
            
            // 가장 수치가 높은 값을 기준으로 100% 바 설정
            let maxVal = 1;
            gameLogic.pUnits.forEach(u => {
                let stat = gameLogic.analytics[u.uid];
                let total = stat.dmg + stat.heal + stat.tank;
                if(total > maxVal) maxVal = total;
            });

            gameLogic.pUnits.forEach(u => {
                let stat = gameLogic.analytics[u.uid];
                let dPct = (stat.dmg / maxVal) * 100;
                let hPct = (stat.heal / maxVal) * 100;
                let tPct = (stat.tank / maxVal) * 100;

                content.innerHTML += `
                    <div class="stat-row">
                        <div class="stat-name"><span>${u.name}</span> <span style="color:#aaa;">합산: ${stat.dmg+stat.heal+stat.tank}</span></div>
                        <div class="stat-bar-bg">
                            <div class="s-dmg" style="width:${dPct}%"></div>
                            <div class="s-heal" style="width:${hPct}%"></div>
                            <div class="s-tank" style="width:${tPct}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        endGameSession() {
            document.getElementById('screen-result').classList.remove('active');
            gameLogic.clearBoard();
            this.openStoryMap(); // 스토리 맵으로 귀환
        }
    }

    class GameLogic {
        constructor() {
            this.storyProgress = 0; // 스토리 클리어 진척도 (0~7)
            this.phase = 'IDLE';
            this.pUnits = []; this.eUnits = [];
            this.pWins = 0; this.eWins = 0;
            this.currentMode = 'STORY'; // STORY or PVP
            this.currentStage = null;
            this.countdown = 15.0;
            this.uidCounter = 0;
            this.analytics = {}; // { uid: {dmg, heal, tank} }
            
            this.dragState = { obj: null, origin: null, plane: new THREE.Plane(new THREE.Vector3(0,1,0), -1.5) };
            this.setupDragDrop();
        }

        initMatch(level, mode) {
            this.currentMode = mode;
            this.currentStage = level ? STORY_LEVELS.find(s => s.level === level) : null;
            this.pWins = 0; this.eWins = 0;
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('hud-battle').style.display = 'flex';
            
            this.startPlacement();
        }

        clearBoard() {
            this.pUnits.forEach(u => vfx.scene.remove(u.mesh)); this.pUnits = [];
            this.eUnits.forEach(u => vfx.scene.remove(u.mesh)); this.eUnits = [];
            vfx.boardTiles.forEach(t => t.userData.occupied = false);
            this.analytics = {};
        }

        startPlacement() {
            this.phase = 'PLACEMENT';
            this.countdown = 15.0;
            this.clearBoard();

            document.getElementById('score-p').innerText = this.pWins;
            document.getElementById('score-e').innerText = this.eWins;
            document.getElementById('phase-text').innerText = '배치 대기 중 (15초)';
            document.getElementById('btn-ready').style.display = 'none';

            // 카메라 세로형 전투 뷰
            new TWEEN.Tween(vfx.camera.position).to({ x:0, y:22, z:15.5 }, 1000).easing(TWEEN.Easing.Cubic.Out).start();

            this.renderRosterDeck();
        }

        renderRosterDeck() {
            const deck = document.getElementById('roster-deck');
            deck.innerHTML = '';
            deck.style.pointerEvents = 'auto'; deck.style.opacity = '1';

            HERO_DB.forEach(h => {
                let isLocked = this.currentMode === 'STORY' && h.unlockLevel > this.storyProgress;
                let card = document.createElement('div');
                card.className = `card glass btn-interact ${isLocked ? 'locked' : ''}`;
                card.style.borderTop = `3px solid #${h.color.toString(16)}`;
                card.innerHTML = `<div class="card-icon">${h.icon}</div><span style="font-size:0.7rem;font-weight:bold;">${h.name}</span>`;
                
                if(!isLocked) {
                    card.onclick = () => {
                        if(this.phase !== 'PLACEMENT' || this.pUnits.length >= 3) return;
                        let tile = vfx.boardTiles.find(t => t.userData.isPlayerArea && !t.userData.occupied);
                        if(tile) {
                            tile.userData.occupied = true;
                            let b = vfx.createUnitMesh(h);
                            b.mesh.position.copy(tile.position);
                            
                            this.uidCounter++;
                            let unit = { ...h, maxHp: h.hp, currentHp: h.hp, mesh: b.mesh, hpMesh: b.hpMesh, tile: tile, uid: this.uidCounter };
                            b.mesh.userData = { core: unit };
                            
                            vfx.scene.add(b.mesh);
                            this.pUnits.push(unit);
                            this.analytics[unit.uid] = { dmg: 0, heal: 0, tank: 0 }; // 스탯 트래킹 초기화

                            b.mesh.position.y = 8;
                            new TWEEN.Tween(b.mesh.position).to({y:0}, 500).easing(TWEEN.Easing.Bounce.Out).start();
                            
                            if(this.pUnits.length === 3) document.getElementById('btn-ready').style.display = 'block';
                        }
                    };
                }
                deck.appendChild(card);
            });
        }

        // --- Drag & Drop ---
        setupDragDrop() {
            window.addEventListener('pointerdown', e => {
                if(this.phase !== 'PLACEMENT') return;
                vfx.pointer.x = (e.clientX/window.innerWidth)*2-1; vfx.pointer.y = -(e.clientY/window.innerHeight)*2+1;
                vfx.raycaster.setFromCamera(vfx.pointer, vfx.camera);
                
                let intersects = vfx.raycaster.intersectObjects(this.pUnits.map(u=>u.mesh), true);
                if(intersects.length > 0) {
                    let obj = intersects[0].object;
                    while(obj.parent && obj.parent.type !== 'Scene') obj = obj.parent;
                    this.dragState.obj = obj;
                    this.dragState.origin = obj.userData.core.tile;
                    new TWEEN.Tween(obj.position).to({y:1.5}, 150).start();
                }
            });

            window.addEventListener('pointermove', e => {
                if(!this.dragState.obj || this.phase !== 'PLACEMENT') return;
                vfx.pointer.x = (e.clientX/window.innerWidth)*2-1; vfx.pointer.y = -(e.clientY/window.innerHeight)*2+1;
                vfx.raycaster.setFromCamera(vfx.pointer, vfx.camera);
                let hit = new THREE.Vector3();
                vfx.raycaster.ray.intersectPlane(this.dragState.plane, hit);
                this.dragState.obj.position.x += (hit.x - this.dragState.obj.position.x)*0.4;
                this.dragState.obj.position.z += (hit.z - this.dragState.obj.position.z)*0.4;
            });

            window.addEventListener('pointerup', () => {
                if(!this.dragState.obj) return;
                let obj = this.dragState.obj;
                let unit = obj.userData.core;
                
                let closest = null, minD = Infinity;
                vfx.boardTiles.filter(t=>t.userData.isPlayerArea).forEach(t => {
                    let d = obj.position.distanceTo(t.position);
                    if(d < minD) { minD = d; closest = t; }
                });

                if(minD > 2.5) { // 회수
                    vfx.scene.remove(obj);
                    unit.tile.userData.occupied = false;
                    this.pUnits = this.pUnits.filter(u=>u!==unit);
                    document.getElementById('btn-ready').style.display = 'none';
                } else { // 스왑/안착
                    if(!closest.userData.occupied) {
                        this.dragState.origin.userData.occupied = false;
                        closest.userData.occupied = true;
                        unit.tile = closest;
                    } else if(closest !== this.dragState.origin) {
                        let other = this.pUnits.find(u=>u.tile===closest);
                        other.tile = this.dragState.origin;
                        this.dragState.origin.userData.occupied = true;
                        new TWEEN.Tween(other.mesh.position).to({x:other.tile.position.x, z:other.tile.position.z}, 250).start();
                        unit.tile = closest;
                    }
                    new TWEEN.Tween(obj.position).to({x:unit.tile.position.x, y:0, z:unit.tile.position.z}, 300).easing(TWEEN.Easing.Bounce.Out).start();
                }
                this.dragState.obj = null;
            });
        }

        lockPlacement() {
            this.phase = 'COMBAT';
            document.getElementById('btn-ready').style.display = 'none';
            document.getElementById('phase-text').innerText = '⚔️ 전술 교전 진행 중';
            document.getElementById('roster-deck').style.pointerEvents = 'none';
            document.getElementById('roster-deck').style.opacity = '0.3';

            this.spawnEnemyAI();
            setTimeout(() => this.combatTick(), 1000);
        }

        spawnEnemyAI() {
            let aiTiles = vfx.boardTiles.filter(t => !t.userData.isPlayerArea);
            let pool = this.currentMode === 'STORY' && this.currentStage ? this.currentStage.enemyPool : HERO_DB.map(h=>h.id);

            for(let i=0; i<3; i++) {
                let hId = pool[Math.floor(Math.random() * pool.length)];
                let hData = HERO_DB.find(h=>h.id === hId);
                let tile = aiTiles.splice(Math.floor(Math.random()*aiTiles.length), 1)[0];
                
                tile.userData.occupied = true;
                let b = vfx.createUnitMesh(hData);
                b.mesh.position.copy(tile.position);
                b.mesh.rotation.y = Math.PI;

                this.uidCounter++;
                let unit = { ...hData, maxHp: hData.hp, currentHp: hData.hp, mesh: b.mesh, hpMesh: b.hpMesh, tile: tile, uid: this.uidCounter };
                b.mesh.userData = { core: unit };

                vfx.scene.add(b.mesh);
                this.eUnits.push(unit);

                b.mesh.position.y = 8;
                new TWEEN.Tween(b.mesh.position).to({y:0}, 500).easing(TWEEN.Easing.Back.Out).delay(i*100).start();
            }
        }

        combatTick() {
            if(this.phase !== 'COMBAT') return;

            let liveP = this.pUnits.filter(u=>u.currentHp > 0);
            let liveE = this.eUnits.filter(u=>u.currentHp > 0);

            if(liveP.length === 0 || liveE.length === 0) {
                this.endRound(liveP.length > 0);
                return;
            }

            // 아군 공격 & 스킬 & 힐
            liveP.forEach(p => {
                if(p.role === 'HEAL') { // 힐러는 아군 타겟
                    let targetP = liveP.sort((a,b)=> (a.currentHp/a.maxHp) - (b.currentHp/b.maxHp))[0];
                    this.executeAction(p, targetP, true);
                } else if(p.role === 'TANK' && p.mesh.userData.shieldFX) { // 탱커 방벽 스킬 연출
                    if(Math.random() > 0.5) { // 50% 확률 방벽 전개
                        p.mesh.userData.shieldFX.visible = true;
                        setTimeout(()=> p.mesh.userData.shieldFX.visible = false, 1000);
                        this.analytics[p.uid].tank += 50; // 가상의 방어 수치 통계
                    }
                    let targetE = liveE[Math.floor(Math.random()*liveE.length)];
                    this.executeAction(p, targetE, false);
                } else {
                    let targetE = liveE[Math.floor(Math.random()*liveE.length)];
                    this.executeAction(p, targetE, false);
                }
            });

            // 적군 공격 (시간차)
            setTimeout(() => {
                let cLiveP = this.pUnits.filter(u=>u.currentHp > 0);
                let cLiveE = this.eUnits.filter(u=>u.currentHp > 0);
                if(cLiveP.length === 0 || cLiveE.length === 0) return;

                cLiveE.forEach(e => {
                    let targetP = cLiveP[Math.floor(Math.random()*cLiveP.length)];
                    this.executeAction(e, targetP, false);
                });
                
                uiManager.updateAnalyticsUI(); // 턴마다 스탯 갱신
            }, 600);

            setTimeout(() => this.combatTick(), 1500);
        }

        executeAction(attacker, target, isHeal) {
            let oPos = attacker.mesh.position.clone();
            new TWEEN.Tween(attacker.mesh.position).to({x:oPos.x+(target.mesh.position.x-oPos.x)*0.2, z:oPos.z+(target.mesh.position.z-oPos.z)*0.2}, 200).yoyo(true).repeat(1).start();

            setTimeout(() => {
                vfx.fireAttackVFX(attacker, target, () => {
                    let val = attacker.atk + Math.floor(Math.random()*15);
                    
                    if(isHeal) {
                        target.currentHp = Math.min(target.maxHp, target.currentHp + val);
                        vfx.showFloatingText(target.mesh.position, `+${val}`, 'heal');
                        if(this.analytics[attacker.uid]) this.analytics[attacker.uid].heal += val;
                    } else {
                        target.currentHp -= val;
                        vfx.showFloatingText(target.mesh.position, `-${val}`, 'dmg');
                        if(this.analytics[attacker.uid]) this.analytics[attacker.uid].dmg += val;
                        if(this.analytics[target.uid]) this.analytics[target.uid].tank += Math.floor(val/3); // 맞은량도 탱킹으로 기록
                    }

                    let ratio = Math.max(0, target.currentHp / target.maxHp);
                    target.hpMesh.scale.x = ratio;
                    target.hpMesh.material.color.setHex(ratio > 0.4 ? 0x00ff88 : 0xff3366);

                    if(target.currentHp <= 0) {
                        new TWEEN.Tween(target.mesh.rotation).to({x:Math.PI/2}, 400).easing(TWEEN.Easing.Bounce.Out).start();
                        target.mesh.position.y = -0.1;
                        target.hpMesh.visible = false;
                        target.tile.userData.occupied = false;
                    }
                });
            }, 200);
        }

        endRound(isWin) {
            this.phase = 'RESULT';
            if(isWin) this.pWins++; else this.eWins++;
            document.getElementById('score-p').innerText = this.pWins;
            document.getElementById('score-e').innerText = this.eWins;

            setTimeout(() => {
                // 단판제 매치 종료 조건 (간소화를 위해 1승제로 설정, Bo5로 변경 원할 시 3으로 변경)
                if(this.pWins === 1 || this.eWins === 1) { 
                    document.getElementById('screen-result').classList.add('active');
                    let title = document.getElementById('res-title');
                    let desc = document.getElementById('res-desc');
                    
                    if(this.pWins === 1) {
                        title.innerText = "VICTORY"; title.style.color = "var(--gold)";
                        if(this.currentMode === 'STORY' && this.currentStage.level > this.storyProgress) {
                            this.storyProgress = this.currentStage.level; // 진척도 갱신
                            desc.innerText = `섹터 ${this.storyProgress} 점령! 신규 영웅 데이터 확보 완료.`;
                        } else {
                            desc.innerText = "전술 시뮬레이션 승리";
                        }
                    } else {
                        title.innerText = "DEFEAT"; title.style.color = "var(--danger)";
                        desc.innerText = "AI 오메가에게 전술이 간파당했습니다.";
                    }
                } else {
                    this.startPlacement();
                }
            }, 1800);
        }
    }

    // =====================================================================
    // [4] BOOTSTRAP: 타이머 및 전역 객체 바인딩
    // =====================================================================
    let vfx, uiManager, gameLogic;

    window.onload = () => {
        vfx = new VisualEngine();
        uiManager = new UIManager();
        gameLogic = new GameLogic();
        vfx.renderLoop(0);
    };

    // 15초 카운트다운 루프
    setInterval(() => {
        if(gameLogic.phase !== 'PLACEMENT') return;
        gameLogic.countdown -= 0.1;
        
        let ui = document.getElementById('timer-ui');
        if(gameLogic.countdown <= 0) {
            gameLogic.countdown = 0;
            ui.innerText = "0";
            gameLogic.lockPlacement();
        } else {
            ui.innerText = Math.max(0, gameLogic.countdown).toFixed(0);
        }
    }, 100);

</script>
</body>
</html>
