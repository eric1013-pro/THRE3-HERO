<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THRE3 HERO: Ultimate Protocol</title>
    <!-- 최고급 폰트 시스템 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <style>
        /* === 글로벌 럭셔리 네온 테마 === */
        :root {
            --gold: #ffb703; --gold-glow: rgba(255, 183, 3, 0.6);
            --neon-blue: #00f3ff; --neon-blue-glow: rgba(0, 243, 255, 0.5);
            --neon-purple: #c724b1; --neon-purple-glow: rgba(199, 36, 177, 0.4);
            --bg-deep: #020611; --glass-base: rgba(10, 16, 28, 0.85);
            --danger: #ff0055; --safe: #00ff88;
        }

        /* [터치 및 스크롤 버그 수정] 전체 터치 금지 해제 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-deep); font-family: 'Noto Serif KR', serif; color: #f8fafc; }
        
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 3D 캔버스에만 터치 액션 금지 부여 */
        #canvas-3d { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; touch-action: none; }
        #vfx-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; overflow: hidden; }

        .aurora-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.12) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(199, 36, 177, 0.15) 0%, transparent 40%); animation: auroraShift 10s infinite alternate ease-in-out; }
        @keyframes auroraShift { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        /* 하이엔드 글래스모피즘 & 젤리 버튼 */
        .glass { background: var(--glass-base); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05); }
        .jelly-btn { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s; cursor: pointer; }
        .jelly-btn:active { transform: scale(0.9) translateY(2px); filter: brightness(1.2); }

        /* === 화면 라우터 베이스 === */
        .ui-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top, 25px) 15px env(safe-area-inset-bottom, 25px) 15px; z-index: 20; pointer-events: none; box-sizing: border-box; }
        .ui-screen.active { display: flex; }
        .ui-screen > * { pointer-events: auto; }
        .solid-screen { background: rgba(2, 6, 17, 0.9); pointer-events: auto; }

        /* === 전술 브리핑 토스트 === */
        #toast-msg { position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 360px; border-radius: 16px; padding: 15px 20px; text-align: center; font-weight: 900; font-size: 0.9rem; border-left: 5px solid var(--neon-blue); box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 2000; pointer-events: none; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; opacity: 0; }
        #toast-msg.show { top: calc(env(safe-area-inset-top, 20px) + 15px); opacity: 1; }

        /* --- 1. 인트로 --- */
        #screen-intro { align-items: center; justify-content: center; background: #000; z-index: 100; pointer-events: auto; }
        .logo-text { font-family: 'Cinzel'; font-size: 3.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--neon-blue), 0 0 40px var(--neon-purple); letter-spacing: 6px; animation: logoAnim 2.5s forwards; }
        @keyframes logoAnim { 0% { opacity: 0; transform: scale(0.5); filter: blur(10px); } 30% { opacity: 1; transform: scale(1.05); filter: blur(0); } 100% { opacity: 0; transform: scale(1) translateY(-25px); filter: blur(5px); } }

        /* --- 2. 사령실 로비 === */
        #screen-lobby { align-items: center; justify-content: center; }
        .lobby-title { text-align: center; margin-bottom: 40px; }
        .lobby-title h1 { font-family: 'Cinzel'; font-size: 4rem; margin: 0; color: var(--gold); text-shadow: 0 0 25px var(--gold-glow); line-height: 1.1; }
        .lobby-title p { font-size: 0.9rem; color: var(--neon-blue); letter-spacing: 5px; margin: 10px 0 0 0; font-weight: 900; }
        .btn-large { width: 100%; max-width: 320px; padding: 20px; border-radius: 18px; font-family: 'Noto Serif KR'; font-size: 1.2rem; font-weight: 900; border: none; text-align: center; color: white; display: block; margin: 0 auto 15px auto; background: linear-gradient(135deg, #00d2ff 0%, #0055ff 100%); box-shadow: 0 8px 25px var(--neon-blue-glow); }

        /* --- 3. 확장형 캠페인 맵 (스크롤 버그 픽스) --- */
        #screen-story { padding-top: env(safe-area-inset-top, 40px); }
        .nav-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-back { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 14px; font-weight: bold; }
        
        .map-wrapper { width: 100%; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; overflow: hidden; margin-top: 15px; }
        /* touch-action: pan-y를 명시하여 모바일 세로 스크롤 허용 */
        .node-scroller { width: 100%; height: 50%; overflow-y: auto; display: flex; flex-direction: column-reverse; align-items: center; gap: 45px; padding: 30px 0; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        .node-scroller::-webkit-scrollbar { display: none; }
        
        .map-node { width: 80px; height: 80px; border-radius: 50%; background: #070b12; border: 4px solid #334155; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; transition: 0.3s; }
        .map-node.cleared { border-color: var(--safe); background: rgba(0, 255, 136, 0.1); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .map-node.target { border-color: var(--gold); background: rgba(255, 193, 7, 0.15); box-shadow: 0 0 30px var(--gold-glow); transform: scale(1.1); animation: pulseTarget 2s infinite; cursor: pointer; }
        .map-node.locked { opacity: 0.3; filter: grayscale(100%); }
        .node-line { position: absolute; width: 4px; height: 55px; background: #334155; z-index: 1; top: -53px; }
        .node-line.cleared { background: var(--safe); }
        @keyframes pulseTarget { 0%, 100% { box-shadow: 0 0 15px var(--gold-glow); } 50% { box-shadow: 0 0 35px var(--gold); } }

        .reward-panel { width: 100%; height: 48%; border-radius: 24px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .showroom-3d { width: 100%; height: 120px; border-radius: 16px; background: rgba(10, 15, 25, 0.6); border: 1px solid rgba(255,255,255,0.05); margin: 8px 0; pointer-events: none; }

        /* --- 4. 인게임 HUD --- */
        .hud-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .score-card { padding: 12px 20px; border-radius: 18px; min-width: 85px; text-align: center; }
        .score-card h3 { font-family: 'Cinzel'; font-size: 2rem; margin: 0; font-weight: 900; }
        .timer-hub { display: flex; flex-direction: column; align-items: center; }
        .timer-ring { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 1.8rem; font-weight: 900; color: var(--gold); border: 2px solid var(--gold); background: rgba(0,0,0,0.7); box-shadow: 0 0 20px var(--gold-glow); }
        .bo5-row { display: flex; gap: 6px; margin-top: 8px; }
        .bo5-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #4a5568; }
        .bo5-dot.win-p { background: var(--safe); border-color: var(--safe); box-shadow: 0 0 10px var(--safe); }
        .bo5-dot.win-e { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 10px var(--danger); }

        .util-stack { position: absolute; left: 15px; top: 120px; display: flex; flex-direction: column; gap: 12px; }
        .btn-util { padding: 10px 16px; border-radius: 14px; font-size: 0.8rem; font-weight: 900; color: white; border: 1px solid var(--glass-border); background: rgba(10,15,25,0.8); }
        .btn-util.active { background: rgba(0, 229, 255, 0.2); border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue-glow); }

        /* 실시간 통계 분석 패널 */
        #analytics-drawer { position: absolute; right: -360px; top: 120px; width: 300px; border-radius: 24px 0 0 24px; padding: 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); z-index: 998; border-right: none; }
        #analytics-drawer.open { right: 0; }
        .stat-track { width: 100%; height: 8px; background: #1a202c; border-radius: 4px; display: flex; overflow: hidden; margin-top: 6px; }
        .bar-dmg { background: var(--danger); transition: width 0.3s ease; } .bar-heal { background: var(--safe); transition: width 0.3s ease; } .bar-tank { background: #3b82f6; transition: width 0.3s ease; }

        /* 영웅 스펙 백과사전 모달 */
        #spec-modal { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 310px; border-radius: 28px; padding: 35px 25px; text-align: center; display: none; opacity: 0; z-index: 100; border: 1px solid var(--gold-glow); }

        /* 하단 덱 컨트롤러 (가로 스크롤 버그 픽스) */
        .hud-footer { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 500px; margin: 0 auto; }
        .phase-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-radius: 18px; }
        /* touch-action: pan-x로 좌우 스크롤 허용 */
        .deck-scroller { width: 100%; overflow-x: auto; display: flex; gap: 12px; padding: 15px 8px; border-radius: 20px; touch-action: pan-x; -webkit-overflow-scrolling: touch; }
        .deck-scroller::-webkit-scrollbar { display: none; }
        .deck-card { min-width: 80px; height: 100px; border-radius: 18px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: rgba(10, 15, 25, 0.7); }
        .deck-card .emoji { font-size: 1.6rem; margin-bottom: 5px; }
        .deck-card .name { font-size: 0.75rem; font-weight: 900; color: #e2e8f0; }
        .deck-card.locked { filter: grayscale(100%); opacity: 0.3; }
        .deck-card.locked::after { content: '🔒'; position: absolute; font-size: 1.3rem; }

        /* === 5. 결과 화면 === */
        #screen-result { align-items: center; justify-content: center; z-index: 300; }
        .result-box { width: 90%; max-width: 360px; padding: 50px 30px; border-radius: 32px; text-align: center; border: 1px solid var(--glass-border); }

        /* 플로팅 텍스트 이펙트 (일반, 치유, 특수스킬) */
        .fx-text { position: absolute; font-family: 'Cinzel', 'Noto Serif KR'; font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--danger), 2px 2px 0 #000; transform: translate(-50%, -50%); pointer-events: none; animation: floatTextUp 0.9s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; text-align: center; white-space: nowrap; }
        .fx-heal { color: var(--safe); text-shadow: 0 0 15px var(--safe), 2px 2px 0 #000; }
        .fx-skill { font-size: 1.8rem; color: var(--gold); text-shadow: 0 0 15px var(--gold), 2px 2px 0 #000; }
        @keyframes floatTextUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 25% { transform: translate(-50%, -90%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); } }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>
    
    <div id="viewport">
        <!-- 3D 엔진 코어 및 VFX 오버레이 공간 -->
        <div id="canvas-3d"></div>
        <div id="vfx-layer"></div>

        <!-- 통합 전술 알림 센터 배너 -->
        <div id="toast-msg" class="glass">SYSTEM ONLINE</div>

        <!-- 1. 시네마틱 인트로 -->
        <div id="screen-intro" class="ui-screen active solid-screen">
            <div class="logo-text">THRE3RIC STUDIO</div>
        </div>

        <!-- 2. 대시보드 로비 -->
        <div id="screen-lobby" class="ui-screen solid-screen">
            <div class="lobby-title">
                <h1>THRE3 HERO</h1>
                <p>Ultimate Protocol V</p>
            </div>
            <button class="btn-large jelly-btn" onclick="window.uiManager.switchScreen('story')">📖 캠페인 작전 개시</button>
        </div>

        <!-- 3. 확장형 스토리 지도 및 리워드 쇼룸 -->
        <div id="screen-story" class="ui-screen solid-screen">
            <div class="nav-bar">
                <button class="btn-back glass jelly-btn" onclick="window.uiManager.switchScreen('lobby')">↩ 기지 복귀</button>
                <span style="font-family:'Cinzel'; font-weight:900; font-size:1.1rem; color:var(--gold);">SECTORS</span>
            </div>
            <div class="map-wrapper">
                <div class="node-scroller" id="story-nodes"></div>
                <div class="reward-panel glass">
                    <div>
                        <div style="font-size:0.75rem; color:var(--gold); font-weight:900; letter-spacing:1px;">SECTOR REWARD</div>
                        <h2 id="reward-title" style="margin:4px 0 0 0; font-size:1.3rem; color:white; text-decoration:underline;">보상 데이터</h2>
                    </div>
                    <div class="showroom-3d" id="showroom-3d"></div>
                    <p id="reward-desc" style="font-size:0.8rem; color:#cbd5e0; margin:0; line-height:1.4; text-align:left; background:rgba(0,0,0,0.4); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);"></p>
                </div>
            </div>
        </div>

        <!-- 4. 인게임 실시간 전투 HUD (배경 투명) -->
        <div id="screen-battle" class="ui-screen">
            <!-- 상단 점수 전광판 -->
            <div class="hud-header">
                <div class="score-card glass">
                    <span style="font-size:0.75rem; color:#94a3b8; font-weight:bold;">COMMANDER</span>
                    <h3 id="score-p">0</h3>
                </div>
                <div class="timer-hub">
                    <!-- 타이머 ID 완벽 일치화 -->
                    <div class="timer-ring" id="battle-timer">15</div>
                    <div class="bo5-row" id="bo5-dots">
                        <div class="bo5-dot"></div><div class="bo5-dot"></div><div class="bo5-dot"></div>
                    </div>
                </div>
                <div class="score-card glass">
                    <span style="font-size:0.75rem; color:#94a3b8; font-weight:bold;">AI OMEGA</span>
                    <h3 id="score-e" style="color:var(--danger);">0</h3>
                </div>
            </div>

            <!-- 사이드 제어기 및 통계 드로어 -->
            <div class="util-stack">
                <button id="btn-cam" class="btn-util jelly-btn active" onclick="window.gameCore.toggleCamera()">🎥 시네마틱 ON</button>
                <button class="btn-util jelly-btn" style="color:var(--gold); border-color:var(--gold-glow);" onclick="window.uiManager.toggleAnalytics()">📊 실시간 통계</button>
            </div>

            <div id="analytics-drawer" class="glass">
                <h3 style="margin:0 0 15px 0; color:var(--gold); border-bottom:1px solid rgba(0,229,255,0.2); padding-bottom:10px; font-family:'Cinzel';">ANALYTICS</h3>
                <div style="display:flex; gap:10px; font-size:0.75rem; font-weight:bold; margin-bottom:15px;">
                    <span style="color:var(--danger);">■ 파괴</span> <span style="color:var(--safe);">■ 치유</span> <span style="color:#3b82f6;">■ 방어</span>
                </div>
                <div id="analytics-board"></div>
            </div>

            <!-- 스펙 백과사전 모달 -->
            <div id="modal-spec" class="glass">
                <h2 id="spec-title" style="font-family:'Cinzel'; color:var(--gold); margin:0 0 5px 0; font-size:2rem;">HERO</h2>
                <p id="spec-role" style="font-family:'Cinzel'; font-size:0.85rem; color:var(--neon-blue); font-weight:900; margin:0 0 10px 0;"></p>
                <p id="spec-stat" style="font-size:0.9rem; color:#e2e8f0; font-weight:bold;"></p>
                <p id="spec-desc" style="font-size:0.85rem; color:#cbd5e0; border-top:1px solid var(--glass-border); padding-top:15px; line-height:1.5; text-align:left;"></p>
                <button class="btn-large jelly-btn" style="margin-top:20px; padding:12px; font-size:1rem; border-radius:14px; width:100%;" onclick="window.uiManager.closeSpecModal()">확인</button>
            </div>

            <!-- 하단 덱 스크롤러 영역 -->
            <div class="hud-footer">
                <div class="phase-bar glass">
                    <!-- 단계 텍스트 ID 완벽 일치화 -->
                    <span id="phase-text" style="font-size:0.9rem; font-weight:900; color:var(--neon-blue);">영웅 배치 단계</span>
                    <button id="btn-placement-lock" class="jelly-btn" style="padding:10px 20px; border-radius:12px; background:var(--gold); color:#000; border:none; font-weight:900; font-size:0.9rem; display:none;" onclick="window.gameCore.lockPlacement()">배치 완료</button>
                </div>
                <div id="roster-deck" class="deck-scroller glass"></div>
            </div>
        </div>

        <!-- 5. 결과 화면 -->
        <div id="screen-result" class="ui-screen solid-screen">
            <div class="result-box glass">
                <h1 id="result-title" style="font-family:'Cinzel'; font-size:3.8rem; margin:0 0 15px 0;">VICTORY</h1>
                <p id="result-desc" style="color:#94a3b8; font-size:1rem; margin-bottom:40px; font-weight:bold;">전술 시뮬레이션 매치 종료</p>
                <button class="btn-large jelly-btn" style="margin:0;" onclick="window.uiManager.switchScreen('story')">사령실 귀환</button>
            </div>
        </div>
    </div>

<script>
    // =========================================================================
    // [전역 스코프 마운팅] 인라인 태그 ReferenceError 완벽 차단
    // =========================================================================
    window.engine3D = null;
    window.uiManager = null;
    window.gameCore = null;

    // --- 1. CORE DATABASE ---
    const DB_HEROES = [
        { id: 'u1', name: '가디언', hp: 650, atk: 24, role: 'TANK', color: 0x94a3b8, glow: 0xffffff, icon: '🛡️', unlockLv: 0, skill: '[절대성벽] 매 턴 시작 시 50% 확률로 구체 방어막을 생성하여 적의 피해를 완전히 무효화합니다.' },
        { id: 'u2', name: '스나이퍼', hp: 150, atk: 90, role: 'DPS', color: 0xe11d48, glow: 0xff0055, icon: '🎯', unlockLv: 0, skill: '[집속레이저] 타격 시 탄환 대신 고출력 빔을 발사하여 상대 후열 딜러에게 회피 불능의 치명타를 투사합니다.' },
        { id: 'u3', name: '클레릭', hp: 260, atk: 18, role: 'HEAL', color: 0x10b981, glow: 0x00ff88, icon: '✨', unlockLv: 0, skill: '[여신의 오라] 타격을 생략하고, 전장에서 생명력이 가장 낮은 아군을 자동 탐색해 강력한 치유를 부여합니다.' },

    // =========================================================================
    // [2] 3D ENGINE CORE (해상도 및 시점 고정 완벽화)
    // =========================================================================
    class VisualEngine {
        constructor() {
            this.container = document.getElementById('canvas-3d');
            this.scene = new THREE.Scene();
            this.scene.fog = new THREE.FogExp2(0x010308, 0.015);

            this.camera = new THREE.PerspectiveCamera(54, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.camera.position.set(0, 26, 14); // 보드가 정중앙에 오도록 높이와 각도 조절
            this.camera.lookAt(0, 0, 0);

            // 알파 투명 렌더링을 통해 뒷배경 오로라 노출
            this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.container.appendChild(this.renderer.domElement);

            this.raycaster = new THREE.Raycaster();
            this.pointer = new THREE.Vector2();
            this.dragState = { active: null, origin: null, plane: new THREE.Plane(new THREE.Vector3(0,1,0), -0.16) };

            this.boardTiles = [];
            this.animQueue = [];
            this.stars = [];

            this.setupLights();
            this.setupEnvironment();
            this.buildBoard();
            this.bindEvents();

            window.addEventListener('resize', () => {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        setupLights() {
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            let sun = new THREE.DirectionalLight(0xfff5e6, 1.4);
            sun.position.set(12, 35, 12);
            sun.castShadow = true;
            this.scene.add(sun);
            this.scene.add(new THREE.PointLight(0x00e5ff, 1.5, 40)).position.set(-5, 4, 6);
            this.scene.add(new THREE.PointLight(0xc724b1, 1.5, 40)).position.set(5, 4, -6);
        }

        setupEnvironment() {
            const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.5 });
            for(let i=0; i<70; i++) {
                let s = new THREE.Mesh(geo, mat);
                s.position.set((Math.random()-0.5)*30, Math.random()*18, (Math.random()-0.5)*30);
                s.userData = { speed: Math.random()*0.03 + 0.015 };
                this.scene.add(s);
                this.stars.push(s);
            }
        }

        buildBoard() {
            const tGeo = new THREE.BoxGeometry(2.15, 0.32, 2.15);
            const eGeo = new THREE.EdgesGeometry(tGeo);
            const matP = new THREE.MeshPhysicalMaterial({ color: 0x0c1928, metalness: 0.8, roughness: 0.2, clearcoat: 1.0 });
            const matE = new THREE.MeshPhysicalMaterial({ color: 0x280c18, metalness: 0.8, roughness: 0.2, clearcoat: 1.0 });
            
            // 전술 섀도우 인디케이터 글로우
            const glowGeo = new THREE.PlaneGeometry(2.0, 2.0);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffc107, transparent: true, opacity: 0, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });

            const createTile = (c, r, isP) => {
                let m = new THREE.Mesh(tGeo, isP ? matP : matE);
                // 보드 정중앙 정렬 좌표식
                m.position.set(c*2.4 - 2.4, 0.16, isP ? (r*2.4 + 1.2) : -(r*2.4 + 1.2));
                m.receiveShadow = true;
                m.add(new THREE.LineSegments(eGeo, new THREE.LineBasicMaterial({ color: isP ? 0x00e5ff : 0xff0055, transparent: true, opacity: 0.6 })));
                
                let ind = new THREE.Mesh(glowGeo, glowMat.clone());
                ind.rotation.x = -Math.PI/2; ind.position.y = 0.17;
                m.add(ind);

                m.userData = { isPlayerArea: isP, occupied: false, indicator: ind };
                this.scene.add(m);
                this.boardTiles.push(m);
            };

            for(let r=0; r<3; r++) for(let c=0; c<3; c++) createTile(c, r, true);
            for(let r=0; r<3; r++) for(let c=0; c<3; c++) createTile(c, r, false);
        }

        createHeroModel(hero) {
            const group = new THREE.Group();
            const bMat = new THREE.MeshPhysicalMaterial({ color: hero.color, metalness: 0.65, roughness: 0.25, clearcoat: 1.0 });
            const gMat = new THREE.MeshStandardMaterial({ color: hero.glow, emissive: hero.glow, emissiveIntensity: 2.5 });

            let ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.04, 8, 24), gMat);
            ring.rotation.x = Math.PI/2; ring.position.y = 0.1;
            group.add(ring);
            this.animQueue.push({ obj: ring, act: 'spin', val: 0.04 });

            if(hero.role === 'TANK') {
                group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.4, 6), bMat).translateY(0.8));
                let sfx = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 24), new THREE.MeshPhysicalMaterial({ transmission: 0.95, opacity: 1, transparent: true, color: hero.glow, roughness: 0.1 }));
                sfx.position.y = 0.8; sfx.visible = false;
                group.add(sfx); group.userData.shieldFX = sfx;
            } 
            else if(hero.role === 'DPS') {
                group.add(new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.8, 4), bMat).translateY(1.0));
                let gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 1.4), gMat);
                gun.position.set(0, 1.3, 0.3); group.add(gun);
            }
            else if(hero.role === 'HEAL') {
                group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 1.5, 12), bMat).translateY(0.8));
                let halo = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 8, 24), gMat);
                halo.position.y = 2.0; halo.rotation.x = Math.PI/2; group.add(halo);
                this.animQueue.push({ obj: halo, act: 'bob', baseY: 2.0, speed: 4, amp: 0.1 });
            }
            else if(hero.role === 'MAGE') {
                group.add(new THREE.Mesh(new THREE.SphereGeometry(0.55, 24, 24), bMat).translateY(1.2));
                let orbs = new THREE.Group(); orbs.position.y = 1.2;
                for(let i=0; i<3; i++) {
                    let o = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15, 0), gMat);
                    o.position.set(Math.cos(i*2.09)*1.1, 0, Math.sin(i*2.09)*1.1); orbs.add(o);
                }
                group.add(orbs); this.animQueue.push({ obj: orbs, act: 'spin', val: -0.055 });
            }
            else { 
                group.add(new THREE.Mesh(new THREE.BoxGeometry(0.76, 1.2, 0.76), bMat).translateY(0.7));
                let wp = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.9, 4), gMat);
                wp.position.set(0.6, 0.9, 0.3); wp.rotation.x = Math.PI/3; group.add(wp);
            }

            const hpPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.12), new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide }));
            hpPlane.position.y = 2.5; group.add(hpPlane);

            group.traverse(m => { if(m.isMesh) { m.castShadow = true; m.receiveShadow = true; }});
            this.animQueue.push({ obj: group, act: 'breathe', baseY: 0.16, speed: 2, amp: 0.05 });

            group.updateMatrixWorld(true);
            return { group: group, hpMesh: hpPlane };
        }

        bindEvents() {
            window.addEventListener('pointerdown', e => {
                if(!window.gameCore || window.gameCore.phase !== 'PLACEMENT') return;
                this.pointer.x = (e.clientX/window.innerWidth)*2-1; this.pointer.y = -(e.clientY/window.innerHeight)*2+1;
                this.raycaster.setFromCamera(this.pointer, this.camera);
                
                let hits = this.raycaster.intersectObjects(window.gameCore.pUnits.map(u=>u.mesh), true);
                if(hits.length > 0) {
                    let n = hits[0].object; while(n.parent && n.parent.type!=='Scene') n = n.parent;
                    
                    // 해당 오브젝트의 기존 트윈만 멈추고 새 트윈 할당 (글로벌 removeAll 방지)
                    new TWEEN.Tween(n.scale).to({x:0.8, y:1.3, z:0.8}, 160).start();
                    new TWEEN.Tween(n.position).to({y:1.6}, 160).start();
                    
                    this.dragState.active = n; this.dragState.origin = n.userData.core.tile;
                }
            });

            window.addEventListener('pointermove', e => {
                if(!this.dragState.active || window.gameCore.phase !== 'PLACEMENT') return;
                this.pointer.x = (e.clientX/window.innerWidth)*2-1; this.pointer.y = -(e.clientY/window.innerHeight)*2+1;
                this.raycaster.setFromCamera(this.pointer, this.camera);
                
                let hit = new THREE.Vector3();
                this.raycaster.ray.intersectPlane(this.dragState.plane, hit);
                this.dragState.active.position.x += (hit.x - this.dragState.active.position.x)*0.45;
                this.dragState.active.position.z += (hit.z - this.dragState.active.position.z)*0.45;

                let closest = null, minD = Infinity;
                this.boardTiles.filter(t=>t.userData.isPlayerArea).forEach(t => {
                    t.userData.indicator.material.opacity = 0;
                    let d = this.dragState.active.position.distanceTo(t.position);
                    if(d < minD) { minD = d; closest = t; }
                });
                if(closest && minD < 2.5) closest.userData.indicator.material.opacity = 0.5 + Math.sin(Date.now()*0.015)*0.2;
            });

            window.addEventListener('pointerup', () => {
                if(!this.dragState.active) return;
                let n = this.dragState.active; let core = n.userData.core;
                this.boardTiles.forEach(t => t.userData.indicator.material.opacity = 0);

                let closest = null, minD = Infinity;
                this.boardTiles.filter(t=>t.userData.isPlayerArea).forEach(t => {
                    let d = n.position.distanceTo(t.position);
                    if(d < minD) { minD = d; closest = t; }
                });

                if(minD > 2.6) { // 회수
                    this.clearUnitMemory(n);
                    core.tile.userData.occupied = false;
                    window.gameCore.pUnits = window.gameCore.pUnits.filter(u=>u!==core);
                    window.gameCore.renderDeck();
                } else { // 안착 및 스왑
                    if(!closest.userData.occupied || closest === this.dragState.origin) {
                        this.dragState.origin.userData.occupied = false; closest.userData.occupied = true; core.tile = closest;
                    } else {
                        let other = window.gameCore.pUnits.find(u=>u.tile===closest);
                        other.tile = this.dragState.origin; this.dragState.origin.userData.occupied = true;
                        new TWEEN.Tween(other.mesh.position).to({x:other.tile.position.x, z:other.tile.position.z}, 250).easing(TWEEN.Easing.Back.Out).start();
                        core.tile = closest;
                    }
                    new TWEEN.Tween(n.position).to({x:core.tile.position.x, y:0.16, z:core.tile.position.z}, 350).easing(TWEEN.Easing.Bounce.Out).start();
                    new TWEEN.Tween(n.scale).to({x:1.2, y:0.8, z:1.2}, 120).onComplete(()=>new TWEEN.Tween(n.scale).to({x:1,y:1,z:1}, 200).easing(TWEEN.Easing.Elastic.Out).start()).start();
                }
                this.dragState.active = null;
                window.gameCore.evalReadyBtn();
            });
        }

        clearUnitMemory(obj) {
            this.scene.remove(obj);
            obj.traverse(c => {
                if(c.isMesh) {
                    if(c.geometry) c.geometry.dispose();
                    if(c.material) { if(Array.isArray(c.material)) c.material.forEach(m=>m.dispose()); else c.material.dispose(); }
                }
            });
            this.animQueue = this.animQueue.filter(a => a.obj !== obj && !obj.getObjectById(a.obj.id));
        }

        fireAttack(attacker, target, cb) {
            let sP = attacker.mesh.position.clone().setY(1.2), eP = target.mesh.position.clone().setY(1.2);

            if(window.gameCore.camCinematic) {
                new TWEEN.Tween(this.camera.position).to(sP.clone().add(new THREE.Vector3(0,4,4)), 200).easing(TWEEN.Easing.Quadratic.Out).start();
            }

            const resolve = () => {
                this.createBlast(eP, attacker.glow);
                if(window.gameCore.camCinematic) {
                    new TWEEN.Tween(this.camera.position).to({x:0, y:26, z:14}, 300).onComplete(()=>{ cb(); }).start();
                } else cb();
            };

            if(attacker.role === 'DPS' || attacker.id === 'u12') { 
                let d = sP.distanceTo(eP);
                let bGeo = new THREE.CylinderGeometry(0.08, 0.08, d, 8).translate(0, d/2, 0);
                let bMat = new THREE.MeshBasicMaterial({ color: attacker.glow, transparent:true, opacity:0.9 });
                let b = new THREE.Mesh(bGeo, bMat);
                b.position.copy(sP); b.lookAt(eP); b.rotateX(Math.PI/2);
                this.scene.add(b);
                new TWEEN.Tween(b.scale).to({x:4, z:4}, 120).yoyo(true).repeat(1).onComplete(()=>{ this.scene.remove(b); bGeo.dispose(); bMat.dispose(); resolve(); }).start();
            } else {
                let bGeo = new THREE.SphereGeometry(0.18, 8, 8);
                let bMat = new THREE.MeshBasicMaterial({ color: attacker.glow });
                let b = new THREE.Mesh(bGeo, bMat);
                b.position.copy(sP); this.scene.add(b);
                new TWEEN.Tween(b.position).to({x:eP.x, y:eP.y, z:eP.z}, 250).easing(TWEEN.Easing.Quadratic.In).onComplete(()=>{ this.scene.remove(b); bGeo.dispose(); bMat.dispose(); resolve(); }).start();
            }
        }

        createBlast(pos, color) {
            let mat = new THREE.MeshBasicMaterial({ color: color });
            let geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            for(let i=0; i<10; i++) {
                let p = new THREE.Mesh(geo, mat); p.position.copy(pos); this.scene.add(p);
                let t = Math.random()*Math.PI*2, f = Math.random()*1.8 + 0.6;
                new TWEEN.Tween(p.position).to({ x: p.position.x+Math.cos(t)*f, y: p.position.y+Math.random()*1.8, z: p.position.z+Math.sin(t)*f }, 380).easing(TWEEN.Easing.Quadratic.Out).onComplete(()=>{ this.scene.remove(p); geo.dispose(); mat.dispose(); }).start();
            }
            // Screen Shake
            if(!window.gameCore.camCinematic) {
                const base = {x:0, y:26, z:14};
                new TWEEN.Tween(this.camera.position).to({x:(Math.random()-0.5)*0.8, y:26+(Math.random()-0.5)*0.8, z:14}, 40).yoyo(true).repeat(3).onComplete(()=>this.camera.position.copy(base)).start();
            }
        }

        popText(pos, txt, type='dmg') {
            let v = pos.clone().setY(2.6).project(this.camera);
            let el = document.createElement('div');
            el.className = type === 'heal' ? 'fx-text fx-heal' : type === 'skill' ? 'fx-text fx-skill' : 'fx-text';
            el.innerText = txt;
            el.style.left = `${(v.x*.5+.5)*window.innerWidth}px`; el.style.top = `${(-(v.y*.5)+.5)*window.innerHeight}px`;
            document.getElementById('vfx-layer').appendChild(el);
            setTimeout(() => el.remove(), 850);
        }

        renderLoop(time) {
            TWEEN.update(time);
            
            // 시네마틱 아이들 카메라 패닝 (배치 단계에서만)
            if(window.gameCore && window.gameCore.phase === 'PLACEMENT' && window.gameCore.camCinematic) {
                this.camera.position.x = Math.sin(time * 0.0005) * 3;
            } else if(window.gameCore && window.gameCore.phase === 'PLACEMENT' && !window.gameCore.camCinematic) {
                this.camera.position.x = 0;
            }
            
            // 필수! 카메라가 움직여도 체스판 중앙(0,0,0)을 무조건 바라보게 강제 락
            this.camera.lookAt(0, 0, 0);

            this.stars.forEach(s => { s.position.y -= s.userData.speed; if(s.position.y < -4) s.position.y = 15; });
            
            let s = time * 0.001;
            this.animQueue.forEach(a => {
                if(!a.obj || !a.obj.position) return;
                if(a.act === 'spin') a.obj.rotation.y += a.val;
                if(a.act === 'bob') a.obj.position.y = a.baseY + Math.sin(s*a.speed)*a.amp;
                if(a.act === 'breathe') a.obj.position.y = a.baseY + Math.sin(s*a.speed + a.obj.position.x)*a.amp;
            });

            if(window.gameCore && window.gameCore.pUnits) {
                [...window.gameCore.pUnits, ...window.gameCore.eUnits].forEach(u => {
                    if(u.hpMesh && u.currentHp > 0) u.hpMesh.lookAt(this.camera.position);
                });
            }

            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame((t) => this.renderLoop(t));
        }
    }

    // [3] UI & VIEW CONTROLLER
    // =========================================================================
    class UIManager {
        constructor() { this.subScene = null; this.subCam = null; this.subRender = null; this.subMesh = null; }

        notify(msg, type='cyan') {
            const toast = document.getElementById('toast-msg');
            toast.innerText = `[전술브리핑] : ${msg}`;
            toast.style.borderLeftColor = type === 'danger' ? 'var(--danger)' : type === 'safe' ? 'var(--safe)' : 'var(--neon-blue)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        switchScreen(id) {
            ['intro', 'lobby', 'story', 'battle', 'result'].forEach(s => {
                document.getElementById('screen-' + s).classList.remove('active');
            });
            document.getElementById('analytics-drawer').classList.remove('open');
            
            document.getElementById(`screen-${id}`).classList.add('active');

            if(id === 'lobby' || id === 'story') {
                new TWEEN.Tween(window.engine3D.camera.position).to({x:0, y:26, z:14}, 600).easing(TWEEN.Easing.Cubic.Out).start();
            }
        }

        renderStoryMap() {
            this.switchScreen('story');
            this.initSub3D();
            const box = document.getElementById('story-nodes');
            box.innerHTML = '';

            STAGE_DATA.slice().reverse().forEach((s, i) => {
                let cleared = s.lv <= window.gameCore.storyProgress;
                let current = s.lv === window.gameCore.storyProgress + 1;
                let locked = s.lv > window.gameCore.storyProgress + 1;

                let n = document.createElement('div');
                n.className = `map-node jelly-btn ${cleared?'cleared':''} ${current?'target':''} ${locked?'locked':''}`;
                n.innerHTML = `<span style="font-family:'Cinzel'; font-size:1.4rem; font-weight:900;">${s.lv}</span>`;
                if(i < STAGE_DATA.length - 1) n.innerHTML += `<div class="map-line ${cleared?'cleared':''}"></div>`;

                n.onclick = () => { if(!locked) this.syncReward(s); };
                box.appendChild(n);
                if(current) this.syncReward(s);
            });
        }

        initSub3D() {
            const z = document.getElementById('showroom-3d');
            if(this.subRender) return;
            this.subScene = new THREE.Scene();
            this.subCam = new THREE.PerspectiveCamera(45, z.clientWidth/z.clientHeight, 0.1, 100);
            this.subCam.position.set(0, 2.8, 4.5); this.subCam.lookAt(0,0.8,0);
            this.subRender = new THREE.WebGLRenderer({ antialias:true, alpha:true });
            this.subRender.setSize(z.clientWidth, z.clientHeight);
            z.appendChild(this.subRender.domElement);
            this.subScene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const lp = () => { requestAnimationFrame(loop); if(this.subMesh) this.subMesh.rotation.y += 0.02; this.subRender.render(this.subScene, this.subCam); };
            const loop = lp; loop(); 
        }

        syncReward(s) {
            let h = DB_HEROES.find(u=>u.id === s.rewardId);
            document.getElementById('reward-title').innerText = `🏆 섹터 ${s.lv} 출격 (클릭하여 진입)`;
            document.getElementById('reward-desc').innerText = `보상 영웅: [${h.name}] \n ${h.skill}`;
            
            if(this.subMesh) {
                this.subScene.remove(this.subMesh);
                this.subMesh.traverse(c => {
                    if(c.isMesh) {
                        if(c.geometry) c.geometry.dispose();
                        if(c.material) { if(Array.isArray(c.material)) c.material.forEach(m=>m.dispose()); else c.material.dispose(); }
                    }
                });
            }

            let pack = window.engine3D.createHeroModel(h); pack.hpMesh.visible = false;
            this.subMesh = pack.group; this.subMesh.position.set(0,0,0); this.subMesh.scale.set(0.9,0.9,0.9);
            this.subScene.add(this.subMesh);

            this.notify(`🎯 섹터 [${s.name}] 목표 설정 완료.`, 'safe');
            
            document.getElementById('reward-title').style.cursor = 'pointer';
            document.getElementById('reward-title').onclick = () => {
                this.switchScreen('battle');
                window.gameCore.initMatch(s.lv);
            };
        }

        openSpecModal(h) {
            document.getElementById('spec-title').innerText = h.name;
            document.getElementById('spec-role').innerText = `CLASS : ${h.role}`;
            document.getElementById('spec-stat').innerHTML = `내구강도: <span style="color:var(--safe)">${h.hp}</span> &nbsp;|&nbsp; 파괴화력: <span style="color:var(--danger)">${h.atk}</span>`;
            document.getElementById('spec-desc').innerText = h.skill;
            const m = document.getElementById('modal-spec'); m.style.display = 'block';
            setTimeout(() => { m.style.opacity = '1'; m.style.transform = 'translate(-50%, -50%) scale(1)'; }, 10);
        }

        closeSpecModal() {
            const m = document.getElementById('modal-spec');
            m.style.opacity = '0'; m.style.transform = 'translate(-50%, -50%) scale(0.8)';
            setTimeout(() => m.style.display = 'none', 250);
        }

        toggleAnalytics() {
            let d = document.getElementById('analytics-drawer'); d.classList.toggle('open');
            if(d.classList.contains('open')) this.refreshStats();
        }

        refreshStats() {
            let box = document.getElementById('analytics-board'); box.innerHTML = '';
            let max = 1;
            window.gameCore.pUnits.forEach(u => { let t = u.stat.dmg+u.stat.heal+u.stat.tank; if(t > max) max = t; });
            window.gameCore.pUnits.forEach(u => {
                let d = (u.stat.dmg/max)*100, h = (u.stat.heal/max)*100, t = (u.stat.tank/max)*100;
                box.innerHTML += `<div style="margin-bottom:12px; font-size:0.8rem; font-weight:bold;"><div style="display:flex; justify-content:space-between;"><span>${u.name}</span><span style="color:#94a3b8;">${u.stat.dmg+u.stat.heal+u.stat.tank}</span></div><div class="stat-track"><div class="bar-dmg" style="width:${d}%"></div><div class="bar-heal" style="width:${h}%"></div><div class="bar-tank" style="width:${t}%"></div></div></div>`;
            });
        }
    }

    // =========================================================================
    // [4] MASTER GAME PROCESS CORE (13종 스킬 & 5판 3선승제 완벽 연산)
    // =========================================================================
    class GameCore {
        constructor() {
            this.storyProgress = 0;
            this.pUnits = []; this.eUnits = [];
            this.pWins = 0; this.eWins = 0;
            this.phase = 'IDLE'; this.timer = 15.0;
            this.camCinematic = true; this.activeLv = 1;
            this.round = 1;
        }

        toggleCamera() {
            this.camCinematic = !this.camCinematic;
            let btn = document.getElementById('btn-cam');
            btn.className = this.camCinematic ? "btn-util jelly-btn active" : "btn-util jelly-btn";
            btn.innerText = this.camCinematic ? "🎥 시네마틱 ON" : "🎥 시네마틱 OFF";
            if(!this.camCinematic) new TWEEN.Tween(window.engine3D.camera.position).to({x:0, y:26, z:14}, 300).start();
        }

        initMatch(lv) {
            this.activeLv = lv; this.pWins = 0; this.eWins = 0; this.round = 1;
            this.startPlacement();
        }

        clearBoard() {
            this.pUnits.forEach(u=>window.engine3D.clearUnitMemory(u.mesh)); this.pUnits=[];
            this.eUnits.forEach(u=>window.engine3D.clearUnitMemory(u.mesh)); this.eUnits=[];
            window.engine3D.boardTiles.forEach(t=> { t.userData.occupied=false; t.userData.indicator.material.opacity=0; });
        }

        startPlacement() {
            this.phase = 'PLACEMENT'; this.timer = 15.0;
            this.clearBoard(); this.syncScore();
            
            // [에러 픽스]: 정확한 ID 매핑으로 Null Reference 방지
            const phaseTxt = document.getElementById('phase-text');
            if(phaseTxt) phaseTxt.innerText = `영웅 진형 구축 (ROUND ${this.round})`;
            
            document.getElementById('btn-placement-lock').style.display = 'none';
            document.getElementById('roster-deck').style.pointerEvents = 'auto';
            document.getElementById('roster-deck').style.opacity = '1';
            
            new TWEEN.Tween(window.engine3D.camera.position).to({x:0, y:26, z:14}, 1000).easing(TWEEN.Easing.Cubic.Out).start();
            this.renderDeck();
        }

        syncScore() {
            document.getElementById('score-p').innerText = this.pWins;
            document.getElementById('score-e').innerText = this.eWins;
            let dots = document.getElementById('bo5-dots').children;
            for(let i=0;i<3;i++) dots[i].className = 'bo5-dot' + (i<this.pWins ? ' win-p':'') + (i<this.eWins ? ' win-e':'');
        }

        renderDeck() {
            const scroll = document.getElementById('roster-deck');
            scroll.innerHTML = ''; scroll.style.pointerEvents = 'auto'; scroll.style.opacity = '1';

            DB_HEROES.forEach(h => {
                let locked = h.unlockLv > this.storyProgress;
                let card = document.createElement('div');
                card.className = `deck-card jelly-btn ${locked ? 'locked' : ''}`;
                card.style.borderTop = `3px solid #${h.color.toString(16)}`;
                card.innerHTML = `<div class="emoji">${h.icon}</div><span class="name">${h.name}</span>`;

                if(!locked) {
                    card.onclick = () => {
                        if(this.phase !== 'PLACEMENT') return;
                        if(this.pUnits.length < 3) {
                            let fTile = window.engine3D.boardTiles.find(t=>t.userData.isPlayerArea && !t.userData.occupied);
                            if(fTile) {
                                fTile.userData.occupied = true;
                                let pack = window.engine3D.createHeroModel(h);
                                pack.group.position.copy(fTile.position);
                                
                                let core = {...h, maxHp:h.hp, currentHp:h.hp, mesh:pack.group, hpMesh:pack.hpMesh, tile:fTile, stat:{dmg:0, heal:0, tank:0}, frozen:0, atkBuff:false, reviveUsed:false };
                                pack.group.userData = { core: core };
                                window.engine3D.scene.add(pack.group);
                                this.pUnits.push(core);
                                
                                pack.group.position.y = 8;
                                new TWEEN.Tween(pack.group.position).to({y:0.16}, 400).easing(TWEEN.Easing.Bounce.Out).start();
                                if(this.pUnits.length === 3) document.getElementById('btn-placement-lock').style.display = 'block';
                            }
                        } else {
                            window.uiManager.openSpecModal(h);
                        }
                    };
                }
                scroll.appendChild(card);
            });
            if(this.pUnits.length === 3) document.getElementById('btn-placement-lock').style.display = 'block';
        }

        lockPlacement() {
            if(this.pUnits.length < 3) return;
            this.phase = 'COMBAT';
            document.getElementById('btn-placement-lock').style.display = 'none';
            
            const phaseTxt = document.getElementById('phase-text');
            if(phaseTxt) phaseTxt.innerText = '실시간 시뮬레이션 매치 중';
            
            document.getElementById('roster-deck').style.pointerEvents = 'none';
            document.getElementById('roster-deck').style.opacity = '0.2';
            
            // 글로벌 이지스 쉴드 (u13) 체크
            let pHasAegis = this.pUnits.some(u=>u.id==='u13');
            if(pHasAegis) { this.pUnits.forEach(u=> { u.aegisShield = true; }); window.engine3D.popText(this.pUnits[0].mesh.position, "MATRIX SHIELD!", 'skill'); }

            let eTiles = window.engine3D.boardTiles.filter(t=>!t.userData.isPlayerArea);
            let pool = STAGE_DATA.find(s=>s.lv===this.activeLv).botDeck;

            for(let i=0; i<3; i++) {
                let hId = pool[Math.floor(Math.random()*pool.length)];
                let data = DB_HEROES.find(u=>u.id === hId);
                let tile = eTiles.splice(Math.floor(Math.random()*eTiles.length), 1)[0];
                
                tile.userData.occupied = true;
                let pack = window.engine3D.createHeroModel(data);
                pack.group.position.copy(tile.position); pack.group.rotation.y = Math.PI;
                let core = {...data, maxHp:data.hp, currentHp:data.hp, mesh:pack.group, hpMesh:pack.hpMesh, tile:tile, stat:{dmg:0, heal:0, tank:0}, frozen:0, atkBuff:false, reviveUsed:false };
                pack.group.userData = { core: core };
                window.engine3D.scene.add(pack.group);
                this.eUnits.push(core);
                pack.group.position.y = 8;
                new TWEEN.Tween(pack.group.position).to({y:0.16}, 500).easing(TWEEN.Easing.Back.Out).delay(i*100).start();
            }
            
            let eHasAegis = this.eUnits.some(u=>u.id==='u13');
            if(eHasAegis) this.eUnits.forEach(u=> { u.aegisShield = true; });

            setTimeout(()=>this.combatTick(), 1000);
        }

        combatTick() {
            if(this.phase !== 'COMBAT') return;
            let aliveP = this.pUnits.filter(u=>u.currentHp>0);
            let aliveE = this.eUnits.filter(u=>u.currentHp>0);
            if(aliveP.length === 0 || aliveE.length === 0) return this.endRound(aliveP.length > 0);

            // 아군 턴
            aliveP.forEach(p => {
                if(p.frozen > 0) { p.frozen--; window.engine3D.popText(p.mesh.position, "FROZEN!", 'skill'); return; }

                if(p.role==='HEAL') {
                    let ally = aliveP.sort((a,b)=>(a.currentHp/a.maxHp)-(b.currentHp/b.maxHp))[0];
                    this.executeAction(p, ally, true);
                } else {
                    let target = aliveE[Math.floor(Math.random()*aliveE.length)];
                    if(p.id === 'u4' || p.id === 'u10') { // 어쌔신, 뱀파이어는 체력 낮은 적 우선 공격
                        target = aliveE.sort((a,b)=>a.currentHp - b.currentHp)[0];
                    }
                    this.executeAction(p, target, false);
                }
            });

            // 적군 턴 (시간차)
            setTimeout(() => {
                let cP = this.pUnits.filter(u=>u.currentHp>0), cE = this.eUnits.filter(u=>u.currentHp>0);
                if(cP.length===0 || cE.length===0) return;
                
                cE.forEach(e => {
                    if(e.frozen > 0) { e.frozen--; return; }
                    if(e.role==='HEAL') {
                        let ally = cE.sort((a,b)=>(a.currentHp/a.maxHp)-(b.currentHp/b.maxHp))[0];
                        this.executeAction(e, ally, true);
                    } else {
                        let target = cP[Math.floor(Math.random()*cP.length)];
                        if(e.id === 'u4' || e.id === 'u10') target = cP.sort((a,b)=>a.currentHp - b.currentHp)[0];
                        this.executeAction(e, target, false);
                    }
                });
                
                if(document.getElementById('analytics-drawer').classList.contains('open')) window.uiManager.refreshStats();
            }, 700);

            setTimeout(()=>this.combatTick(), 1800);
        }

        executeAction(attacker, target, isHeal) {
            let oPos = attacker.mesh.position.clone();
            new TWEEN.Tween(attacker.mesh.position).to({x:oPos.x+(target.mesh.position.x-oPos.x)*0.25, z:oPos.z+(target.mesh.position.z-oPos.z)*0.25}, 200).yoyo(true).repeat(1).start();

            setTimeout(() => {
                window.engine3D.fireAttack(attacker, target, () => {
                    let val = attacker.atk + Math.floor(Math.random()*15);
                    
                    // 버프 처리
                    if(attacker.atkBuff) { val = Math.floor(val * 1.3); attacker.atkBuff = false; }
                    if(attacker.id === 'u5') { // 버서커: 잃은 체력 비례 뎀증 (최대 1.6배)
                        let loss = 1 - (attacker.currentHp / attacker.maxHp);
                        val = Math.floor(val * (1 + (loss * 0.6)));
                    }

                    if(isHeal) {
                        target.currentHp = Math.min(target.maxHp, target.currentHp + val);
                        window.engine3D.popText(target.mesh.position, val, 'heal');
                        if(attacker.id === 'u12') target.atkBuff = true; // 솔라 마스터 공격력 버프
                        if(attacker.stat) attacker.stat.heal += val;
                    } else {
                        // 탱커 방벽(u1) 처리
                        if(target.id === 'u1' && Math.random() > 0.5) {
                            val = 0; target.mesh.userData.shieldFX.visible = true; target.stat.tank += 50;
                            setTimeout(()=>target.mesh.userData.shieldFX.visible=false, 600);
                            window.engine3D.popText(target.mesh.position, "BLOCKED", 'skill');
                        } 
                        // 이지스 실드(u13) 처리
                        else if(target.aegisShield) {
                            val = Math.floor(val * 0.5); target.aegisShield = false; // 1회성 50% 반감
                            window.engine3D.popText(target.mesh.position, "AEGIS", 'skill');
                        }
                        // 타이탄 메카(u11) 처리
                        else if(target.id === 'u11') {
                            val = Math.floor(val * 0.75); // 상시 25% 경감
                            if(target.stat) target.stat.tank += Math.floor(val * 0.25);
                        }

                        target.currentHp -= val;
                        if(val > 0) window.engine3D.popText(target.mesh.position, val, 'dmg');
                        if(attacker.stat) attacker.stat.dmg += val;
                        if(target.stat) target.stat.tank += Math.floor(val/2);

                        // 뱀파이어 흡혈 (u10)
                        if(attacker.id === 'u10' && val > 0) {
                            let healVal = Math.floor(val * 0.45);
                            attacker.currentHp = Math.min(attacker.maxHp, attacker.currentHp + healVal);
                            window.engine3D.popText(attacker.mesh.position, `+${healVal}`, 'heal');
                            attacker.stat.heal += healVal;
                        }

                        // 프로스트 빙결 (u9)
                        if(attacker.id === 'u9' && val > 0) {
                            target.frozen = 1; window.engine3D.popText(target.mesh.position, "FREEZE!", 'skill');
                        }

                        // 크로노스 부활 (u7)
                        if(target.currentHp <= 0 && target.id === 'u7' && !target.reviveUsed) {
                            target.currentHp = Math.floor(target.maxHp * 0.5);
                            target.reviveUsed = true;
                            window.engine3D.popText(target.mesh.position, "REVERSE!", 'skill');
                        }
                    }

                    // 체력바 갱신 및 사망 처리
                    let r = Math.max(0, target.currentHp/target.maxHp);
                    target.hpMesh.scale.x = r; target.hpMesh.material.color.setHex(r>0.4 ? 0x10b981 : 0xf43f5e);

                    if(target.currentHp <= 0) {
                        new TWEEN.Tween(target.mesh.rotation).to({x:Math.PI/2}, 400).easing(TWEEN.Easing.Bounce.Out).start();
                        target.mesh.position.y = -0.12; target.hpMesh.visible = false; target.tile.userData.occupied = false;
                    }
                });
            }, 200);
        }

        endRound(isWin) {
            this.phase = 'RESULT';
            if(isWin) this.pWins++; else this.eWins++;
            this.syncScore();

            setTimeout(() => {
                if(this.pWins === 3 || this.eWins === 3) {
                    let title = document.getElementById('result-title');
                    let desc = document.getElementById('result-desc');
                    if(this.pWins === 3) { 
                        title.innerText = "VICTORY"; title.style.color = "var(--gold)"; 
                        if(this.activeLv > this.storyProgress) {
                            this.storyProgress = this.activeLv;
                            desc.innerText = `섹터 ${this.storyProgress} 클리어! 신규 영웅 데이터가 활성화되었습니다.`;
                        } else {
                            desc.innerText = "전술 시뮬레이션 매치 승리.";
                        }
                    } else { 
                        title.innerText = "DEFEAT"; title.style.color = "var(--danger)"; 
                        desc.innerText = "AI 전술에 의해 코어가 파괴되었습니다.";
                    }
                    window.uiManager.switchScreen('result');
                } else {
                    this.round++;
                    this.startPlacement();
                }
            }, 1800);
        }
    }

    // =========================================================================
    // [5] BOOTSTRAP INIT (글로벌 윈도우 마운팅으로 스코프 버그 영구 차단)
    // =========================================================================
    window.onload = () => {
        window.engine3D = new VisualEngine();
        window.uiManager = new UIManager();
        window.gameCore = new GameCore();
        
        window.engine3D.renderLoop(0);

        // 2초 인트로 후 로비로 자동 이동
        setTimeout(() => {
            const intro = document.getElementById('screen-intro');
            intro.style.opacity = '0'; intro.style.transition = 'opacity 0.6s ease';
            setTimeout(() => { window.uiManager.switchScreen('lobby'); }, 600);
        }, 2000);
    };

    // 15초 카운트다운 타이머 글로벌 스케줄러 (HTML ID 완벽 매치: battle-timer)
    setInterval(() => {
        if(!window.gameCore || window.gameCore.phase !== 'PLACEMENT') return;
        window.gameCore.timer -= 0.1;
        let c = document.getElementById('battle-timer');
        if(c) {
            if(window.gameCore.timer <= 0) { 
                window.gameCore.timer = 0; c.innerText = "⚔️"; window.gameCore.lockPlacement(); 
            } else {
                c.innerText = Math.max(0, window.gameCore.timer).toFixed(0);
            }
        }
    }, 100);

</script>
</body>
