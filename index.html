<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THRE3 HERO: Grand Masterpiece</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <style>
        /* --- 다이내믹 테마 CSS 변수 --- */
        :root {
            --primary-gold: #d4af37;
            --primary-gold-dim: rgba(212, 175, 55, 0.4);
            --bg-color: #05070a;
            --glass-bg: rgba(10, 15, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #a0aab5;
            --panel-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* 화이트/라이트 모드 테마 */
        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #111827;
            --text-sub: #4b5563;
            --panel-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: 'Noto Serif KR', serif; user-select: none; -webkit-user-select: none; color: var(--text-main); transition: background-color 0.5s ease; }
        
        #game-container { position: relative; width: 100%; height: 100%; }
        #canvas-3d { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 플로팅 데미지 텍스트 레이어 */
        #fx-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .dmg-text { position: absolute; font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.8rem; color: #ff3366; text-shadow: 0 2px 5px rgba(0,0,0,0.8); pointer-events: none; opacity: 1; transform: translate(-50%, -50%); z-index: 10; animation: floatDmg 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        .dmg-text.heal { color: #2ecc71; }
        @keyframes floatDmg { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 20% { transform: translate(-50%, -80%) scale(1.3); } 100% { opacity: 0; transform: translate(-50%, -150%) scale(1); } }

        /* UI 레이어 공통 설정 */
        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); box-shadow: var(--panel-shadow); transition: all 0.5s ease; }
        .chewy { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s; }
        .chewy:active { transform: scale(0.92); filter: brightness(1.2); }
        .chewy:hover { transform: translateY(-5px); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; box-sizing: border-box; padding: 20px; }
        .screen.active { display: flex; }

        /* 설정 메뉴 (테마 변경) */
        #settings-btn { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        #settings-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 280px; border-radius: 20px; padding: 30px; text-align: center; display: none; opacity: 0; z-index: 101; pointer-events: auto; }
        #settings-modal h3 { margin: 0 0 20px 0; font-family: 'Cinzel'; color: var(--primary-gold); }
        .theme-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.1); color: var(--text-main); font-weight: bold; cursor: pointer; }
        
        /* 1. 메인 로비 */
        .main-title h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; margin: 0; color: var(--primary-gold); text-shadow: 0 0 20px var(--primary-gold-dim); text-align: center; }
        .main-title p { text-align: center; letter-spacing: 5px; color: var(--text-sub); margin-bottom: 40px; }
        .menu-box { width: 100%; max-width: 340px; border-radius: 25px; padding: 40px 25px; text-align: center; }
        .btn-prime { width: 100%; padding: 16px; background: linear-gradient(135deg, #d4af37, #aa801d); color: #000; border: none; border-radius: 15px; font-weight: 900; font-size: 1.3rem; font-family: 'Noto Serif KR'; cursor: pointer; box-shadow: 0 8px 20px var(--primary-gold-dim); margin-top: 20px; }

        /* 2. 인게임 HUD */
        #ingame-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 15px; z-index: 10; box-sizing: border-box; }
        #hud-top { display: flex; justify-content: space-between; align-items: center; width: 100%; pointer-events: auto; margin-top: 10px; }
        .score-board { display: flex; flex-direction: column; align-items: center; }
        .score-num { font-family: 'Cinzel'; font-size: 2.2rem; font-weight: 800; color: var(--primary-gold); margin: -5px 0 0 0; }
        .timer-badge { padding: 10px 25px; border-radius: 20px; font-family: 'Cinzel'; font-size: 2rem; font-weight: 900; color: var(--text-main); }
        
        #hud-bottom { display: flex; flex-direction: column; gap: 15px; pointer-events: auto; width: 100%; max-width: 500px; margin: 0 auto; }
        .info-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        #map-name { font-size: 0.85rem; color: var(--primary-gold); font-weight: bold; border: 1px solid var(--primary-gold-dim); padding: 5px 12px; border-radius: 15px; background: rgba(212,175,55,0.1); }
        
        #roster-scroller { width: 100%; overflow-x: auto; display: flex; gap: 12px; padding: 15px 10px; border-radius: 20px; -webkit-overflow-scrolling: touch; }
        #roster-scroller::-webkit-scrollbar { display: none; }
        .hero-card { min-width: 80px; height: 105px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border: 1px solid var(--glass-border); }
        .hero-card .icon { width: 40px; height: 40px; border-radius: 50%; margin-bottom: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.3); }
        .hero-card span { font-size: 0.8rem; font-weight: bold; color: var(--text-main); }

        /* 결과 화면 */
        #end-screen { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 200; }
        .end-box { width: 90%; max-width: 400px; padding: 50px 30px; border-radius: 30px; text-align: center; }
        #end-title { font-family: 'Cinzel'; font-size: 4rem; margin: 0 0 20px 0; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 3D 렌더링 엔진 -->
        <div id="canvas-3d"></div>
        <!-- 2D 파티클 & 텍스트 오버레이 -->
        <div id="fx-layer"></div>

        <!-- 공통 설정 버튼 -->
        <div id="settings-btn" class="glass chewy" onclick="toggleSettings()">⚙️</div>
        
        <!-- 설정 모달 -->
        <div id="settings-modal" class="glass">
            <h3>SYSTEM SETTINGS</h3>
            <button class="theme-btn chewy" onclick="setTheme('dark')">🌙 다크 엠파이어 모드 (Dark)</button>
            <button class="theme-btn chewy" onclick="setTheme('light')">☀️ 홀리 생츄어리 모드 (Light)</button>
            <button class="btn-prime chewy" style="margin-top:20px; padding:10px;" onclick="toggleSettings()">닫기</button>
        </div>

        <!-- 1. 메인 로비 화면 -->
        <div id="main-screen" class="screen active">
            <div class="main-title">
                <h1>THRE3 HERO</h1>
                <p>GRAND MASTERPIECE</p>
            </div>
            <div class="menu-box glass">
                <p style="color:var(--text-sub); font-size:0.9rem; margin-bottom: 25px;">신성한 전장에 오신 것을 환영합니다.<br>사령관님, 출전 준비가 완료되었습니다.</p>
                <button class="btn-prime chewy" onclick="startGame()">전 장 진 입</button>
            </div>
        </div>

        <!-- 2. 인게임 시스템 UI -->
        <div id="ingame-ui" style="display:none;">
            <div id="hud-top">
                <div class="score-board">
                    <span style="font-size:0.8rem; color:var(--text-sub);">COMMANDER</span>
                    <span class="score-num" id="score-player">0</span>
                </div>
                <div class="timer-badge glass chewy" id="timer-badge">
                    <span id="timer-text">10.0</span>
                </div>
                <div class="score-board">
                    <span style="font-size:0.8rem; color:var(--text-sub);">AI OMEGA</span>
                    <span class="score-num" id="score-enemy" style="color:#ff3366;">0</span>
                </div>
            </div>

            <div id="hud-bottom">
                <div class="info-bar">
                    <span id="phase-lbl" style="font-weight:bold; letter-spacing:1px; color:var(--text-main);">배치 대기 상태</span>
                    <div id="map-name">공중 정원 에덴</div>
                </div>
                <div id="roster-scroller" class="glass"></div>
            </div>
        </div>

        <!-- 3. 결과 창 -->
        <div id="end-screen" class="screen">
            <div class="end-box glass">
                <h1 id="end-title" style="color:var(--primary-gold);">VICTORY</h1>
                <p style="color:var(--text-sub); font-size:1.1rem; margin-bottom:40px;">전술 시뮬레이션이 종료되었습니다.</p>
                <button class="btn-prime chewy" onclick="returnToLobby()">로비 귀환</button>
            </div>
        </div>
    </div>

<script>
    // --- 1. 테마 제어 시스템 ---
    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        // 3D 씬 환경광 동기화
        if(gameEngine && gameEngine.env) gameEngine.env.updateLightingForTheme(theme);
    }
    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        if(modal.style.display === 'block') {
            modal.style.opacity = '0';
            setTimeout(() => modal.style.display = 'none', 300);
        } else {
            modal.style.display = 'block';
            setTimeout(() => modal.style.opacity = '1', 10);
        }
    }

    // --- 2. 프리미엄 영웅 데이터베이스 ---
    const HERO_DB = [
        { id: 'knight', name: '아크 나이트', hp: 450, atk: 18, role: 'TANK', color: 0xbdc3c7, glow: 0xffffff, desc: '거대한 검과 방패' },
        { id: 'sniper', name: '호크 아이', hp: 130, atk: 65, role: 'DPS', color: 0xe74c3c, glow: 0xff3366, desc: '후방 저격수' },
        { id: 'priest', name: '홀리 멘토', hp: 160, atk: 10, role: 'HEAL', color: 0x2ecc71, glow: 0x66ff99, desc: '생명의 구슬' },
        { id: 'rogue', name: '팬텀 엣지', hp: 190, atk: 45, role: 'ASSASSIN', color: 0x9b59b6, glow: 0xd2b4de, desc: '쌍검 기습' },
        { id: 'bruiser', name: '버서커', hp: 320, atk: 30, role: 'FIGHTER', color: 0xe67e22, glow: 0xf39c12, desc: '야수적 돌진' },
        { id: 'wizard', name: '아크 메이지', hp: 140, atk: 50, role: 'MAGIC', color: 0x3498db, glow: 0x5dade2, desc: '원소 폭발' }
    ];

    // --- 3. 맵 지형 데이터베이스 ---
    const MAP_THEMES = [
        { id: 'GARDEN', name: '천공의 정원 에덴', bgLight: 0x87CEEB, bgDark: 0x05100a, tile: 0x27ae60, island: 0x1e8449, particle: 0xffffff },
        { id: 'CYBER', name: '사이버 네온 넥서스', bgLight: 0x1a0a2e, bgDark: 0x0a0514, tile: 0x00ffff, island: 0x111122, particle: 0x00ffff },
        { id: 'VOLCANIC', name: '작열하는 용암 지대', bgLight: 0x3e1111, bgDark: 0x1a0505, tile: 0xc0392b, island: 0x2c1414, particle: 0xff5500 }
    ];

    // --- 4. 3D 엔진 코어 시스템 ---
    class GameEngine3D {
        constructor() {
            this.container = document.getElementById('canvas-3d');
            this.scene = new THREE.Scene();
            
            // 모바일 뷰 최적화 카메라
            this.camera = new THREE.PerspectiveCamera(50, this.container.clientWidth / this.container.clientHeight, 0.1, 1000);
            this.camera.position.set(0, 22, 18);
            this.camera.lookAt(0, 0, 0);

            this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
            this.renderer.toneMappingExposure = 1.2;
            this.container.appendChild(this.renderer.domElement);

            this.raycaster = new THREE.Raycaster();
            this.mouse = new THREE.Vector2();

            this.vfx = new VFXManager(this.scene);
            this.env = new EnvironmentManager(this.scene);
            this.factory = new UnitFactory();

            this.tiles = [];
            this.players = [];
            this.enemies = [];
            this.animatingMeshes = []; // 상시 부유/회전 애니메이션용

            this.buildBoard();
            this.initLights();
            
            window.addEventListener('resize', () => this.onResize());
        }

        initLights() {
            this.ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            this.scene.add(this.ambientLight);

            this.mainSun = new THREE.DirectionalLight(0xffeedd, 1.5);
            this.mainSun.position.set(10, 30, 15);
            this.mainSun.castShadow = true;
            this.mainSun.shadow.mapSize.width = 2048;
            this.mainSun.shadow.mapSize.height = 2048;
            this.mainSun.shadow.bias = -0.001;
            this.scene.add(this.mainSun);
        }

        buildBoard() {
            // 체스판 시인성을 극대화한 네온 엣지 타일 디자인
            const tileGeo = new THREE.BoxGeometry(2.4, 0.3, 2.4);
            const edgeGeo = new THREE.EdgesGeometry(tileGeo);

            const matPlayer = new THREE.MeshPhysicalMaterial({ color: 0x112233, metalness: 0.8, roughness: 0.2, clearcoat: 1 });
            const matEnemy = new THREE.MeshPhysicalMaterial({ color: 0x331111, metalness: 0.8, roughness: 0.2, clearcoat: 1 });
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
            const lineMatE = new THREE.LineBasicMaterial({ color: 0xff3366, transparent: true, opacity: 0.3 });

            const createTile = (c, r, isPlayer) => {
                let mesh = new THREE.Mesh(tileGeo, isPlayer ? matPlayer.clone() : matEnemy.clone());
                mesh.position.set(c * 2.6 - 2.6, 0.15, isPlayer ? (r * 2.6 + 1.3) : -(r * 2.6 + 1.3));
                mesh.receiveShadow = true;
                
                let edges = new THREE.LineSegments(edgeGeo, isPlayer ? lineMat : lineMatE);
                mesh.add(edges);

                mesh.userData = { isPlayerArea: isPlayer, occupied: false };
                this.scene.add(mesh);
                this.tiles.push(mesh);
            };

            for(let r=0; r<3; r++) for(let c=0; c<3; c++) createTile(c, r, true);
            for(let r=0; r<3; r++) for(let c=0; c<3; c++) createTile(c, r, false);
        }

        shakeCamera() {
            const origin = { x: 0, y: 22, z: 18 };
            new TWEEN.Tween(this.camera.position)
                .to({ x: (Math.random()-0.5)*1.5, y: 22 + (Math.random()-0.5)*1.5, z: 18 }, 50)
                .yoyo(true).repeat(3)
                .onComplete(() => this.camera.position.set(origin.x, origin.y, origin.z))
                .start();
        }

        onResize() {
            this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        }

        render(time) {
            TWEEN.update(time);
            this.vfx.update(time);
            this.env.update(time);

            // 유닛 상하 부유 애니메이션 및 빌보드 체력바
            const t = time * 0.002;
            [...this.players, ...this.enemies].forEach(u => {
                if(u.hp > 0) {
                    u.mesh.position.y = u.baseY + Math.sin(t + u.mesh.position.x) * 0.15; // 숨쉬는 듯한 부유
                    if(u.hpMesh) u.hpMesh.lookAt(this.camera.position);
                    
                    // 특수 파츠 회전 (ex: 마법사의 구슬)
                    if(u.mesh.userData.spinParts) {
                        u.mesh.userData.spinParts.forEach(p => p.rotation.y += 0.05);
                    }
                }
            });

            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame((t) => this.render(t));
        }
    }

    // --- 5. 다이내믹 환경/맵 매니저 ---
    class EnvironmentManager {
        constructor(scene) {
            this.scene = scene;
            this.islandGroup = new THREE.Group();
            this.scene.add(this.islandGroup);
            this.particles = [];
            this.currentTheme = null;
        }

        buildMap(mapData) {
            this.currentTheme = mapData;
            // 기존 지형 삭제
            while(this.islandGroup.children.length > 0){ 
                this.islandGroup.remove(this.islandGroup.children[0]); 
            }
            this.particles.forEach(p => this.scene.remove(p));
            this.particles = [];

            // 테마 동기화 (라이트/다크)
            this.updateLightingForTheme(document.body.getAttribute('data-theme') || 'dark');

            // 거대 부유섬 베이스 생성 (절차적 Dodecahedron)
            const islandGeo = new THREE.DodecahedronGeometry(8, 1);
            const islandMat = new THREE.MeshStandardMaterial({ color: mapData.island, roughness: 0.9, flatShading: true });
            const mainIsland = new THREE.Mesh(islandGeo, islandMat);
            mainIsland.position.set(0, -6, 0);
            mainIsland.scale.set(1, 0.4, 1);
            mainIsland.receiveShadow = true;
            this.islandGroup.add(mainIsland);

            // 주변 부유석 10개 생성
            for(let i=0; i<10; i++) {
                let rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random()*1.5 + 0.5, 0), islandMat);
                rock.position.set((Math.random()-0.5)*25, -5 + Math.random()*5, (Math.random()-0.5)*25);
                rock.userData = { speed: Math.random()*0.02 + 0.01, originY: rock.position.y };
                this.islandGroup.add(rock);
            }

            // 환경 파티클 (눈, 불티, 데이터 조각)
            const pGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const pMat = new THREE.MeshBasicMaterial({ color: mapData.particle });
            for(let i=0; i<40; i++) {
                let p = new THREE.Mesh(pGeo, pMat);
                p.position.set((Math.random()-0.5)*30, Math.random()*15, (Math.random()-0.5)*30);
                p.userData = { speed: Math.random()*0.05 + 0.02 };
                this.scene.add(p);
                this.particles.push(p);
            }

            document.getElementById('map-name').innerText = mapData.name;
        }

        updateLightingForTheme(uiTheme) {
            if(!this.currentTheme) return;
            const isLight = uiTheme === 'light';
            const bgColor = isLight ? this.currentTheme.bgLight : this.currentTheme.bgDark;
            this.scene.fog = new THREE.FogExp2(bgColor, 0.02);
        }

        update(time) {
            // 부유석 애니메이션
            this.islandGroup.children.forEach((child, i) => {
                if(i > 0) { // 메인 섬 제외
                    child.position.y = child.userData.originY + Math.sin(time * child.userData.speed) * 1.5;
                    child.rotation.x += 0.005;
                    child.rotation.y += 0.005;
                }
            });
            // 파티클 하강 애니메이션
            this.particles.forEach(p => {
                p.position.y -= p.userData.speed;
                if(p.position.y < -5) p.position.y = 15;
            });
        }
    }

    // --- 6. 극강의 퀄리티, 절차적 3D 유닛 팩토리 ---
    class UnitFactory {
        create(hero) {
            const group = new THREE.Group();
            const spinParts = []; // 회전 애니메이션 적용 배열

            // 고급 PBR 재질
            const bodyMat = new THREE.MeshPhysicalMaterial({ color: hero.color, metalness: 0.6, roughness: 0.2, clearcoat: 1 });
            const glowMat = new THREE.MeshStandardMaterial({ color: hero.glow, emissive: hero.glow, emissiveIntensity: 0.8 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });

            // 공통 마법진 베이스
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.9, 0.2, 16), darkMat);
            group.add(base);

            // 클래스별 디테일 모델링 조립
            if(hero.role === 'TANK') {
                let torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.8), bodyMat);
                torso.position.y = 0.8; group.add(torso);
                let shield = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.2, 6), glowMat);
                shield.position.set(0, 0.8, 0.6); shield.rotation.x = Math.PI/2; group.add(shield);
            } 
            else if(hero.role === 'DPS') {
                let torso = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.8, 8), bodyMat);
                torso.position.y = 1.0; group.add(torso);
                let bow = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.05, 8, 16, Math.PI), glowMat);
                bow.position.set(0, 1.0, 0.4); bow.rotation.z = Math.PI/2; group.add(bow);
            }
            else if(hero.role === 'HEAL') {
                let torso = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.7, 1.5, 16), bodyMat);
                torso.position.y = 0.8; group.add(torso);
                let orb = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), glowMat);
                orb.position.set(0, 1.9, 0); group.add(orb);
                
                let ring = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.05, 8, 32), glowMat);
                ring.position.set(0, 1.9, 0); ring.rotation.x = Math.PI/2;
                group.add(ring); spinParts.push(ring);
            }
            else if(hero.role === 'MAGIC') {
                let torso = new THREE.Mesh(new THREE.DodecahedronGeometry(0.6, 0), bodyMat);
                torso.position.y = 1.2; group.add(torso); spinParts.push(torso);
                for(let i=0; i<3; i++) {
                    let miniOrb = new THREE.Mesh(new THREE.SphereGeometry(0.15), glowMat);
                    let pivot = new THREE.Group(); pivot.position.y = 1.2;
                    miniOrb.position.set(1.0, 0, 0);
                    pivot.rotation.y = (Math.PI*2/3)*i;
                    pivot.add(miniOrb); group.add(pivot); spinParts.push(pivot);
                }
            }
            else { // 기타 전사/암살자
                let torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 1.4, 4), bodyMat);
                torso.position.y = 0.8; group.add(torso);
                let weapon = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.3), glowMat);
                weapon.position.set(0.6, 1.0, 0); weapon.rotation.x = Math.PI/4; group.add(weapon);
            }

            // 빌보드 체력바
            const hpPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.15), new THREE.MeshBasicMaterial({ color: 0x2ecc71, side: THREE.DoubleSide }));
            hpPlane.position.set(0, 2.5, 0);
            group.add(hpPlane);

            group.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
            group.userData = { spinParts };

            return { mesh: group, hpMesh: hpPlane };
        }
    }

    // --- 7. 시각 효과 (VFX) 코어 매니저 ---
    class VFXManager {
        constructor(scene) {
            this.scene = scene;
            this.explosions = [];
        }

        // 히트 파티클 폭발 연출
        createHitExplosion(pos, color) {
            const particleCount = 12;
            const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            
            for(let i=0; i<particleCount; i++) {
                let p = new THREE.Mesh(geo, mat);
                p.position.copy(pos); p.position.y += 1;
                this.scene.add(p);
                
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 2 + 1;
                let targetX = p.position.x + Math.cos(angle)*speed;
                let targetY = p.position.y + Math.random()*2;
                let targetZ = p.position.z + Math.sin(angle)*speed;

                new TWEEN.Tween(p.position).to({ x: targetX, y: targetY, z: targetZ }, 400).easing(TWEEN.Easing.Quadratic.Out).onComplete(() => this.scene.remove(p)).start();
                new TWEEN.Tween(p.scale).to({ x: 0, y: 0, z: 0 }, 400).start();
            }
        }

        // 허공으로 날아가는 2D DOM 플로팅 텍스트 (화면 좌표 투영)
        showFloatingText(pos3D, text, type='damage') {
            const vector = pos3D.clone();
            vector.y += 2.0; // 머리 위
            vector.project(engine.camera);

            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (-(vector.y * .5) + .5) * window.innerHeight;

            const el = document.createElement('div');
            el.className = `dmg-text ${type === 'heal' ? 'heal' : ''}`;
            el.innerText = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            
            document.getElementById('fx-layer').appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        update(time) {}
    }

    // --- 8. 게임 로직 및 흐름 제어 ---
    let engine;
    let phase = 'LOBBY';
    let pScore = 0, eScore = 0;
    let timerValue = 10.0;
    let battleLoop;

    window.onload = () => {
        engine = new GameEngine3D();
        engine.render(0);
        
        // 하단 로스터 생성
        const scroller = document.getElementById('roster-scroller');
        HERO_DB.forEach(h => {
            let card = document.createElement('div');
            card.className = 'hero-card glass chewy';
            card.innerHTML = `<div class="icon" style="background:#${h.color.toString(16)}"></div><span>${h.name}</span>`;
            card.onclick = () => deployHero(h);
            scroller.appendChild(card);
        });
    };

    function startGame() {
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('ingame-ui').style.display = 'flex';
        pScore = 0; eScore = 0;
        updateScoreBoard();
        startRound();
    }

    function startRound() {
        // 보드 초기화
        engine.players.forEach(u => engine.scene.remove(u.mesh)); engine.players = [];
        engine.enemies.forEach(u => engine.scene.remove(u.mesh)); engine.enemies = [];
        engine.tiles.forEach(t => t.userData.occupied = false);

        // 랜덤 맵 생성
        let randomMap = MAP_THEMES[Math.floor(Math.random() * MAP_THEMES.length)];
        engine.env.buildMap(randomMap);

        phase = 'PLACEMENT';
        timerValue = 10.0;
        document.getElementById('phase-lbl').innerText = '진형 구축 (유닛 탭)';
        document.getElementById('roster-scroller').style.pointerEvents = 'auto';
        document.getElementById('roster-scroller').style.opacity = '1';
        
        document.getElementById('timer-badge').style.background = 'var(--primary-gold)';
        document.getElementById('timer-badge').style.color = '#000';
    }

    function deployHero(heroData) {
        if(phase !== 'PLACEMENT' || engine.players.length >= 3) return;
        
        let emptyTile = engine.tiles.find(t => t.userData.isPlayerArea && !t.userData.occupied);
        if(emptyTile) {
            emptyTile.userData.occupied = true;
            let unitData = engine.factory.create(heroData);
            unitData.mesh.position.copy(emptyTile.position);
            unitData.mesh.position.y = 8; // 낙하
            
            let obj = { ...unitData, ...heroData, maxHp: heroData.hp, tile: emptyTile, baseY: 0.15 };
            engine.scene.add(obj.mesh);
            engine.players.push(obj);

            new TWEEN.Tween(obj.mesh.position).to({ y: obj.baseY }, 500).easing(TWEEN.Easing.Bounce.Out).start();
        }
    }

    // 10초 카운트다운 타이머
    setInterval(() => {
        if(phase !== 'PLACEMENT') return;
        timerValue -= 0.1;
        document.getElementById('timer-text').innerText = Math.max(0, timerValue).toFixed(1);
        
        if(timerValue <= 0) {
            phase = 'COMBAT';
            document.getElementById('timer-text').innerText = "BATTLE";
            document.getElementById('timer-badge').style.background = '#ff3366';
            document.getElementById('timer-badge').style.color = '#fff';
            document.getElementById('phase-lbl').innerText = '전술 교전 진행중';
            document.getElementById('roster-scroller').style.pointerEvents = 'none';
            document.getElementById('roster-scroller').style.opacity = '0.3';
            
            spawnEnemyAI();
            setTimeout(() => battleTick(), 1000);
        }
    }, 100);

    function spawnEnemyAI() {
        let emptyTiles = engine.tiles.filter(t => !t.userData.isPlayerArea);
        for(let i=0; i<3; i++) {
            let heroData = HERO_DB[Math.floor(Math.random() * HERO_DB.length)];
            let tile = emptyTiles.splice(Math.floor(Math.random()*emptyTiles.length), 1)[0];
            
            tile.userData.occupied = true;
            let unitData = engine.factory.create(heroData);
            unitData.mesh.position.copy(tile.position);
            unitData.mesh.rotation.y = Math.PI; // 플레이어 바라봄
            
            let obj = { ...unitData, ...heroData, maxHp: heroData.hp, tile: tile, baseY: 0.15 };
            engine.scene.add(obj.mesh);
            engine.enemies.push(obj);

            obj.mesh.position.y = 5;
            new TWEEN.Tween(obj.mesh.position).to({ y: obj.baseY }, 600).easing(TWEEN.Easing.Back.Out).start();
        }
    }

    // 전투 액션 처리
    function battleTick() {
        if(phase !== 'COMBAT') return;

        let liveP = engine.players.filter(u => u.hp > 0);
        let liveE = engine.enemies.filter(u => u.hp > 0);

        if(liveP.length === 0 || liveE.length === 0) {
            processRoundEnd(liveP.length > 0);
            return;
        }

        // 공방 연산
        liveP.forEach(p => executeAttack(p, liveE[Math.floor(Math.random()*liveE.length)]));
        setTimeout(() => {
            liveE.forEach(e => executeAttack(e, liveP[Math.floor(Math.random()*liveP.length)]));
        }, 600);

        setTimeout(() => battleTick(), 1400);
    }

    function executeAttack(attacker, target) {
        if(!target || target.hp <= 0 || attacker.hp <= 0) return;

        // 돌진 모션
        let oPos = attacker.mesh.position.clone();
        let tPos = target.mesh.position.clone();
        new TWEEN.Tween(attacker.mesh.position)
            .to({ x: (oPos.x+tPos.x)/2, y: 1.5, z: (oPos.z+tPos.z)/2 }, 200)
            .yoyo(true).repeat(1).easing(TWEEN.Easing.Quadratic.Out).start();

        // 투사체 (베지어 곡선)
        let proj = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color: attacker.glow}));
        proj.position.copy(oPos); proj.position.y = 1.0;
        engine.scene.add(proj);

        new TWEEN.Tween(proj.position).to({ x: tPos.x, y: 1.0, z: tPos.z }, 350).onComplete(() => {
            engine.scene.remove(proj);
            
            // 데미지 처리
            let dmg = attacker.atk + Math.floor(Math.random()*10);
            target.hp -= dmg;
            target.hpMesh.scale.x = Math.max(0, target.hp / target.maxHp);
            target.hpMesh.material.color.setHex(target.hp / target.maxHp > 0.4 ? 0x2ecc71 : 0xe74c3c);

            // RPG 퀄리티 이펙트 세트: 파티클 + 텍스트 + 화면 흔들림
            engine.vfx.createHitExplosion(target.mesh.position, attacker.glow);
            engine.vfx.showFloatingText(target.mesh.position, `-${dmg}`);
            if(dmg > 30) engine.shakeCamera(); // 강한 데미지일 때 카메라 쉐이크

            if(target.hp <= 0) {
                new TWEEN.Tween(target.mesh.rotation).to({ x: Math.PI/2 }, 400).easing(TWEEN.Easing.Bounce.Out).start();
                target.mesh.position.y = -0.1;
                target.hpMesh.visible = false;
                target.tile.userData.occupied = false;
            }
        }).start();
    }

    function processRoundEnd(isWin) {
        phase = 'END';
        if(isWin) pScore++; else eScore++;
        updateScoreBoard();

        setTimeout(() => {
            if(pScore === 2 || eScore === 2) {
                document.getElementById('end-screen').classList.add('active');
                document.getElementById('end-title').innerText = pScore === 2 ? "VICTORY" : "DEFEAT";
                document.getElementById('end-title').style.color = pScore === 2 ? "var(--primary-gold)" : "#ff3366";
            } else {
                startRound(); // 다음 라운드 지형 교체 및 재시작
            }
        }, 1500);
    }

    function updateScoreBoard() {
        document.getElementById('score-player').innerText = pScore;
        document.getElementById('score-enemy').innerText = eScore;
    }

    function returnToLobby() {
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('ingame-ui').style.display = 'none';
        document.getElementById('main-screen').classList.add('active');
    }
</script>
